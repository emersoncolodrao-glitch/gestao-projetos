function renderIndicadores() {
  document.getElementById('pageTitle').textContent = 'Indicadores';
  document.getElementById('pageSub').textContent   = 'Acompanhamento de metas mensais';
  document.getElementById('topbarActions').innerHTML =
    `<div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="openIndImportModal()">📥 Importar</button>
      <button class="btn btn-primary"   onclick="openIndicadorModal()">＋ Novo Indicador</button>
    </div>`;

  // Anos disponíveis
  const anosDisp = [...new Set(db.indicadorMetas.map(m => m.ano))].sort((a,b)=>b-a);
  const anoAtual = new Date().getFullYear();
  if (!anosDisp.includes(anoAtual)) anosDisp.unshift(anoAtual);
  const anoOpts  = anosDisp.map(a => `<option value="${a}" ${+indAnoFiltro===a?'selected':''}>${a}</option>`).join('');

  const objOpts = db.objetivosEstrategicos.map(o =>
    `<option value="${o.id}" ${indObjFiltro==o.id?'selected':''}>${esc(o.nome)}</option>`).join('');

  const mesOpts = MES_NOMES_FULL.map((m, i) =>
    `<option value="${i+1}" ${indMesFiltro===i+1?'selected':''}>${m}</option>`).join('');

  // Responsáveis que possuem pelo menos um indicador visível (antes do filtro de resp)
  const indsParaResp = db.indicadores.filter(i => canSee('indicador', i.id) && (!indObjFiltro || i.objetivoId == indObjFiltro));
  const respIdsDisp  = [...new Set(indsParaResp.map(i => i.responsavelId).filter(Boolean))];
  const respOpts     = respIdsDisp
    .map(rid => db.responsaveis.find(r => r.id === rid)).filter(Boolean)
    .sort((a,b) => a.nome.localeCompare(b.nome))
    .map(r => `<option value="${r.id}" ${indRespFiltro==r.id?'selected':''}>${esc(r.nome)}</option>`).join('');

  const toolbar = `
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;
              position:sticky;top:64px;z-index:90;
              background:var(--g50);border-bottom:1px solid var(--g200);
              box-shadow:0 2px 6px rgba(0,0,0,.06);
              padding:10px 24px;margin:0 -24px 20px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Ano:</label>
      <select class="fc" style="height:34px;width:100px;font-size:13px;" onchange="setIndAno(this.value)">${anoOpts}</select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Mês:</label>
      <select class="fc" style="height:34px;width:150px;font-size:13px;" onchange="setIndMes(this.value)">
        <option value="0" ${!indMesFiltro?'selected':''}>Último realizado</option>
        ${mesOpts}
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Objetivo:</label>
      <select class="fc" style="height:34px;min-width:180px;font-size:13px;" onchange="setIndObj(this.value)">
        <option value="" ${!indObjFiltro?'selected':''}>Todos</option>
        ${objOpts}
      </select>
    </div>
    ${respOpts ? `
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Responsável:</label>
      <select class="fc" style="height:34px;min-width:160px;font-size:13px;" onchange="setIndResp(this.value)">
        <option value="" ${!indRespFiltro?'selected':''}>Todos</option>
        ${respOpts}
      </select>
    </div>` : ''}
    ${indObjFiltro  ? `<button class="btn btn-secondary btn-sm" onclick="setIndObj('')"  style="height:34px;">✕ Objetivo</button>`    : ''}
    ${indMesFiltro  ? `<button class="btn btn-secondary btn-sm" onclick="setIndMes(0)"   style="height:34px;">✕ Mês</button>`         : ''}
    ${indRespFiltro ? `<button class="btn btn-secondary btn-sm" onclick="setIndResp('')" style="height:34px;">✕ Responsável</button>` : ''}
  </div>`;

  if (!db.indicadores.length) {
    document.getElementById('content').innerHTML = toolbar + `
    <div class="ind-empty">
      <div class="ind-empty-icon">📊</div>
      <p style="font-size:14px;font-weight:600;color:var(--g600);margin-bottom:8px;">Nenhum indicador cadastrado</p>
      <p style="font-size:13px;color:var(--g400);margin-bottom:18px;">Cadastre indicadores para acompanhar metas previstas e realizadas mensalmente.</p>
      <button class="btn btn-primary" onclick="openIndicadorModal()">＋ Novo Indicador</button>
    </div>`;
    return;
  }

  // ── Filtrar indicadores por permissão, objetivo e responsável ──
  const indsVisiveis = db.indicadores.filter(i =>
    canSee('indicador', i.id) &&
    (!indObjFiltro  || i.objetivoId    == indObjFiltro) &&
    (!indRespFiltro || i.responsavelId == indRespFiltro)
  );

  // ── Agrupar por responsável ────────────────────────────────────
  const respIds = [...new Set(indsVisiveis.map(i => i.responsavelId).filter(Boolean))];
  const grupos  = respIds.map(rid => ({
    resp: db.responsaveis.find(r => r.id === rid),
    inds: indsVisiveis.filter(i => i.responsavelId === rid)
  })).filter(g => g.resp && g.inds.length)
     .sort((a, b) => a.resp.nome.localeCompare(b.resp.nome));
  const semResponsavel = indsVisiveis.filter(i => !i.responsavelId);

  function buildCard(ind) {
    const expanded = indExpandedIds.has(ind.id);
    const ultimo   = ultimoMesRealizado(ind.id);

    // Mês de referência
    const mesRef = indMesFiltro ? indMesFiltro : (ultimo ? ultimo.mes : new Date().getMonth() + 1);
    const anoRef = indMesFiltro ? indAnoFiltro  : (ultimo ? ultimo.ano : new Date().getFullYear());
    const metaAtual = getMeta(ind.id, mesRef, anoRef);

    const prev     = metaAtual?.metaPrevista  ?? null;
    const real     = metaAtual?.metaRealizada ?? null;

    // Last Year — mesmo mês, ano anterior
    const metaLY = getMeta(ind.id, mesRef, anoRef - 1);
    const lastYear = metaLY?.metaRealizada ?? null;

    // YTD acumulado anoRef (jan → mesRef)
    let acumPrev = 0, acumReal = 0, acumPrevHasData = false, acumRealHasData = false;
    if (ind.unidade === '%') {
      // Para %, usar SOMENTE o valor manual digitado; auto-soma não faz sentido
      const mtRef = getMeta(ind.id, mesRef, anoRef);
      if (mtRef?.acumPrevisto  != null) { acumPrev = mtRef.acumPrevisto;  acumPrevHasData = true; }
      if (mtRef?.acumRealizado != null) { acumReal = mtRef.acumRealizado; acumRealHasData = true; }
    } else {
      for (let m = 1; m <= mesRef; m++) {
        const mt = getMeta(ind.id, m, anoRef);
        if (mt?.metaPrevista  != null) { acumPrev += mt.metaPrevista;  acumPrevHasData = true; }
        if (mt?.metaRealizada != null) { acumReal += mt.metaRealizada; acumRealHasData = true; }
      }
    }

    // Last Year acumulado (jan → mesRef, ano anterior)
    let acumLY = 0, acumLYHasData = false;
    if (ind.unidade === '%') {
      // Para %, usar SOMENTE o valor manual digitado do ano anterior
      const mtRefLY = getMeta(ind.id, mesRef, anoRef - 1);
      if (mtRefLY?.acumRealizado != null) { acumLY = mtRefLY.acumRealizado; acumLYHasData = true; }
    } else {
      for (let m = 1; m <= mesRef; m++) {
        const mt = getMeta(ind.id, m, anoRef - 1);
        if (mt?.metaRealizada != null) { acumLY += mt.metaRealizada; acumLYHasData = true; }
      }
    }

    // Formatação de valor
    const fmtVal = v => v === null ? '—'
      : (ind.unidade === 'R$'
          ? fmtBRLInt(v)
          : (ind.unidade === '%'
              ? v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})
              : v.toLocaleString('pt-BR'))
            + (ind.unidade !== 'un' ? ' '+ind.unidade : ''));

    // Helper para inverter cor verde/vermelho quando "menor é melhor"
    const mm = !!ind.menorMelhor;
    const flipC = c => mm ? (c==='var(--success)'?'var(--danger)':c==='var(--danger)'?'var(--success)':c) : c;

    // Formatação de diferença absoluta + % de variação com sinal e cor
    const fmtDiff = (a, b) => {
      if (a === null || b === null) return { txt:'—', pct:'', col:'var(--g400)' };
      const diff = a - b;
      const sign = diff > 0 ? '+' : '';
      let txt;
      if (ind.unidade === 'R$') {
        txt = (diff >= 0 ? '+' : '−') + fmtBRLInt(Math.abs(diff));
      } else if (ind.unidade === '%') {
        txt = sign + diff.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' %';
      } else if (ind.unidade === 'un') {
        txt = sign + diff.toLocaleString('pt-BR');
      } else {
        txt = sign + diff.toLocaleString('pt-BR') + ' ' + ind.unidade;
      }
      const pctVal = b !== 0 ? ((diff / Math.abs(b)) * 100) : null;
      const pct = pctVal !== null
        ? (pctVal > 0 ? '+' : '') + pctVal.toFixed(1) + '%'
        : '';
      const col = flipC(diff >= 0 ? 'var(--success)' : 'var(--danger)');
      return { txt, pct, col };
    };

    // Diferenças
    const dPrev     = fmtDiff(real, prev);
    const dLY       = fmtDiff(real, lastYear);
    const dAcumPrev = fmtDiff(acumRealHasData ? acumReal : null, acumPrevHasData ? acumPrev : null);
    const dAcumLY   = fmtDiff(acumRealHasData ? acumReal : null, acumLYHasData   ? acumLY   : null);

    // Cores dos realizados
    const realCol     = real === null     ? 'var(--g400)' : prev !== null     ? flipC(real     >= prev     ? 'var(--success)' : 'var(--danger)') : 'var(--g800)';
    const acumRealCol = !acumRealHasData  ? 'var(--g400)' : acumPrevHasData   ? flipC(acumReal >= acumPrev ? 'var(--success)' : 'var(--danger)') : 'var(--g800)';

    const mesLabel = `${MES_NOMES_FULL[mesRef-1]}/${anoRef}`;
    const anoLabel = `Jan–${MES_NOMES[mesRef-1]}/${anoRef}`;

    return `
    <div class="ind-card" id="ind-card-${ind.id}">
      <div class="ind-card-head">
        <div>
          <div class="ind-card-title" style="display:flex;align-items:center;gap:6px;">
            📊 ${esc(ind.nome)}
            ${mm ? `<span title="Menor é melhor — cores invertidas" style="font-size:10px;padding:1px 6px;border-radius:20px;background:#fef9c3;color:#854d0e;border:1px solid #fde047;font-weight:700;flex-shrink:0;">📉 &lt; melhor</span>` : ''}
            ${(()=>{
              const cmts = db.indicadorComentarios.filter(c => c.indicadorId === ind.id);
              if (!cmts.length) return '';
              const temAberta = cmts.some(c => c.status === 'Aberta' || c.status === 'Em Andamento');
              const cor  = temAberta ? '#dc2626' : '#16a34a';
              const bg   = temAberta ? '#fef2f2' : '#f0fdf4';
              const tip  = temAberta ? 'Há anotações em aberto' : 'Todas as anotações concluídas';
              return `<span title="${tip}" onclick="navigateTo('anotacoes');anotFiltroIndId='${ind.id}';setTimeout(renderAnotacoes,50);"
                style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;
                       padding:2px 6px;border-radius:20px;background:${bg};color:${cor};border:1px solid ${cor}40;
                       cursor:pointer;flex-shrink:0;" >
                💬 ${cmts.length}
              </span>`;
            })()}
          </div>
          ${ind.descricao ? `<div class="ind-card-sub">${esc(ind.descricao)}</div>` : ''}
        </div>
        <div class="ind-card-actions">
          <button class="btn btn-sm" style="background:var(--primary-lt);color:var(--primary);border:1px solid var(--primary);font-size:11px;padding:3px 8px;" onclick="openMetaModal(${ind.id})" title="Lançar metas">📝 Metas</button>
          <button class="icon-btn" style="width:28px;height:28px;font-size:13px;" onclick="openIndicadorModal(${ind.id})" title="Editar indicador">✏️</button>
          <button class="icon-btn del" style="width:28px;height:28px;font-size:13px;" onclick="confirmDelete('indicadores',${ind.id},'${esc(ind.nome)}')" title="Excluir">🗑️</button>
        </div>
      </div>

      <!-- Linha 1: MÊS -->
      <div class="ind-kpis-scroll">
        <div class="ind-row-label">📅 MÊS — ${mesLabel}</div>
        <div class="ind-kpis">
          <div class="ind-kpi">
            <div class="ind-kpi-label">Previsto</div>
            <div class="ind-kpi-value">${fmtVal(prev)}</div>
          </div>
          <div class="ind-kpi">
            <div class="ind-kpi-label">Realizado</div>
            <div class="ind-kpi-value" style="color:${realCol}">${fmtVal(real)}</div>
          </div>
          <div class="ind-kpi">
            <div class="ind-kpi-label">Last Year</div>
            <div class="ind-kpi-value" style="color:var(--g600);">${fmtVal(lastYear)}</div>
          </div>
          <div class="ind-kpi">
            <div class="ind-kpi-label">Real. × Prev.</div>
            <div class="ind-kpi-value" style="color:${dPrev.col};">${dPrev.txt}</div>
            ${dPrev.pct ? `<div class="ind-kpi-unit" style="color:${dPrev.col};font-weight:700;">${dPrev.pct}</div>` : ''}
          </div>
          <div class="ind-kpi">
            <div class="ind-kpi-label">VAR.YoY %</div>
            <div class="ind-kpi-value" style="color:${dLY.col};">${dLY.txt}</div>
            ${dLY.pct ? `<div class="ind-kpi-unit" style="color:${dLY.col};font-weight:700;">${dLY.pct}</div>` : ''}
          </div>
        </div>
      </div>

      <!-- Linha 2: ANO acumulado (ocultado se ind.ocultarAcum) -->
      ${ind.ocultarAcum ? '' : `
      <div class="ind-kpis-scroll">
        <div class="ind-row-label" style="background:var(--g50);">📆 ANO — ${anoLabel}</div>
        <div class="ind-kpis" style="background:var(--g50);">
          <div class="ind-kpi" style="background:var(--g50);">
            <div class="ind-kpi-label">Prev. Acum.</div>
            <div class="ind-kpi-value">${acumPrevHasData ? fmtVal(acumPrev) : '—'}</div>
          </div>
          <div class="ind-kpi" style="background:var(--g50);">
            <div class="ind-kpi-label">Real. Acum.</div>
            <div class="ind-kpi-value" style="color:${acumRealCol};">${acumRealHasData ? fmtVal(acumReal) : '—'}</div>
          </div>
          <div class="ind-kpi" style="background:var(--g50);">
            <div class="ind-kpi-label">Last Year Acum.</div>
            <div class="ind-kpi-value" style="color:var(--g600);">${acumLYHasData ? fmtVal(acumLY) : '—'}</div>
          </div>
          <div class="ind-kpi" style="background:var(--g50);">
            <div class="ind-kpi-label">Var. YoY  R$</div>
            <div class="ind-kpi-value" style="color:${dAcumPrev.col};">${dAcumPrev.txt}</div>
            ${dAcumPrev.pct ? `<div class="ind-kpi-unit" style="color:${dAcumPrev.col};font-weight:700;">${dAcumPrev.pct}</div>` : ''}
          </div>
          <div class="ind-kpi" style="background:var(--g50);">
            <div class="ind-kpi-label">Var. YoY %</div>
            <div class="ind-kpi-value" style="color:${dAcumLY.col};">${dAcumLY.txt}</div>
            ${dAcumLY.pct ? `<div class="ind-kpi-unit" style="color:${dAcumLY.col};font-weight:700;">${dAcumLY.pct}</div>` : ''}
          </div>
        </div>
      </div>`}

      <div class="ind-chart-toggle" onclick="toggleIndExpand(${ind.id})">
        ${expanded ? '▲ Ocultar gráfico' : '▼ Ver gráfico comparativo ('+indAnoFiltro+')'}
      </div>

      ${expanded ? `
      <div class="ind-chart" style="display:flex;flex-direction:column;align-items:center;">
        <div class="ind-chart-title ind-chart-inner" style="justify-content:center;gap:20px;">
          <span>Previsto vs Realizado — ${indAnoFiltro}</span>
          <div class="ind-legend">
            <span><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#E8501A" stroke-width="2" stroke-dasharray="5,3"/></svg> Previsto</span>
            <span><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#10B981" stroke-width="2"/></svg> Realizado</span>
          </div>
        </div>
        <div class="ind-chart-inner">${buildIndChart(ind.id, indAnoFiltro)}</div>
      </div>
      <div class="ind-table-wrap">
        ${buildIndTable(ind.id, indAnoFiltro, ind.unidade)}
      </div>` : ''}
    </div>`;
  } // fim buildCard

  // Monta HTML agrupado por responsável
  let html = '';

  grupos.forEach(({ resp, inds }) => {
    html += `
    <div style="margin-bottom:28px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--g200);">
        <div class="avatar" style="width:34px;height:34px;font-size:13px;background:${avatarColor(resp.id)};flex-shrink:0;">${initials(resp.nome)}</div>
        <div>
          <div style="font-size:15px;font-weight:800;color:var(--g800);">${esc(resp.nome)}</div>
          ${resp.cargo ? `<div style="font-size:12px;color:var(--g500);margin-top:1px;">${esc(resp.cargo)}</div>` : ''}
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
          ${(()=>{
            const agmDoResp = db.agmRegistros.filter(a => a.responsavelId === resp.id
              && a.ano === indAnoFiltro && a.mes === indMesFiltro);
            const temDados = agmDoResp.length > 0;
            const btnStyle = temDados
              ? 'background:#1d4ed8;color:#fff;border:2px solid #1d4ed8;font-weight:800;box-shadow:0 2px 8px #1d4ed840;'
              : 'background:#fff;color:#1d4ed8;border:2px solid #1d4ed8;font-weight:700;';
            const badge = temDados
              ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#fff;color:#1d4ed8;font-size:9px;font-weight:900;margin-left:4px;">${agmDoResp.length}</span>`
              : '';
            return `<button onclick="openAgmModal(${resp.id},'${esc(resp.nome)}')"
              style="display:inline-flex;align-items:center;gap:2px;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;${btnStyle}"
              title="Análise de Gestão Mensal">
              📋 AGM${badge}
            </button>`;
          })()}
          <span style="font-size:11px;color:var(--g400);font-weight:600;">${inds.length} indicador${inds.length!==1?'es':''}</span>
        </div>
      </div>
      <div class="ind-grid">${inds.map(buildCard).join('')}</div>
    </div>`;
  });

  if (semResponsavel.length) {
    const header = grupos.length
      ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--g200);">
           <div style="width:34px;height:34px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">👤</div>
           <div style="font-size:15px;font-weight:700;color:var(--g500);">Sem responsável</div>
           <span style="margin-left:auto;font-size:11px;color:var(--g400);font-weight:600;">${semResponsavel.length} indicador${semResponsavel.length!==1?'es':''}</span>
         </div>`
      : '';
    html += `<div style="margin-bottom:28px;">${header}<div class="ind-grid">${semResponsavel.map(buildCard).join('')}</div></div>`;
  }

  document.getElementById('content').innerHTML = toolbar + html;
}

// Tabela mensal de metas dentro do card expandido
function buildIndTable(indId, ano, unidade) {
  const ind   = db.indicadores.find(i => i.id === indId);
  const acum  = !!ind?.acumulado;
  const meses = Array.from({length:12}, (_,i) => i+1);
  const fmtV  = v => v === null ? '<span style="color:var(--g300)">—</span>'
    : (unidade === 'R$' ? fmtBRLInt(v) : (unidade === '%' ? v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) : v.toLocaleString('pt-BR')) + (unidade !== 'un' ? ' '+unidade : ''));

  // Diferença absoluta com sinal e cor
  const fmtD = (a, b) => {
    if (a === null || b === null) return { txt:'<span style="color:var(--g300)">—</span>', col:'' };
    const diff = a - b;
    const sign = diff > 0 ? '+' : '';
    let txt;
    if (unidade === 'R$')      txt = (diff >= 0 ? '+' : '−') + fmtBRLInt(Math.abs(diff));
    else if (unidade === '%')  txt = sign + diff.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' %';
    else if (unidade === 'un') txt = sign + diff.toLocaleString('pt-BR');
    else                       txt = sign + diff.toLocaleString('pt-BR') + ' ' + unidade;
    return { txt, col: flipC(diff >= 0 ? 'color:var(--success)' : 'color:var(--danger)') };
  };

  // Helper: "menor é melhor"
  const mm      = !!db.indicadores.find(i => i.id === indId)?.menorMelhor;
  const flipC   = c => mm ? (c==='color:var(--success)'?'color:var(--danger)':c==='color:var(--danger)'?'color:var(--success)':c) : c;
  const flipVar = v => (mm && v.cls !== 'neu') ? { ...v, cls: v.cls==='pos'?'neg':'pos' } : v;

  // Top-3 realizados: ano atual + ano anterior combinados (ordem depende da direção)
  const _allReals  = [
    ...meses.map(m => getMeta(indId, m, +ano)?.metaRealizada     ?? null),
    ...meses.map(m => getMeta(indId, m, +ano - 1)?.metaRealizada ?? null),
  ].filter(v => v !== null);
  const _top3      = [...new Set(_allReals)].sort((a, b) => mm ? a - b : b - a).slice(0, 3);
  const _medals    = ['1️⃣', '2️⃣', '3️⃣'];
  const getMedal   = v => { if (v === null) return ''; const r = _top3.indexOf(v); return r >= 0 ? _medals[r]+' ' : ''; };

  let rows = '';
  meses.forEach(mes => {
    const meta = getMeta(indId, mes, +ano);
    const prev = meta?.metaPrevista ?? null;
    const real = meta?.metaRealizada ?? null;
    const ating = (real !== null && prev !== null && prev !== 0) ? +((real/prev)*100).toFixed(1) : null;
    const col   = ating === null ? '' : flipC(ating >= 100 ? 'color:var(--success)' : 'color:var(--danger)');
    const varPR = flipVar((real !== null && prev !== null) ? fmtVar(real, prev) : { txt:'—', cls:'neu' });

    // MoM
    let mesAnt = mes - 1, anoAnt = +ano;
    if (mesAnt < 1) { mesAnt = 12; anoAnt--; }
    const metaAnt = getMeta(indId, mesAnt, anoAnt);
    const varMoM = flipVar((real !== null && metaAnt?.metaRealizada !== null && metaAnt?.metaRealizada !== undefined)
      ? fmtVar(real, metaAnt.metaRealizada) : { txt:'—', cls:'neu' });

    // Diferença do mês (realizado - previsto)
    const dMes = fmtD(real, prev);

    // Colunas YoY — mesmo mês do ano anterior
    const metaYoY   = getMeta(indId, mes, +ano - 1);
    const prevYoY   = metaYoY?.metaPrevista  ?? null;
    const realYoY   = metaYoY?.metaRealizada ?? null;
    const dYoY      = fmtD(real, realYoY);
    const varYoY    = flipVar((real !== null && realYoY !== null && realYoY !== 0)
      ? (()=>{ const pct=((real-realYoY)/Math.abs(realYoY))*100; const s=pct>=0?'+':''; return { txt:(pct>=0?'▲ ':'▼ ')+s+pct.toFixed(1)+'%', cls:pct>=0?'pos':'neg' }; })()
      : { txt:'—', cls:'neu' });
    const colRealYoY = realYoY !== null ? '' : '';
    const acumCol = acum ? `
      <td data-label="BGD Ant." style="text-align:right;color:var(--g600);">${prevYoY !== null ? fmtV(prevYoY) : '<span style="color:var(--g300)">—</span>'}</td>
      <td data-label="Real Ant." style="text-align:right;">${realYoY !== null ? getMedal(realYoY)+fmtV(realYoY) : '<span style="color:var(--g300)">—</span>'}</td>
      <td data-label="YoY R$" style="text-align:right;${dYoY.col};font-weight:600;">${dYoY.txt}</td>
      <td data-label="YoY %" style="text-align:right;border-right:2px solid var(--g300);"><span class="ind-var-val ${varYoY.cls}">${varYoY.txt}</span></td>` : '';

    rows += `<tr>
      <td data-label="Mês" style="font-weight:600;color:var(--g700);white-space:nowrap;border-right:2px solid var(--g300);">${String(mes).padStart(2,'0')}/${ano}</td>
      <td data-label="Previsto" style="text-align:right;">${prev !== null ? fmtV(prev) : '<span style="color:var(--g300)">—</span>'}</td>
      <td data-label="Realizado" style="text-align:right;${col}">${real !== null ? getMedal(real)+fmtV(real) : '<span style="color:var(--g300)">—</span>'}</td>
      <td data-label="Real × BGD" style="text-align:right;${dMes.col};font-weight:600;">${dMes.txt}</td>
      <td data-label="BGD %" style="text-align:right;"><span class="ind-var-val ${varPR.cls}">${varPR.txt}</span></td>
      <td data-label="MoM" style="text-align:right;border-right:2px solid var(--g300);"><span class="ind-var-val ${varMoM.cls}">${varMoM.txt}</span></td>
      ${acumCol}
      <td data-label="" style="text-align:center;white-space:nowrap;">
        <button class="icon-btn" style="width:26px;height:26px;font-size:13px;" onclick="openMetaModal(${indId},${mes},${ano})" title="Lançar meta">✏️</button>
        ${(()=>{
          const cmts    = db.indicadorComentarios.filter(c=>c.indicadorId===indId&&c.mes===mes&&c.ano===+ano);
          const n       = cmts.length;
          const hasAberta = cmts.some(c=>c.status==='Aberta');
          const hasAndo   = !hasAberta && cmts.some(c=>c.status==='Em Andamento');
          const badgeCol  = hasAberta ? '#dc2626' : hasAndo ? '#d97706' : '#16a34a';
          const badge     = n > 0
            ? `<span style="position:absolute;top:-4px;right:-4px;min-width:14px;height:14px;border-radius:7px;background:${badgeCol};color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 2px;line-height:1;">${n}</span>`
            : '';
          return `<button class="icon-btn" style="width:26px;height:26px;font-size:13px;position:relative;" onclick="openComentariosModal(${indId},${mes},${ano})" title="Comentários">💬${badge}</button>`;
        })()}
      </td>
    </tr>`;
  });

  const acumHeader = acum ? `
    <th style="text-align:right;background:var(--g100);">BGD Ano Ant.</th>
    <th style="text-align:right;background:var(--g100);">Real Ano Ant.</th>
    <th style="text-align:right;background:var(--g100);">Var. YoY R$</th>
    <th style="text-align:right;background:var(--g100);border-right:2px solid var(--g300);">Var. YoY %</th>` : '';

  return `<table class="ind-mes-table">
    <thead><tr>
      <th style="border-right:2px solid var(--g300);">Mês</th>
      <th style="text-align:right;">Previsto</th>
      <th style="text-align:right;">Realizado</th>
      <th style="text-align:right;">Real x BGD R$</th>
      <th style="text-align:right;">Real x BGD %</th>
      <th style="text-align:right;border-right:2px solid var(--g300);">MoM</th>
      ${acumHeader}
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* ================================================================
   MAPA ESTRATÉGICO
   ================================================================ */
const SMAP_KEY = 'smap_cfg_v2';   // v2: indicadores como cards
const SMAP_PERSP_DEFAULTS = [
  { id:'EF', tag:'EF', label:'Perspectiva Financeira',  cor:'#1e3a8a' },
  { id:'MI', tag:'MI', label:'Mercado & Clientes',      cor:'#064e3b' },
  { id:'TP', tag:'TP', label:'Processos Internos',      cor:'#4c1d95' },
  { id:'PH', tag:'PH', label:'Pessoas & Aprendizado',   cor:'#831843' },
];

function getSmapCfg() {
  try {
    const raw = localStorage.getItem(SMAP_KEY);
    if (raw) {
      const cfg = JSON.parse(raw);
      // Garante que perspectivas removidas do default sejam excluídas do config salvo
      const validIds = new Set(SMAP_PERSP_DEFAULTS.map(p => p.id));
      if (cfg.perspectivas) cfg.perspectivas = cfg.perspectivas.filter(p => validIds.has(p.id));
      if (!cfg.perspectivas?.length) cfg.perspectivas = JSON.parse(JSON.stringify(SMAP_PERSP_DEFAULTS));
      return { nodes:{}, conexoes:[], ...cfg };
    }
  } catch(e) {}
  return { perspectivas: JSON.parse(JSON.stringify(SMAP_PERSP_DEFAULTS)), nodes:{}, conexoes:[] };
}
function saveSmapCfg(cfg) { try { localStorage.setItem(SMAP_KEY, JSON.stringify(cfg)); } catch(e){} }

function setSmapAno(v)  { smapAnoFiltro  = +v;  renderMapaEstrategico(); }
function setSmapMes(v)  { smapMesFiltro  = +v;  renderMapaEstrategico(); }
function setSmapObj(v)  { smapObjFiltro  = v;   renderMapaEstrategico(); }
function setSmapResp(v) { smapRespFiltro = v;   renderMapaEstrategico(); }

function renderMapaEstrategico() {
  if (!canSee('mapaestrategico')) {
    document.getElementById('pageTitle').textContent = 'Mapa Estratégico';
    document.getElementById('pageSub').textContent   = '';
    document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--g400);">
      <div style="font-size:48px;margin-bottom:16px;">🔒</div>
      <div style="font-size:16px;font-weight:700;color:var(--g700);margin-bottom:8px;">Acesso restrito</div>
      <div style="font-size:13px;">Você não tem permissão para acessar o Mapa Estratégico.</div>
    </div>`;
    return;
  }
  document.getElementById('pageTitle').textContent = '🗺️ Mapa Estratégico';
  document.getElementById('pageSub').textContent   = 'Indicadores posicionados por perspectiva';

  const cfg  = getSmapCfg();
  const now  = new Date();

  // ── Ano/mês de referência ──────────────────────────────
  const anosDisp = [...new Set(db.indicadorMetas.map(m => m.ano))].sort((a,b) => b-a);
  const anoAtual = now.getFullYear();
  if (!anosDisp.includes(anoAtual)) anosDisp.unshift(anoAtual);
  if (!smapAnoFiltro || !anosDisp.includes(smapAnoFiltro)) smapAnoFiltro = anosDisp[0] || anoAtual;

  // Mês de referência: filtro ou último realizado
  let mesRef, anoRef;
  if (smapMesFiltro) {
    mesRef = smapMesFiltro;
    anoRef = smapAnoFiltro;
  } else {
    const ultimo = db.indicadorMetas
      .filter(m => m.metaRealizada !== null && m.ano === smapAnoFiltro)
      .sort((a, b) => b.mes - a.mes)[0];
    mesRef = ultimo ? ultimo.mes : now.getMonth() + 1;
    anoRef = smapAnoFiltro;
  }

  // ── Opções dos selects ─────────────────────────────────
  const anoOpts = anosDisp.map(a =>
    `<option value="${a}" ${smapAnoFiltro===a?'selected':''}>${a}</option>`).join('');

  const mesOpts = MES_NOMES_FULL.map((m, i) =>
    `<option value="${i+1}" ${smapMesFiltro===i+1?'selected':''}>${m}</option>`).join('');

  const objOpts = db.objetivosEstrategicos.map(o =>
    `<option value="${o.id}" ${smapObjFiltro==o.id?'selected':''}>${esc(o.nome)}</option>`).join('');

  const respOpts = db.responsaveis
    .filter(r => db.indicadores.some(i => i.responsavelId === r.id))
    .sort((a,b) => a.nome.localeCompare(b.nome,'pt-BR'))
    .map(r => `<option value="${r.id}" ${smapRespFiltro==r.id?'selected':''}>${esc(r.nome)}</option>`).join('');

  // ── Toolbar de filtros (mesmo estilo dos indicadores) ──
  const toolbar = `
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;
              position:sticky;top:64px;z-index:90;
              background:var(--g50);border-bottom:1px solid var(--g200);
              box-shadow:0 2px 6px rgba(0,0,0,.06);
              padding:10px 24px;margin:0 -24px 20px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Ano:</label>
      <select class="fc" style="height:34px;width:100px;font-size:13px;" onchange="setSmapAno(this.value)">${anoOpts}</select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Mês:</label>
      <select class="fc" style="height:34px;width:150px;font-size:13px;" onchange="setSmapMes(this.value)">
        <option value="0" ${!smapMesFiltro?'selected':''}>Último realizado</option>
        ${mesOpts}
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Objetivo:</label>
      <select class="fc" style="height:34px;min-width:180px;font-size:13px;" onchange="setSmapObj(this.value)">
        <option value="" ${!smapObjFiltro?'selected':''}>Todos</option>
        ${objOpts}
      </select>
    </div>
    ${respOpts ? `
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:12px;color:var(--g600);font-weight:600;">Responsável:</label>
      <select class="fc" style="height:34px;min-width:160px;font-size:13px;" onchange="setSmapResp(this.value)">
        <option value="" ${!smapRespFiltro?'selected':''}>Todos</option>
        ${respOpts}
      </select>
    </div>` : ''}
    ${smapObjFiltro  ? `<button class="btn btn-secondary btn-sm" onclick="setSmapObj('')"  style="height:34px;">✕ Objetivo</button>`    : ''}
    ${smapMesFiltro  ? `<button class="btn btn-secondary btn-sm" onclick="setSmapMes(0)"   style="height:34px;">✕ Mês</button>`         : ''}
    ${smapRespFiltro ? `<button class="btn btn-secondary btn-sm" onclick="setSmapResp('')" style="height:34px;">✕ Responsável</button>` : ''}
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="openSmapConfig()">⚙️ Posicionar</button>
      <button class="btn btn-secondary" onclick="openSmapConnections()">🔗 Conexões</button>
    </div>
  </div>`;

  // ── Aplicar filtros nos indicadores ───────────────────
  let inds = db.indicadores.filter(i =>
    (!smapObjFiltro  || i.objetivoId    == smapObjFiltro) &&
    (!smapRespFiltro || i.responsavelId == smapRespFiltro)
  );

  // ── Legenda de objetivos estratégicos ─────────────────
  const objsVisiveis = smapObjFiltro
    ? db.objetivosEstrategicos.filter(o => o.id == smapObjFiltro)
    : db.objetivosEstrategicos;
  const objLegend = objsVisiveis.length ? `
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;">
      <span style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;">Objetivos:</span>
      ${objsVisiveis.map(o =>
        `<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
                      background:${o.cor||'var(--primary)'}22;color:${o.cor||'var(--primary)'};
                      border:1px solid ${o.cor||'var(--primary)'}44;">${esc(o.nome)}</span>`
      ).join('')}
    </div>` : '';

  // ── Swim lanes ────────────────────────────────────────
  const cfg2     = getSmapCfg();
  const assigned = new Set(Object.keys(cfg2.nodes));
  let lanesHtml  = '';

  cfg2.perspectivas.forEach(p => {
    const pInds = inds.filter(i => cfg2.nodes[String(i.id)]?.perspId === p.id);
    lanesHtml += `
    <div class="smap-persp" data-persp="${p.id}">
      <div class="smap-persp-lbl" style="background:${p.cor};">
        <span class="smap-persp-tag">${esc(p.tag)}</span>
        <span class="smap-persp-name">${esc(p.label)}</span>
      </div>
      <div class="smap-persp-nodes" id="smap-lane-${p.id}">
        ${pInds.length
          ? pInds.map(i => buildSmapCard(i, p.cor, mesRef, anoRef)).join('')
          : `<div style="font-size:11px;color:var(--g300);font-style:italic;">Nenhum indicador atribuído</div>`
        }
      </div>
    </div>`;
  });

  // Indicadores sem perspectiva (somente os que passaram nos filtros)
  const unassigned = inds.filter(i => !assigned.has(String(i.id)));
  if (unassigned.length) {
    lanesHtml += `
    <div class="smap-persp" style="background:var(--g50);">
      <div class="smap-persp-lbl" style="background:var(--g300);">
        <span class="smap-persp-tag" style="font-size:11px;">—</span>
        <span class="smap-persp-name">Não posicionado</span>
      </div>
      <div class="smap-persp-nodes" id="smap-lane-unassigned">
        ${unassigned.map(i => buildSmapCard(i, 'var(--g400)', mesRef, anoRef)).join('')}
      </div>
    </div>`;
  }

  const emptyMsg = !db.indicadores.length ? `
    <div class="smap-empty">
      <div style="font-size:40px;margin-bottom:12px;">🗺️</div>
      <div style="font-size:15px;font-weight:700;color:var(--g600);">Nenhum indicador cadastrado.</div>
      <div style="font-size:13px;margin-top:6px;color:var(--g400);">Cadastre indicadores e associe-os a objetivos estratégicos.</div>
    </div>` : (!inds.length ? `
    <div class="smap-empty">
      <div style="font-size:36px;margin-bottom:12px;">🔍</div>
      <div style="font-size:15px;font-weight:700;color:var(--g600);">Nenhum indicador para os filtros selecionados.</div>
    </div>` : '');

  const posicionados = inds.filter(i => assigned.has(String(i.id))).length;

  document.getElementById('content').innerHTML = `
  ${toolbar}
  ${objLegend}
  <div class="smap-wrap" id="smapWrap">
    <svg class="smap-arrows" id="smapSvg" width="100%" height="100%"></svg>
    ${emptyMsg || lanesHtml}
  </div>
  <div id="smapNodePanel"></div>`;

  if (inds.length) setTimeout(drawSmapArrows, 150);
}

/* Constrói um card de INDICADOR para o mapa */
function buildSmapCard(ind, borderColor, mesRef, anoRef) {
  const obj  = ind.objetivoId ? db.objetivosEstrategicos.find(o => o.id === ind.objetivoId) : null;
  const m    = getMeta(ind.id, mesRef, anoRef);
  const real = m?.metaRealizada ?? null;
  const prev = m?.metaPrevista  ?? null;

  let ico = '⚪', col = 'var(--g500)';
  if (real !== null && prev !== null) {
    const ok = ind.menorMelhor ? real <= prev : real >= prev;
    ico = ok ? '🟢' : '🔴'; col = ok ? '#16a34a' : '#dc2626';
  }
  const pct = (real !== null && prev !== null && prev !== 0)
    ? ((real / prev) * 100).toFixed(1) + '%' : null;

  const fmtV = (v, u) => {
    if (v === null) return '<span style="color:var(--g300)">—</span>';
    if (u === 'R$') return fmtBRLInt(v);
    if (u === '%')  return v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
    return v.toLocaleString('pt-BR') + (u !== 'un' ? '&nbsp;'+u : '');
  };

  const objTag = obj
    ? `<div class="smap-obj-tag" style="background:${obj.cor||'var(--primary)'}18;color:${obj.cor||'var(--primary)'};border-color:${obj.cor||'var(--primary)'}33;">
         ${esc(obj.nome)}
       </div>`
    : '';

  return `
  <div class="smap-node" id="smap-node-${ind.id}"
       style="border-left-color:${borderColor||'var(--primary)'};"
       onclick="goToIndicador(${ind.id})">
    ${objTag}
    <div class="smap-node-head">
      <span class="smap-ind-status-ico">${ico}</span>
      <div class="smap-node-title">${esc(ind.nome)}</div>
    </div>
    <div class="smap-node-vals">
      <div class="smap-val-row">
        <span class="smap-val-lbl">BGD</span>
        <span class="smap-val-num">${fmtV(prev, ind.unidade)}</span>
      </div>
      <div class="smap-val-row">
        <span class="smap-val-lbl">Real</span>
        <span class="smap-val-num" style="color:${col};font-weight:800;">${fmtV(real, ind.unidade)}</span>
        ${pct ? `<span style="font-size:9px;font-weight:700;color:${col};margin-left:3px;">${pct}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function goToIndicador(indId) {

}

function drawSmapArrows() {
  const svg  = document.getElementById('smapSvg');
  const wrap = document.getElementById('smapWrap');
  if (!svg || !wrap) return;
  const cfg     = getSmapCfg();
  if (!cfg.conexoes.length) { svg.innerHTML = ''; return; }

  const wRect = wrap.getBoundingClientRect();
  const W     = wrap.offsetWidth;
  const H     = wrap.offsetHeight;
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  let paths = '';
  cfg.conexoes.forEach(({ from, to }) => {
    const fEl = document.getElementById(`smap-node-${from}`);
    const tEl = document.getElementById(`smap-node-${to}`);
    if (!fEl || !tEl) return;
    const fr = fEl.getBoundingClientRect();
    const tr = tEl.getBoundingClientRect();
    const x1 = fr.left - wRect.left + fr.width  / 2;
    const y1 = fr.top  - wRect.top  + fr.height;
    const x2 = tr.left - wRect.left + tr.width  / 2;
    const y2 = tr.top  - wRect.top;
    const mid = (y1 + y2) / 2;
    paths += `<path d="M ${x1} ${y1} C ${x1} ${mid}, ${x2} ${mid}, ${x2} ${y2}"
      fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6,3"
      marker-end="url(#smap-arrow)" opacity="0.75"/>`;
  });

  svg.innerHTML = `
  <defs>
    <marker id="smap-arrow" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  ${paths}`;
}

/* ── Config: posicionar indicadores em perspectivas ─── */
function openSmapConfig() {
  const cfg  = getSmapCfg();
  const inds = db.indicadores;
  const objs = db.objetivosEstrategicos;

  // Perspectivas com picker de cor
  const perspRows = cfg.perspectivas.map((p, i) => `
  <div class="smap-cfg-persp-row">
    <input type="color" value="${p.cor}" id="smap-pcor-${i}"
      style="width:32px;height:30px;border:1px solid var(--g200);border-radius:5px;cursor:pointer;padding:1px 2px;flex-shrink:0;">
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:700;color:var(--g800);">${esc(p.tag)} — ${esc(p.label)}</div>
    </div>
  </div>`).join('');

  // Agrupar indicadores por objetivo para exibição
  const grupos = [];
  inds.forEach(ind => {
    const objId = ind.objetivoId || null;
    let g = grupos.find(x => x.objId === objId);
    if (!g) { g = { objId, inds:[] }; grupos.push(g); }
    g.inds.push(ind);
  });

  const indRows = grupos.map(g => {
    const obj = g.objId ? objs.find(o => o.id === g.objId) : null;
    const header = `
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
                padding:10px 0 5px;color:${obj?.cor||'var(--g500)'};border-bottom:2px solid ${obj?.cor||'var(--g200)'}22;
                margin-top:8px;">
      ${obj ? `<span style="background:${obj.cor||'var(--primary)'}18;border:1px solid ${obj.cor||'var(--primary)'}33;border-radius:20px;padding:1px 8px;">${esc(obj.nome)}</span>` : '— Sem objetivo vinculado'}
    </div>`;
    const rows = g.inds.map(ind => {
      const cur  = cfg.nodes[String(ind.id)]?.perspId || '';
      const opts = `<option value="">— Sem perspectiva —</option>` +
        cfg.perspectivas.map(p =>
          `<option value="${p.id}" ${cur===p.id?'selected':''}>${p.tag} — ${p.label}</option>`
        ).join('');
      return `
      <div class="smap-cfg-obj-row">
        <div style="flex:1;font-size:13px;font-weight:600;color:var(--g800);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(ind.nome)}</div>
        <select id="smap-ind-${ind.id}"
          style="border:1px solid var(--g300);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--g700);max-width:185px;flex-shrink:0;">
          ${opts}
        </select>
      </div>`;
    }).join('');
    return header + rows;
  }).join('');

  openModal(`
  <div class="modal-head">
    <div class="modal-title">⚙️ Posicionar Indicadores no Mapa</div>
    <button class="icon-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" style="max-height:72vh;overflow-y:auto;">
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--g500);letter-spacing:.06em;margin-bottom:8px;">Perspectivas (cor)</div>
    ${perspRows}
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--g500);letter-spacing:.06em;margin:18px 0 4px;">Atribuir Indicadores às Perspectivas</div>
    <div style="font-size:12px;color:var(--g400);margin-bottom:10px;">Indicadores agrupados por Objetivo Estratégico</div>
    ${inds.length ? indRows : `<div style="font-size:13px;color:var(--g400);font-style:italic;">Nenhum indicador cadastrado.</div>`}
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveSmapPerspConfig()">💾 Salvar</button>
  </div>`);
}

function saveSmapPerspConfig() {
  const cfg  = getSmapCfg();
  // Salva cores
  cfg.perspectivas.forEach((p, i) => {
    const el = document.getElementById(`smap-pcor-${i}`);
    if (el) p.cor = el.value;
  });
  // Salva posicionamento dos indicadores
  db.indicadores.forEach(ind => {
    const sel = document.getElementById(`smap-ind-${ind.id}`);
    if (!sel) return;
    if (sel.value) cfg.nodes[String(ind.id)] = { perspId: sel.value };
    else delete cfg.nodes[String(ind.id)];
  });
  saveSmapCfg(cfg);
  closeModal();
  renderMapaEstrategico();
}

      </div>
      <div style="font-size:18px;color:var(--g400);padding-bottom:6px;">→</div>

        <div style="font-size:11px;font-weight:700;color:var(--g500);margin-bottom:4px;">PARA (efeito)</div>
        <select id="smap-conn-to" style="width:100%;border:1px solid var(--g300);border-radius:6px;padding:6px 8px;font-size:12px;">${opts}</select>
      </div>
      <button class="btn btn-primary" onclick="smapAddConn()" style="flex-shrink:0;">＋ Adicionar</button>
    </div>
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--g500);letter-spacing:.06em;margin-bottom:8px;">Conexões definidas</div>
    <div id="smap-conn-list"></div>
  </div>
  <div class="modal-foot">

    <button class="btn btn-primary" onclick="saveSmapConns()">💾 Salvar Conexões</button>
  </div>`);
  smapRenderConnList();
}

function smapRenderConnList() {
  const inds = db.indicadores;
  const el   = document.getElementById('smap-conn-list');
  if (!el) return;
  if (!_smapConnCfg.conexoes.length) {
    el.innerHTML = `<div style="font-size:12px;color:var(--g400);font-style:italic;padding:8px 0;">Nenhuma conexão definida ainda.</div>`;
    return;
  }
  el.innerHTML = _smapConnCfg.conexoes.map((c, idx) => {
    const fi = inds.find(i => i.id === c.from);
    const ti = inds.find(i => i.id === c.to);
    return `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g100);">
      <div style="flex:1;font-size:13px;color:var(--g700);min-width:0;">
        <strong style="color:var(--g800);">${fi ? esc(fi.nome) : '?'}</strong>
        <span style="color:var(--g400);margin:0 6px;">→</span>
        <strong style="color:var(--g800);">${ti ? esc(ti.nome) : '?'}</strong>
      </div>
      <button class="icon-btn del" style="width:24px;height:24px;font-size:11px;flex-shrink:0;"
        onclick="smapDelConn(${idx})">🗑️</button>
    </div>`;
  }).join('');
}

function smapAddConn() {
  const from = +document.getElementById('smap-conn-from')?.value;
  const to   = +document.getElementById('smap-conn-to')?.value;
  if (!from || !to || from === to) return;
  const dup = _smapConnCfg.conexoes.some(c => c.from === from && c.to === to);
  if (!dup) _smapConnCfg.conexoes.push({ from, to });
  smapRenderConnList();
}

function smapDelConn(idx) {
  _smapConnCfg.conexoes.splice(idx, 1);
  smapRenderConnList();
}

function saveSmapConns() {
  saveSmapCfg(_smapConnCfg);
  closeModal();
  renderMapaEstrategico();
}

/* ================================================================
   GRID DE ANOTAÇÕES
   ================================================================ */
function renderAnotacoes() {
  document.getElementById('pageTitle').textContent = '💬 Anotações';
  document.getElementById('pageSub').textContent   = 'Comentários e observações dos indicadores';

  const statusCfg = {
    'Aberta':       { bg:'#fef2f2', col:'#dc2626', border:'#fca5a5' },
    'Em Andamento': { bg:'#fffbeb', col:'#d97706', border:'#fcd34d' },
    'Concluída':    { bg:'#f0fdf4', col:'#16a34a', border:'#86efac' },
    'Comentário':   { bg:'#dbeafe', col:'#1d4ed8', border:'#93c5fd' },
  };
  const badge = s => {
    const c = statusCfg[s] || { bg:'var(--g100)', col:'var(--g600)', border:'var(--g200)' };
    return `<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${c.bg};color:${c.col};border:1px solid ${c.border};font-weight:700;white-space:nowrap;">${s}</span>`;
  };

  // ── Filtros ──────────────────────────────────────────────────
  let cmts = db.indicadorComentarios.slice();
  if (anotFiltroStatus) cmts = cmts.filter(c => c.status === anotFiltroStatus);
  if (anotFiltroIndId)  cmts = cmts.filter(c => c.indicadorId === +anotFiltroIndId);
  if (anotFiltroAno)    cmts = cmts.filter(c => c.ano === +anotFiltroAno);
  if (anotFiltroMes)    cmts = cmts.filter(c => c.mes === +anotFiltroMes);
  if (anotFiltroResp) {
    cmts = cmts.filter(c => {
      const ind = db.indicadores.find(i => i.id === c.indicadorId);
      return ind?.responsavelId === +anotFiltroResp;
    });
  }
  if (anotFiltroDesc) {
    const q = anotFiltroDesc.toLowerCase();
    cmts = cmts.filter(c => c.descricao.toLowerCase().includes(q));
  }

  // ── Opções dos selects ───────────────────────────────────────
  const indOpts = db.indicadores
    .map(i => `<option value="${i.id}" ${anotFiltroIndId==i.id?'selected':''}>${esc(i.nome)}</option>`)
    .join('');
  const anos    = [...new Set(db.indicadorComentarios.map(c=>c.ano))].sort((a,b)=>b-a);
  const anoOpts = anos.map(a=>`<option value="${a}" ${anotFiltroAno==a?'selected':''}>${a}</option>`).join('');
  const mesOpts = MES_NOMES_FULL.map((n,i)=>`<option value="${i+1}" ${anotFiltroMes==i+1?'selected':''}>${n}</option>`).join('');
  // Responsáveis que possuem pelo menos um indicador com comentário
  const respIdsComCmt = new Set(
    db.indicadorComentarios.map(c => db.indicadores.find(i=>i.id===c.indicadorId)?.responsavelId).filter(Boolean)
  );
  const respOpts = db.responsaveis
    .filter(r => respIdsComCmt.has(r.id))
    .sort((a,b) => a.nome.localeCompare(b.nome,'pt-BR'))
    .map(r => `<option value="${r.id}" ${anotFiltroResp==r.id?'selected':''}>${esc(r.nome)}</option>`)
    .join('');

  const totalGeral  = db.indicadorComentarios.length;
  const totalAberta = db.indicadorComentarios.filter(c=>c.status==='Aberta').length;
  const totalAndo   = db.indicadorComentarios.filter(c=>c.status==='Em Andamento').length;
  const totalConc   = db.indicadorComentarios.filter(c=>c.status==='Concluída').length;
  const totalComent = db.indicadorComentarios.filter(c=>c.status==='Comentário').length;
  const hasFilter   = anotFiltroStatus||anotFiltroIndId||anotFiltroAno||anotFiltroMes||anotFiltroResp||anotFiltroDesc;

  // ── Agrupamento: indicador → ano → mês ───────────────────────
  // Ordena por indicador nome → ano desc → mês desc → data desc
  cmts.sort((a,b) => {
    const nA = db.indicadores.find(i=>i.id===a.indicadorId)?.nome||'';
    const nB = db.indicadores.find(i=>i.id===b.indicadorId)?.nome||'';
    if (nA !== nB) return nA.localeCompare(nB, 'pt-BR');
    if (b.ano !== a.ano) return b.ano - a.ano;
    if (b.mes !== a.mes) return b.mes - a.mes;
    return (b.data||'') > (a.data||'') ? 1 : -1;
  });

  // Monta grupos
  const grupos = []; // [ { ind, anos: [ { ano, meses: [ { mes, rows: [] } ] } ] } ]
  cmts.forEach(c => {
    const ind = db.indicadores.find(i => i.id === c.indicadorId);
    let gi = grupos.find(g => g.indId === c.indicadorId);
    if (!gi) { gi = { indId: c.indicadorId, ind, anos: [] }; grupos.push(gi); }
    let ga = gi.anos.find(a => a.ano === c.ano);
    if (!ga) { ga = { ano: c.ano, meses: [] }; gi.anos.push(ga); }
    let gm = ga.meses.find(m => m.mes === c.mes);
    if (!gm) { gm = { mes: c.mes, rows: [] }; ga.meses.push(gm); }
    gm.rows.push(c);
  });

  // ── Renderiza linhas agrupadas ────────────────────────────────
  const COLS = 5;
  let listaHtml = '';

  if (grupos.length === 0) {
    listaHtml = `<tr><td colspan="${COLS}" style="text-align:center;padding:48px 20px;color:var(--g400);">
      <div style="font-size:36px;margin-bottom:10px;">💬</div>
      <div style="font-size:13px;font-weight:600;">Nenhuma anotação encontrada</div>
      <div style="font-size:11px;margin-top:4px;">Ajuste os filtros ou adicione comentários nos indicadores.</div>
    </td></tr>`;
  } else {
    grupos.forEach(gi => {
      const resp = gi.ind?.responsavelId ? db.responsaveis.find(r => r.id === gi.ind.responsavelId) : null;
      const total = gi.anos.reduce((s,a)=>s+a.meses.reduce((s2,m)=>s2+m.rows.length,0),0);
      // Cabeçalho do indicador
      listaHtml += `<tr style="background:#FFF0EB;border-top:2px solid var(--primary)40;">
        <td colspan="${COLS}" style="padding:9px 14px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:13px;font-weight:700;color:var(--primary);">📊 ${esc(gi.ind?.nome||'—')}</span>
            <span style="font-size:11px;color:var(--g400);">${total} comentário${total!==1?'s':''}</span>
            ${resp ? `<span style="display:inline-flex;align-items:center;gap:5px;margin-left:auto;font-size:11px;color:var(--g600);">
              <span style="width:20px;height:20px;border-radius:50%;background:${avatarColor(resp.id)};color:#fff;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;">${initials(resp.nome)}</span>
              ${esc(resp.nome)}
            </span>` : ''}
          </div>
        </td>
      </tr>`;
      gi.anos.forEach(ga => {
        // Cabeçalho do ano
        listaHtml += `<tr style="background:var(--g50);border-top:1px solid var(--g200);">
          <td colspan="${COLS}" style="padding:6px 14px 6px 28px;font-size:11px;font-weight:700;color:var(--g600);">
            📅 ${ga.ano}
          </td>
        </tr>`;
        ga.meses.forEach(gm => {
          const mesNome = MES_NOMES_FULL[gm.mes - 1];
          // Cabeçalho do mês
          listaHtml += `<tr style="background:#fafafa;border-top:1px solid var(--g100);">
            <td colspan="${COLS}" style="padding:5px 14px 5px 42px;font-size:11px;font-weight:600;color:var(--g500);">
              ${mesNome}
            </td>
          </tr>`;
          // Linhas de comentário
          gm.rows.forEach(c => {
            const dataFmt = c.data ? new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR') : '—';
            listaHtml += `<tr style="border-top:1px solid var(--g100);transition:background .12s;"
                onmouseover="this.style.background='#f8f8ff'" onmouseout="this.style.background=''">
              <td style="padding:9px 12px 9px 56px;font-size:12px;color:var(--g600);white-space:nowrap;">
                ${resp ? `<span style="display:inline-flex;align-items:center;gap:5px;">
                  <span style="width:20px;height:20px;border-radius:50%;background:${avatarColor(resp.id)};color:#fff;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${initials(resp.nome)}</span>
                  ${esc(resp.nome)}
                </span>` : '<span style="color:var(--g300);">—</span>'}
              </td>
              <td style="padding:9px 12px;font-size:12px;color:var(--g500);white-space:nowrap;">${dataFmt}</td>
              <td style="padding:9px 12px;font-size:12px;color:var(--g700);">${esc(c.descricao)}</td>
              <td style="padding:9px 12px;white-space:nowrap;">${badge(c.status)}</td>
              <td style="padding:9px 12px;white-space:nowrap;">
                <div style="display:flex;align-items:center;gap:4px;">
                  <select onchange="changeComentarioStatus(${c.id},this.value)"
                    style="font-size:11px;padding:2px 4px;border:1px solid var(--g200);border-radius:4px;background:var(--white);color:var(--g700);cursor:pointer;">
                    ${['Aberta','Em Andamento','Concluída','Comentário'].map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s}</option>`).join('')}
                  </select>
                  <button class="icon-btn" style="width:22px;height:22px;font-size:11px;" title="Editar" onclick="editComentario(${c.id})">✏️</button>
                  <button class="icon-btn" style="width:22px;height:22px;font-size:11px;" title="Excluir" onclick="deleteComentarioGrid(${c.id})">🗑️</button>
                </div>
              </td>
            </tr>`;
          });
        });
      });
    });
  }

  document.getElementById('content').innerHTML = `
  <div style="padding:0 0 32px;">
    <!-- Resumo de totais -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">
      ${[
        { label:'Total',        val:totalGeral,  col:'var(--primary)', bg:'#FFF0EB', fs:"anotFiltroStatus='';renderAnotacoes()" },
        { label:'Abertas',      val:totalAberta, col:'#dc2626', bg:'#fef2f2', fs:"anotFiltroStatus='Aberta';renderAnotacoes()" },
        { label:'Em Andamento', val:totalAndo,   col:'#d97706', bg:'#fffbeb', fs:"anotFiltroStatus='Em Andamento';renderAnotacoes()" },
        { label:'Concluídas',   val:totalConc,   col:'#16a34a', bg:'#f0fdf4', fs:"anotFiltroStatus='Conclu%C3%ADda';renderAnotacoes()" },
        { label:'Comentário',   val:totalComent, col:'#1d4ed8', bg:'#dbeafe', fs:"anotFiltroStatus='Coment%C3%A1rio';renderAnotacoes()" },
      ].map(k=>`
        <div onclick="${k.fs}" style="background:${k.bg};border:1px solid ${k.col}30;border-radius:var(--r);
             padding:12px 14px;cursor:pointer;transition:transform .1s,box-shadow .1s;"
             onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,.08)'"

          <div style="font-size:22px;font-weight:800;color:${k.col};">${k.val}</div>
          <div style="font-size:11px;color:${k.col};font-weight:600;margin-top:2px;">${k.label}</div>

      </select>
      <select class="fc" style="font-size:12px;padding:5px 10px;width:auto;"
        onchange="anotFiltroMes=this.value;renderAnotacoes()">
        <option value="">Todos os meses</option>${mesOpts}

      <span style="font-size:12px;color:var(--g400);">${cmts.length} anotaç${cmts.length===1?'ão':'ões'}${hasFilter?' (filtrado)':''}</span>
      ${hasFilter ? `<button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;margin-left:auto;"
        onclick="anotFiltroStatus='';anotFiltroIndId='';anotFiltroAno='';anotFiltroMes='';anotFiltroResp='';anotFiltroDesc='';renderAnotacoes()">
        ✕ Limpar filtros</button>` : ''}
    </div>

    <!-- Tabela agrupada -->
    <div style="background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--g50);border-bottom:1px solid var(--g200);">
            <th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g600);text-align:left;white-space:nowrap;">Responsável</th>
            <th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g600);text-align:left;white-space:nowrap;">Data</th>
            <th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g600);text-align:left;">Comentário</th>
            <th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g600);text-align:left;white-space:nowrap;">Status</th>
            <th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g600);text-align:left;white-space:nowrap;">Ações</th>
          </tr>
          <!-- Filtros por coluna -->
          <tr style="background:#fafafa;border-bottom:2px solid var(--g200);">
            <td style="padding:5px 8px;">
              <select onchange="anotFiltroResp=this.value;renderAnotacoes()"
                style="width:100%;font-size:11px;padding:4px 6px;border:1px solid var(--g200);border-radius:4px;background:var(--white);color:var(--g700);box-sizing:border-box;">
                <option value="" ${!anotFiltroResp?'selected':''}>Todos</option>
                ${respOpts}
              </select>
            </td>
            <td style="padding:5px 8px;"></td>
            <td style="padding:5px 8px;">
              <input type="text" value="${esc(anotFiltroDesc)}" placeholder="Buscar no comentário..."
                oninput="anotFiltroDesc=this.value;renderAnotacoes()"
                style="width:100%;font-size:11px;padding:4px 6px;border:1px solid var(--g200);border-radius:4px;box-sizing:border-box;">
            </td>
            <td style="padding:5px 8px;">
              <select onchange="anotFiltroStatus=this.value;renderAnotacoes()"
                style="width:100%;font-size:11px;padding:4px 6px;border:1px solid var(--g200);border-radius:4px;background:var(--white);color:var(--g700);">
                <option value="" ${!anotFiltroStatus?'selected':''}>Todos</option>
                <option value="Aberta"       ${anotFiltroStatus==='Aberta'?'selected':''}>Aberta</option>
                <option value="Em Andamento" ${anotFiltroStatus==='Em Andamento'?'selected':''}>Em Andamento</option>
                <option value="Concluída"    ${anotFiltroStatus==='Concluída'?'selected':''}>Concluída</option>

            </td>
            <td style="padding:5px 8px;"></td>
          </tr>
        </thead>
        <tbody>${listaHtml}</tbody>

    </div>
  </div>`;
}

function anotSetFiltro(key, val) {
  if (key==='status') anotFiltroStatus = val;
  if (key==='indId')  anotFiltroIndId  = val;
  if (key==='ano')    anotFiltroAno    = val;
  if (key==='mes')    anotFiltroMes    = val;
  renderAnotacoes();
}

async function changeComentarioStatus(id, novoStatus) {
  const c = db.indicadorComentarios.find(x => x.id === id);
  if (!c) return;
  try {
    await sbUpdate('indicador_comentarios', id, { status: novoStatus });
    c.status = novoStatus;
    renderAnotacoes();
    toast('Status atualizado!');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function deleteComentarioGrid(id) {
  if (!confirm('Excluir esta anotação?')) return;
  try {
    await sbDelete('indicador_comentarios', id);
    await reloadTable('indicadorComentarios');
    toast('Anotação excluída.');
    renderAnotacoes();
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

function editComentario(id, indId=null, mes=null, ano=null) {
  const c   = db.indicadorComentarios.find(x => x.id === id);
  const ind = c ? db.indicadores.find(i => i.id === c.indicadorId) : null;
  if (!c) return;
  // Se veio do modal de comentários, usa os parâmetros passados; senão usa os do comentário
  const retIndId = indId ?? c.indicadorId;
  const retMes   = mes   ?? c.mes;
  const retAno   = ano   ?? c.ano;
  const fromModal = !!(indId && mes && ano);
  const sOpts = ['Aberta','Em Andamento','Concluída','Comentário']
    .map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s}</option>`).join('');
  const cancelAction = fromModal
    ? `openComentariosModal(${retIndId},${retMes},${retAno})`
    : `closeModal()`;
  openModal(`
  <div class="modal-head">
    <div class="modal-title">✏️ Editar Anotação — ${esc(ind?.nome||'')}</div>
    <button class="modal-x" onclick="${cancelAction}">✕</button>
  </div>
  <div class="modal-body">
    <div class="fg"><label class="lbl">Título</label>
      <input id="ea_titulo" class="fc" type="text" value="${esc(c.titulo||'')}" placeholder="Título resumido (opcional)..."></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr;">
      <div class="fg"><label class="lbl">Data</label>
        <input id="ea_data" class="fc" type="date" value="${c.data||''}"></div>
      <div class="fg"><label class="lbl">Status</label>
        <select id="ea_status" class="fc">${sOpts}</select></div>
    </div>
    <div class="fg"><label class="lbl">Comentário <span class="req">*</span></label>
      <textarea id="ea_desc" class="fc" rows="5"
        style="resize:vertical;min-height:100px;font-family:inherit;line-height:1.55;">${esc(c.descricao)}</textarea></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="${cancelAction}">Cancelar</button>
    <button class="btn btn-primary" id="btnSvEdit" onclick="saveEditComentario(${id},${retIndId},${retMes},${retAno},${fromModal})">💾 Salvar</button>
  </div>`);
  setTimeout(()=>document.getElementById('ea_titulo')?.focus(), 100);
}

async function saveEditComentario(id, retIndId, retMes, retAno, fromModal) {
  const titulo = document.getElementById('ea_titulo')?.value.trim();
  const data   = document.getElementById('ea_data')?.value.trim();
  const status = document.getElementById('ea_status')?.value;
  const desc   = document.getElementById('ea_desc')?.value.trim();
  if (!desc) { alert('O comentário é obrigatório.'); return; }
  const btn = document.getElementById('btnSvEdit');
  btn.disabled=true; btn.textContent='Salvando...';
  try {
    await sbUpdate('indicador_comentarios', id, { titulo:titulo||null, data:data||null, status, descricao:desc });
    await reloadTable('indicadorComentarios');
    toast('Anotação atualizada!');
    if (fromModal) {
      openComentariosModal(retIndId, retMes, retAno);
    } else {
      closeModal();
      renderAnotacoes();
    }
  } catch(e) { toast('Erro: '+e.message,'err'); btn.disabled=false; btn.textContent='💾 Salvar'; }
}

let agmRelAno    = window._indAnoDefault || new Date().getFullYear();
let agmRelMes    = window._indMesDefault || new Date().getMonth() + 1;
let agmRelRespId = '';
let agmRelObjId  = '';

function renderAgmRelatorio() {
  document.getElementById('pageTitle').textContent = '📄 Relatório AGM';
  document.getElementById('pageSub').textContent   = 'Painel completo por responsável · mês · ano';
  document.getElementById('topbarActions').innerHTML = '';

  const anoAtual = new Date().getFullYear();
  const anos = [anoAtual-2, anoAtual-1, anoAtual, anoAtual+1];
  const anoOpts = anos.map(a =>
    `<option value="${a}" ${a===agmRelAno?'selected':''}>${a}</option>`).join('');
  const mesOpts = MES_NOMES_FULL.map((m,i) =>
    `<option value="${i+1}" ${(i+1)===agmRelMes?'selected':''}>${m}</option>`).join('');
  const respOpts = db.responsaveis
    .slice().sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'))
    .map(r => `<option value="${r.id}" ${agmRelRespId==r.id?'selected':''}>${esc(r.nome)}</option>`)
    .join('');
  const objOpts = db.objetivosEstrategicos
    .slice().sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'))
    .map(o => `<option value="${o.id}" ${agmRelObjId==o.id?'selected':''}>${esc(o.nome)}</option>`)
    .join('');

  // ── Filtros ───────────────────────────────────────────────────
  const filtersHtml = `
  <div class="agmrel-filters" style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;
       margin-bottom:24px;padding:14px 18px;background:#fff;border:1px solid var(--g200);border-radius:10px;">
    <span style="font-size:12px;font-weight:700;color:var(--g600);">🔎 Filtrar:</span>
    <select onchange="agmRelRespId=this.value;renderAgmRelatorio()"
      style="border:1px solid var(--g300);border-radius:7px;padding:6px 10px;font-size:13px;min-width:160px;color:var(--g800);">
      <option value="">Todos os Responsáveis</option>${respOpts}
    </select>
    <select onchange="agmRelObjId=this.value;renderAgmRelatorio()"
      style="border:1px solid var(--g300);border-radius:7px;padding:6px 10px;font-size:13px;min-width:160px;color:var(--g800);">
      <option value="">Todos os Objetivos</option>${objOpts}
    </select>
    <select onchange="agmRelMes=+this.value;renderAgmRelatorio()"
      style="border:1px solid var(--g300);border-radius:7px;padding:6px 10px;font-size:13px;color:var(--g800);">
      ${mesOpts}
    </select>
    <select onchange="agmRelAno=+this.value;renderAgmRelatorio()"
      style="border:1px solid var(--g300);border-radius:7px;padding:6px 10px;font-size:13px;color:var(--g800);">
      ${anoOpts}
    </select>
    <button class="agmrel-export-btn btn btn-primary" onclick="exportAgmPdf()"
      style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      🖨️ Exportar PDF
    </button>
  </div>`;

  // ── Indicadores filtrados ─────────────────────────────────────
  let inds = db.indicadores.slice();
  if (agmRelRespId) inds = inds.filter(i => i.responsavelId === +agmRelRespId);
  if (agmRelObjId)  inds = inds.filter(i => i.objetivoId    === +agmRelObjId);
  inds.sort((a,b) => a.nome.localeCompare(b.nome,'pt-BR'));

  if (!inds.length) {
    document.getElementById('content').innerHTML = filtersHtml +
      `<div style="text-align:center;padding:60px 20px;color:var(--g400);">
        <div style="font-size:40px;margin-bottom:12px;">📊</div>
        <div style="font-size:15px;font-weight:700;color:var(--g600);">Nenhum indicador encontrado para os filtros selecionados.</div>
      </div>`;
    return;
  }

  // ── Seções AGM por responsável (cabeçalho do grupo) ───────────
  const agmSecConfig = [
    { tipo:'principais_resultados', label:'🏆 Principais Resultados', cor:'#15803d', bg:'#f0fdf4', brd:'#bbf7d0' },
    { tipo:'problemas_riscos',       label:'⚠️ Problemas / Riscos',    cor:'#b91c1c', bg:'#fef2f2', brd:'#fecaca' },
    { tipo:'prioridades',            label:'🎯 Prioridades Próximo Mês / Updates', cor:'#1d4ed8', bg:'#eff6ff', brd:'#bfdbfe' },
  ];

  const buildAgmSections = (respId) => {
    const registros = db.agmRegistros.filter(r =>
      r.responsavelId === respId && r.ano === agmRelAno && r.mes === agmRelMes);
    if (!registros.length) return '';
    return `
    <div class="agmrel-card" style="border-left:4px solid #1d4ed8;">
      <div class="agmrel-card-title" style="margin-bottom:14px;">📋 AGM — ${MES_NOMES_FULL[agmRelMes-1]}/${agmRelAno}</div>
      <div class="agmrel-sec-grid">
        ${agmSecConfig.map(s => {
          const itens = registros.filter(r => r.tipo === s.tipo);
          return `
          <div class="agmrel-sec" style="border:1px solid ${s.brd};display:flex;flex-direction:column;">
            <div class="agmrel-sec-head" style="background:${s.bg};color:${s.cor};">${s.label}</div>
            <div class="agmrel-sec-body" style="background:#fafafa;flex:1;">
              ${itens.length
                ? itens.map(r => `<div class="agmrel-sec-item" style="border-left-color:${s.cor};">${esc(r.conteudo)}</div>`).join('')
                : `<span style="font-size:12px;color:var(--g300);font-style:italic;">Sem registros.</span>`}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  };

  // ── Montagem do relatório ─────────────────────────────────────
  // Agrupa indicadores por responsável
  const grupos = [];
  inds.forEach(ind => {
    const respId = ind.responsavelId || null;
    let g = grupos.find(x => x.respId === respId);
    if (!g) { g = { respId, inds:[] }; grupos.push(g); }
    g.inds.push(ind);
  });

  let reportHtml = '';

  grupos.forEach(({ respId, inds: gInds }, gIdx) => {
    const resp = respId ? db.responsaveis.find(r => r.id === respId) : null;

    // Cabeçalho do responsável
    reportHtml += `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;
                border-bottom:3px solid var(--primary);page-break-before:${gIdx>0?'always':'auto'};">
      ${resp ? `<div class="avatar" style="width:40px;height:40px;font-size:15px;background:${avatarColor(resp.id)};flex-shrink:0;">${initials(resp.nome)}</div>` : ''}
      <div>
        <div style="font-size:18px;font-weight:900;color:var(--g900);">${esc(resp?.nome||'Sem Responsável')}</div>
        ${resp?.cargo ? `<div style="font-size:12px;color:var(--g500);">${esc(resp.cargo)}</div>` : ''}
      </div>
      <div style="margin-left:auto;font-size:12px;color:var(--g500);font-weight:600;">
        ${MES_NOMES_FULL[agmRelMes-1]} / ${agmRelAno}
      </div>
    </div>`;

    // Seções AGM do responsável
    if (respId) reportHtml += buildAgmSections(respId);

    // Indicadores
    gInds.forEach(ind => {
      const meta     = getMeta(ind.id, agmRelMes, agmRelAno);
      const prev     = meta?.metaPrevista  ?? null;
      const real     = meta?.metaRealizada ?? null;
      const metaLY   = getMeta(ind.id, agmRelMes, agmRelAno - 1);
      const lastYear = metaLY?.metaRealizada ?? null;

      // Diferenças mês
      const fmtV = v => v === null ? '—'
        : ind.unidade === 'R$' ? fmtBRLInt(v)
        : (ind.unidade === '%'
            ? v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})
            : v.toLocaleString('pt-BR'))
          + (ind.unidade !== 'un' ? ' '+ind.unidade : '');

      const mmRel    = !!ind.menorMelhor;
      const flipCRel = c => mmRel ? (c==='var(--success)'?'var(--danger)':c==='var(--danger)'?'var(--success)':c) : c;

      const fmtDiff = (a, b) => {
        if (a === null || b === null) return { txt:'—', pct:'', col:'var(--g400)' };
        const diff = a - b;
        let txt;
        if (ind.unidade === 'R$')      txt = (diff >= 0 ? '+' : '−') + fmtBRLInt(Math.abs(diff));
        else if (ind.unidade === '%')  txt = (diff>0?'+':'') + diff.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' %';
        else if (ind.unidade === 'un') txt = (diff>0?'+':'') + diff.toLocaleString('pt-BR');
        else                           txt = (diff>0?'+':'') + diff.toLocaleString('pt-BR') + ' ' + ind.unidade;
        const pctVal = b !== 0 ? ((diff / Math.abs(b)) * 100) : null;
        const pct = pctVal !== null ? (pctVal > 0 ? '+' : '') + pctVal.toFixed(1) + '%' : '';
        return { txt, pct, col: flipCRel(diff >= 0 ? 'var(--success)' : 'var(--danger)') };
      };

      const dPrev = fmtDiff(real, prev);
      const dLY   = fmtDiff(real, lastYear);
      const realCol = real === null ? 'var(--g400)' : prev !== null ? flipCRel(real >= prev ? 'var(--success)' : 'var(--danger)') : 'var(--g800)';

      // Medalha: pool combinado ano atual + ano anterior (direção depende de menorMelhor)
      const _relReals = [
        ...Array.from({length:12},(_,i)=>getMeta(ind.id,i+1,agmRelAno)?.metaRealizada??null),
        ...Array.from({length:12},(_,i)=>getMeta(ind.id,i+1,agmRelAno-1)?.metaRealizada??null),
      ].filter(v=>v!==null);
      const _relTop3   = [...new Set(_relReals)].sort((a,b)=>mmRel ? a-b : b-a).slice(0,3);
      const _relMedals = ['1️⃣','2️⃣','3️⃣'];
      const relMedal    = real!==null     ? (()=>{ const r=_relTop3.indexOf(real);     return r>=0?_relMedals[r]+' ':''; })() : '';
      const relMedalLY  = lastYear!==null ? (()=>{ const r=_relTop3.indexOf(lastYear); return r>=0?_relMedals[r]+' ':''; })() : '';

      // YTD
      let acumPrev = 0, acumReal = 0, acumLY = 0;
      let acPrevHas = false, acRealHas = false, acLYHas = false;
      if (ind.unidade === '%') {
        // Para %, usar SOMENTE o valor manual digitado; auto-soma não faz sentido
        const mtRef   = getMeta(ind.id, agmRelMes, agmRelAno);
        const mtRefLY = getMeta(ind.id, agmRelMes, agmRelAno - 1);
        if (mtRef?.acumPrevisto   != null) { acumPrev = mtRef.acumPrevisto;    acPrevHas = true; }
        if (mtRef?.acumRealizado  != null) { acumReal = mtRef.acumRealizado;   acRealHas = true; }
        if (mtRefLY?.acumRealizado != null) { acumLY  = mtRefLY.acumRealizado; acLYHas   = true; }
      } else {
        for (let m = 1; m <= agmRelMes; m++) {
          const mt   = getMeta(ind.id, m, agmRelAno);
          const mtLY = getMeta(ind.id, m, agmRelAno - 1);
          if (mt?.metaPrevista  != null) { acumPrev += mt.metaPrevista;  acPrevHas = true; }
          if (mt?.metaRealizada != null) { acumReal += mt.metaRealizada; acRealHas = true; }
          if (mtLY?.metaRealizada != null) { acumLY += mtLY.metaRealizada; acLYHas = true; }
        }
      }
      const dAcumPrev = fmtDiff(acRealHas ? acumReal : null, acPrevHas ? acumPrev : null);
      const dAcumLY   = fmtDiff(acRealHas ? acumReal : null, acLYHas   ? acumLY   : null);
      const acumRealCol = !acRealHas ? 'var(--g400)' : acPrevHas ? flipCRel(acumReal >= acumPrev ? 'var(--success)' : 'var(--danger)') : 'var(--g800)';

      const mesLabel  = `${MES_NOMES_FULL[agmRelMes-1]}/${agmRelAno}`;
      const anoLabel  = `Jan–${MES_NOMES[agmRelMes-1]}/${agmRelAno}`;
      const obj       = ind.objetivoId ? db.objetivosEstrategicos.find(o => o.id === ind.objetivoId) : null;

      // Comentários do mês
      const cmts = db.indicadorComentarios.filter(c =>
        c.indicadorId === ind.id && c.mes === agmRelMes && c.ano === agmRelAno);

      const statusCfg = {
        'Aberta':       { bg:'#fef2f2', col:'#dc2626', brd:'#fca5a5' },
        'Em Andamento': { bg:'#fffbeb', col:'#d97706', brd:'#fcd34d' },
        'Concluída':    { bg:'#f0fdf4', col:'#16a34a', brd:'#86efac' },
        'Comentário':   { bg:'#dbeafe', col:'#1d4ed8', brd:'#93c5fd' },
      };

      const cmtsHtml = cmts.length ? `
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--g100);">
          <div style="font-size:13px;font-weight:800;color:var(--g600);text-transform:uppercase;
                      letter-spacing:.5px;margin-bottom:8px;">  :: Comentários do Mês</div>
          <table style="width:100%;border-collapse:collapse;font-size:14px;">
            <thead>
              <tr style="background:var(--g50);">
                <th style="padding:7px 10px;text-align:left;font-weight:700;color:var(--g600);border-bottom:2px solid var(--g200);white-space:nowrap;width:90px;">Data</th>

          <button onclick="deleteAgmItem(${r.id})" title="Excluir"

        <div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end;">

                   font-size:12px;cursor:pointer;color:var(--g700);">Cancelar</button>
          <button onclick="saveAgmEdit(${r.id},'${s.tipo}')"
            style="padding:5px 12px;border-radius:6px;background:${s.cor};color:#fff;
