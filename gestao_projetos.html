/* ================================================================
   DELETE CONFIRM
   ================================================================ */
const tblLabel={projetos:'projeto',tarefas:'tarefa',custos:'custo',responsaveis:'responsável',categorias:'categoria',tags:'tag',empresas:'empresa'};

function confirmDelete(table,id,name) {
  // For projects: show how many tasks will also be deleted
  let extraMsg = '';
  if (table === 'projetos') {
    const nTarefas = db.tarefas.filter(t=>t.projetoId===+id).length;
    const nCustos  = db.custos.filter(c=>c.projetoId===+id).length;
    const parts = [];
    if (nTarefas) parts.push(`<strong>${nTarefas} tarefa${nTarefas!==1?'s':''}</strong>`);
    if (nCustos)  parts.push(`<strong>${nCustos} custo${nCustos!==1?'s':''}</strong>`);
    if (parts.length) {
      extraMsg = `<div style="margin:10px 0;padding:10px 14px;background:var(--danger-lt);border:1px solid #fca5a5;border-radius:var(--r);font-size:12px;color:var(--danger);line-height:1.6;">
        ⚠️ Serão excluídos também: ${parts.join(' e ')} vinculados a este projeto.
      </div>`;
    }
  }
  openModal(`
  <div class="del-body">
    <div class="del-ico">🗑️</div>
    <div class="del-title">Confirmar Exclusão</div>
    <div class="del-msg">Deseja excluir o ${tblLabel[table]||'item'}<br>
      <strong>"${name}"</strong>?
      ${extraMsg}
      <span style="font-size:12px;color:var(--danger)">Esta ação não pode ser desfeita.</span></div>
    <div class="del-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="btnConfDel" onclick="doDelete('${table}',${id})">Confirmar Exclusão</button>
    </div>
  </div>`);
}
async function doDelete(table,id) {
  const btn=document.getElementById('btnConfDel');
  if (btn){btn.disabled=true;btn.textContent='Excluindo...';}
  try {
    if (table === 'projetos') {
      await deleteProjectCascade(+id);
    } else {
      const dbTable = T_TABLE[table] || table;
      await sbDelete(dbTable,id);
      await reloadTable(table);
      if (table==='tarefas')      await reloadTable('projetos');
      if (table==='indicadores')  await reloadTable('indicadorMetas');
    }
    toast('Item excluído.');
    closeModal();
    if (table==='projetos'&&+id===+projId) navigateTo('dashboard');
    else render();
  } catch(e){toast('Erro ao excluir: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='Confirmar Exclusão';}}
}

async function deleteProjectCascade(pid) {
  // 1. Get all task IDs for this project
  const taskIds = db.tarefas.filter(t=>t.projetoId===pid).map(t=>t.id);

  if (taskIds.length) {
    // 2. Delete Storage files (best-effort — don't fail if bucket missing)
    const anexos = db.tarefaAnexos.filter(a=>taskIds.includes(a.tarefaId));
    for (const a of anexos) {
      try {
        const path = a.url.replace(`${STORAGE}/object/public/${BUCKET}/`,'');
        await fetch(`${STORAGE}/object/${BUCKET}/${path}`, { method:'DELETE', headers:{ 'Authorization':H['Authorization'] }});
      } catch(_){}
    }

    // 3. Delete junction tables for all tasks in one request each
    const idList = taskIds.join(',');
    await fetch(`${REST}/tarefa_anexos?tarefa_id=in.(${idList})`,       { method:'DELETE', headers:H });
    await fetch(`${REST}/tarefa_responsaveis?tarefa_id=in.(${idList})`, { method:'DELETE', headers:H });
    await fetch(`${REST}/tarefa_tags?tarefa_id=in.(${idList})`,         { method:'DELETE', headers:H });

    // 4. Delete all tasks
    await fetch(`${REST}/tarefas?projeto_id=eq.${pid}`, { method:'DELETE', headers:H });
  }

  // 5. Delete costs
  await fetch(`${REST}/custos?projeto_id=eq.${pid}`, { method:'DELETE', headers:H });

  // 6. Delete the project
  await sbDelete('projetos', pid);

  // 7. Reload all affected tables
  await Promise.all([
    reloadTable('projetos'),
    reloadTable('tarefas'),
    reloadTable('custos'),
    reloadTable('tarefaResponsaveis'),
    reloadTable('tarefaTags'),
    reloadTable('tarefaAnexos'),
  ]);
}

/* ================================================================
   INIT
   ================================================================ */
async function init() {
  // Detect file:// protocol
  if (location.protocol==='file:') {
    showLoading(false);
    const isWin=navigator.userAgent.includes('Win');
    document.getElementById('content').innerHTML=`
      <div style="max-width:600px;margin:0 auto">
        <div style="background:var(--warning-lt);border:1px solid var(--warning);border-radius:var(--rlg);padding:22px 24px;margin-bottom:20px">
          <div style="font-size:20px;margin-bottom:8px">⚠️ Arquivo aberto localmente</div>
          <div style="font-size:13px;color:var(--g700);line-height:1.6">
            O Chrome bloqueia conexões externas quando um arquivo HTML é aberto direto pelo sistema de arquivos.
            <strong>Solução: usar o arquivo <code>Iniciar ProjectFlow.bat</code> na mesma pasta.</strong>
          </div>
        </div>
        <div style="background:var(--white);border:1px solid var(--g200);border-radius:var(--rlg);padding:22px 24px;box-shadow:var(--sh)">
          <div style="font-weight:700;font-size:15px;margin-bottom:12px">🖥️ Como abrir corretamente</div>
          <div style="font-size:13px;color:var(--g700);line-height:1.7">
            1. Abra a pasta <strong>Gestão de projetos</strong> no Windows Explorer<br>
            2. Dê dois cliques em <strong>Iniciar ProjectFlow.bat</strong><br>
            3. O servidor iniciará e o navegador abrirá automaticamente
          </div>
        </div>
      </div>`;
    return;
  }

  showLoading(true,'Verificando sessão...');

  // Try restoring session
  const sess = loadSession();
  if (sess?.access_token) {
    try {
      setAuthToken(sess.access_token);
      const profile = await getProfile(sess.user_id);
      if (profile) {
        currentUser    = { id:sess.user_id, email:sess.email };
        currentProfile = profile;
        updateSidebarUser();
        if (!profile.aprovado)      { showLoading(false); renderPending(); return; }
        if (profile.ativo === false){ showLoading(false); clearSession(); renderAuth(); return; }
        showLoading(true,'Carregando dados...');
        await loadAll();
        await loadMyPermissions();
        applyNavPermissions();
        scheduleTokenRefresh();
        document.getElementById('dbBadge').className='db-badge online';
        document.getElementById('dbBadge').innerHTML='<div class="db-dot"></div> Supabase';
        showLoading(false);
        render();
        return;
      }
    } catch(e) { clearSession(); }
  }

  showLoading(false);
  renderLogin();
}

init();
</script>
