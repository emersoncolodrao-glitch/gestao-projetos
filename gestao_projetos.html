  const resp=byId('responsaveis',p.responsavelId);
  const pct=projectProgress(pid);
  const late=isLate(p);

  document.getElementById('pageTitle').textContent = (p.icone||'📁') + ' ' + p.nome;
  document.getElementById('pageSub').textContent   = 'Dashboard → Projetos';
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-secondary btn-sm" onclick="navigateTo('dashboard')">← Voltar</button>`;

  document.getElementById('content').innerHTML=`
  <div class="proj-detail-header">
    <div class="pdh-top">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:36px;line-height:1;flex-shrink:0;">${p.icone||'📁'}</span>
        <div>
        <div class="pdh-name">${p.nome}</div>
        <div class="pdh-desc">${p.descricao||'<em style="color:var(--g400)">Sem descrição.</em>'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-start;flex-shrink:0;">

        <button class="btn btn-secondary btn-sm" onclick="openProjectModal(${p.id})">✏️ Editar</button>
      </div>
    </div>
    <div class="pdh-meta">
      <div class="meta-item"><div class="meta-label">Responsável</div><div class="meta-value">${resp?.nome||'—'}</div></div>
      <div class="meta-item"><div class="meta-label">Início</div><div class="meta-value">${fmtDate(p.dataInicio)}</div></div>
      <div class="meta-item"><div class="meta-label">Prazo Final</div><div class="meta-value ${late?'c-danger':'c-success'}">${fmtDate(p.dataFim)}</div></div>
      <div class="meta-item"><div class="meta-label">Progresso</div><div class="meta-value">${pct}% concluído</div></div>
      <div class="meta-item"><div class="meta-label">Status do Prazo</div><div class="meta-value ${late?'c-danger':'c-success'}">${late?'⚠️ Atrasado':'✓ No prazo'}</div></div>
    </div>
  </div>

  ${(projTab==='custos' && p.controlaCusto===false) ? (()=>{projTab='tarefas';})() : ''}

    ${canSeeTab(pid,'tarefas')     ? `<div class="tab ${projTab==='tarefas'?'active':''}"     onclick="switchTab('tarefas')">📋 Kanban</div>` : ''}
    ${canSeeTab(pid,'lista')       ? `<div class="tab ${projTab==='lista'?'active':''}"       onclick="switchTab('lista')">📊 Lista</div>` : ''}
    ${canSeeTab(pid,'cronograma')  ? `<div class="tab ${projTab==='cronograma'?'active':''}"  onclick="switchTab('cronograma')">📅 Cronograma</div>` : ''}
    ${(canSeeTab(pid,'custos') && p.controlaCusto!==false) ? `<div class="tab ${projTab==='custos'?'active':''}" onclick="switchTab('custos')">💰 Custos</div>` : ''}
  </div>

  <div id="tabContent">
    ${!canSeeTab(pid, projTab)
      ? `<div style="text-align:center;padding:60px 20px;color:var(--g400);"><div style="font-size:40px;margin-bottom:12px;">🔒</div><div style="font-size:14px;font-weight:600;color:var(--g600);">Sem acesso a esta aba.</div></div>`

function switchTab(tab) {
  projTab = tab;
  if (tab === 'lista')   { tgSortCol='nome'; tgSortDir='asc'; tgFilters={status:[],responsavelId:'',tag:'',prazo:[],nome:''}; tgPrazoOpen=false; tgStatusOpen=false; }
  if (tab === 'tarefas') { kanbanTagFilter=null; kanbanRespFilter=null; }
  if (tab === 'custos')  { custosPeriodo='all'; }
  renderProject(projId);
}
function setCustosPeriodo(p) { custosPeriodo=p; renderProject(projId); }

   KANBAN

function setKanbanTagFilter(tagId) {
  kanbanTagFilter = (kanbanTagFilter === tagId) ? null : tagId;
  renderProject(projId);
}
function setKanbanRespFilter(rid) {
  kanbanRespFilter = (kanbanRespFilter === rid) ? null : rid;
  renderProject(projId);
}
function setTarefaTextFiltro(val) {
  tarefaTextFiltro = val;
  renderProject(projId);
  // Restore focus to whichever search input triggered this
  const el = document.getElementById('kanban-text-search') || document.querySelector('[data-gantt-search]');
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

function buildKanban(pid) {
  const statuses = ['A Fazer','Em Andamento','Concluído'];
  const icons    = {'A Fazer':'⬜','Em Andamento':'🔵','Concluído':'✅'};
  const allTasks = db.tarefas.filter(t=>t.projetoId===+pid);

  // Collect unique tags used in this project's tasks
  const projectTagMap = new Map();
  allTasks.forEach(t=>taskTags(t.id).forEach(tg=>projectTagMap.set(tg.id,tg)));
  const projectTags = [...projectTagMap.values()];

  // Collect unique responsáveis used in this project's tasks
  const projectRespMap = new Map();
  allTasks.forEach(t=>{ const r=byId('responsaveis',t.responsavelId); if(r) projectRespMap.set(r.id,r); });
  const projectResps = [...projectRespMap.values()].sort((a,b)=>a.nome.localeCompare(b.nome));

  // Apply combined filters (text + tag + responsável)
  let tasks = allTasks;
  if (tarefaTextFiltro) tasks = tasks.filter(t=>t.nome.toLowerCase().includes(tarefaTextFiltro.toLowerCase()));
  if (kanbanTagFilter)  tasks = tasks.filter(t=>taskTags(t.id).some(tg=>tg.id===kanbanTagFilter));
  if (kanbanRespFilter === 'none') tasks = tasks.filter(t=>taskResponsaveis(t.id).length===0);
  else if (kanbanRespFilter)      tasks = tasks.filter(t=>taskResponsaveis(t.id).some(r=>r.id===kanbanRespFilter));

  // Ordenar por prioridade (prazo mais próximo primeiro, sem prazo vai ao fim) e depois por nome
  tasks = [...tasks].sort((a,b)=>{
    const da = a.dataFim || '9999-99-99';
    const db_ = b.dataFim || '9999-99-99';
    if (da !== db_) return da < db_ ? -1 : 1;
    return a.nome.localeCompare(b.nome, 'pt-BR');
  });

  const activeTag  = kanbanTagFilter  ? projectTagMap.get(kanbanTagFilter)   : null;
  const activeResp = kanbanRespFilter === 'none' ? {nome:'Sem responsável'} : kanbanRespFilter ? projectRespMap.get(kanbanRespFilter) : null;
  const hasFilter  = !!(tarefaTextFiltro || kanbanTagFilter || kanbanRespFilter);

  // ── Tag pills ──────────────────────────────────────────────
  const tagPillsHtml = projectTags.map(tg=>{
    const isActive = kanbanTagFilter===tg.id;
    return `<span
      onclick="setKanbanTagFilter(${tg.id})"
      style="display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;
             font-size:11px;font-weight:700;cursor:pointer;user-select:none;transition:all .15s;
             background:${isActive?tg.cor:'var(--g100)'};
             color:${isActive?'#fff':'var(--g600)'};
             border:2px solid ${isActive?tg.cor:'transparent'};
             box-shadow:${isActive?'0 2px 5px rgba(0,0,0,.18)':'none'};
             opacity:${kanbanTagFilter&&!isActive?'.45':'1'};">
      ${isActive?'✕ ':''}${tg.nome}
    </span>`;
  }).join('');

  // ── Responsável select ────────────────────────────────────
  const respSelectHtml = `
    <select onchange="setKanbanRespFilter(this.value===''?null:this.value==='none'?'none':+this.value)"
      style="height:30px;border:1px solid ${kanbanRespFilter?'var(--primary)':'var(--g200)'};
             border-radius:var(--r);padding:0 8px;font-size:12px;color:var(--g700);
             background:${kanbanRespFilter?'var(--primary-lt)':'var(--white)'};cursor:pointer;
             font-weight:${kanbanRespFilter?'700':'400'};">
      <option value="">👤 Responsável</option>
      <option value="none" ${kanbanRespFilter==='none'?'selected':''}>— Sem responsável</option>
      ${projectResps.map(r=>`<option value="${r.id}" ${kanbanRespFilter===r.id?'selected':''}>${r.nome}</option>`).join('')}
    </select>`;

  // ── Toolbar ────────────────────────────────────────────────
  let html = `
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0;">
      <div style="position:relative;flex-shrink:0;">
        <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;">🔍</span>
        <input
          id="kanban-text-search"
          type="text"
          placeholder="Buscar tarefa..."
          value="${tarefaTextFiltro.replace(/"/g,'&quot;')}"
          oninput="setTarefaTextFiltro(this.value)"
          style="height:30px;padding:0 10px 0 28px;border:1px solid ${tarefaTextFiltro?'var(--primary)':'var(--g200)'};
                 border-radius:var(--r);font-size:12px;color:var(--g700);width:170px;
                 background:${tarefaTextFiltro?'var(--primary-lt)':'var(--white)'};
                 font-weight:${tarefaTextFiltro?'600':'400'};outline:none;">
      </div>
      ${projectTags.length
        ? `<span style="color:var(--g200);margin:0 1px;">|</span>
           <span style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;
                        letter-spacing:.4px;white-space:nowrap;">🏷️ Tags:</span>
           ${tagPillsHtml}
           <span style="color:var(--g200);margin:0 2px;">|</span>`
        : ''}
      ${respSelectHtml}
      ${hasFilter?`<button onclick="setKanbanTagFilter(null);setKanbanRespFilter(null);setTarefaTextFiltro('')"
        style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--g400);
               text-decoration:underline;padding:2px 4px;white-space:nowrap;">✕ Limpar filtros</button>`:''}
      <span style="font-size:12px;color:var(--g500);">
        ${hasFilter
          ? `<strong>${tasks.length}</strong>/${allTasks.length} tarefa${allTasks.length!==1?'s':''}`
          : `<strong>${allTasks.length}</strong> tarefa${allTasks.length!==1?'s':''}`}
      </span>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn btn-secondary" onclick="openCsvImportModal(${pid})">📥 Importar CSV</button>
      <button class="btn btn-primary" onclick="openTaskModal(${pid})">＋ Nova Tarefa</button>
    </div>
  </div>
  <div class="kanban">`;

  // ── Columns ────────────────────────────────────────────────
  statuses.forEach(s=>{
    const cards = tasks.filter(t=>t.status===s).sort((a,b)=>{
      // kanban_ordem explícita tem prioridade; nulls ficam ao final
      if (a.kanbanOrdem !== null && b.kanbanOrdem !== null) return a.kanbanOrdem - b.kanbanOrdem;
      if (a.kanbanOrdem !== null) return -1;
      if (b.kanbanOrdem !== null) return  1;
      // fallback: prioridade desc, nome asc
      const pd = (b.prioridade||0) - (a.prioridade||0);
      return pd !== 0 ? pd : a.nome.localeCompare(b.nome);
    });
    const totalInCol = allTasks.filter(t=>t.status===s).length;
    const safeS = s.replace(/ /g,'-');
    const countLabel = hasFilter
      ? `<span class="k-count">${cards.length}/${totalInCol}</span>`
      : `<span class="k-count">${cards.length}</span>`;
    html+=`
    <div class="k-col" id="col-${safeS}" data-status="${s}"
         ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="k-col-head">
        <div class="k-col-title">${icons[s]} ${s}${countLabel}</div>
      </div>
      <div class="k-cards" id="cards-${safeS}">`;
    if (!cards.length) {
      html+=`<div class="k-no-tasks">${hasFilter?'Nenhuma tarefa com estes filtros':'Sem tarefas'}</div>`;
    }
    cards.forEach(t=>{
      const resps = taskResponsaveis(t.id);
      const tgs   = taskTags(t.id);
      const avatarsHtml = resps.length
        ? `<div style="display:flex;align-items:center;">${resps.slice(0,3).map((r,i)=>`<div class="avatar" style="width:20px;height:20px;font-size:9px;background:${avatarColor(r.id)};margin-left:${i>0?'-6px':'0'};border:1.5px solid var(--white);z-index:${3-i};" title="${r.nome}">${initials(r.nome)}</div>`).join('')}${resps.length>3?`<span style="font-size:10px;color:var(--g500);margin-left:4px;">+${resps.length-3}</span>`:''}</div>`
        : `<div class="avatar" style="width:20px;height:20px;font-size:9px;background:var(--g300);">?</div>`;
      html+=`
      <div class="task-card" draggable="true" id="tc-${t.id}" data-tid="${t.id}"
           ondragstart="onDragStart(event)"
           ondragover="onCardDragOver(event)"
           ondragleave="onCardDragLeave(event)"
           ondrop="onCardDrop(event)">
        <div class="task-card-head">
          <div class="task-card-title">${t.nome}</div>
          <div class="task-actions">
            ${(()=>{
              const tcmts  = db.tarefaComentarios.filter(c=>c.tarefaId===t.id);
              const abertas = tcmts.filter(c=>c.status==='Aberta');
              const andando = tcmts.filter(c=>c.status==='Em Andamento');
              const n = abertas.length + andando.length;
              const badgeCol = abertas.length ? '#dc2626' : '#d97706';
              const badge = n > 0
                ? `<span style="position:absolute;top:-4px;right:-4px;min-width:14px;height:14px;border-radius:7px;background:${badgeCol};color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 2px;line-height:1;">${n}</span>`
                : '';
              return `<button class="icon-btn" style="width:26px;height:26px;font-size:12px;position:relative;" onclick="event.stopPropagation();openTarefaComentariosModal(${t.id},${pid})" title="Comentários">💬${badge}</button>`;
            })()}
            <button class="icon-btn" style="width:26px;height:26px;font-size:12px;" onclick="openTaskModal(${pid},${t.id})">✏️</button>
            <button class="icon-btn del" style="width:26px;height:26px;font-size:12px;" onclick="confirmDelete('tarefas',${t.id},'${esc(t.nome)}')">🗑️</button>
          </div>
        </div>
        <div class="task-card-foot">
          <div class="task-resp" style="gap:4px;">
            ${avatarsHtml}
            <span style="font-size:11px;color:var(--g500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px;">${resps.length?resps[0].nome.split(' ')[0]+(resps.length>1?` +${resps.length-1}`:''):'Sem resp.'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:flex-end;flex:1;min-width:0;">
            ${tgs.map(tg=>`<span class="tag-badge" style="background:${tg.cor};cursor:pointer;${kanbanTagFilter===tg.id?'outline:2px solid rgba(0,0,0,.3);outline-offset:1px;':''}"
              onclick="event.stopPropagation();setKanbanTagFilter(${tg.id})" title="Filtrar por ${tg.nome}">${tg.nome}</span>`).join('')}
            ${t.dataFim?`<span class="task-date">📅 ${fmtDate(t.dataFim)}</span>`:''}
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  return html+`</div>`;
}

function onDragStart(e) { dragId=e.currentTarget.dataset.tid; setTimeout(()=>e.currentTarget.classList.add('dragging'),0); e.dataTransfer.effectAllowed='move'; }
function onDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e) {
  e.preventDefault();
  const col=e.currentTarget;
  col.classList.remove('drag-over');
  const newStatus=col.dataset.status;
  if (!dragId||!newStatus) return;
  const tid=dragId; dragId=null;
  const t=db.tarefas.find(x=>x.id===+tid);
  if (!t || t.status===newStatus) return; // sem mudança de status
  t.status=newStatus;
  // Coloca ao final da coluna destino
  const maxOrdem = Math.max(0, ...db.tarefas.filter(x=>x.status===newStatus&&x.projetoId===projId&&x.kanbanOrdem!==null).map(x=>x.kanbanOrdem));
  t.kanbanOrdem = maxOrdem + 10;
  renderProject(projId);
  try {
    await sbUpdate('tarefas',tid,{status:newStatus, kanban_ordem:t.kanbanOrdem});
    toast(`Tarefa movida para "${newStatus}"`);
  } catch(err) {
    toast('Erro ao mover tarefa: '+err.message,'err');
    await reloadTable('tarefas');
    renderProject(projId);
  }
}

/* ---- Reordenamento de cards dentro da coluna ---- */
function onCardDragOver(e) {
  e.preventDefault();
  e.stopPropagation(); // não acionar drag-over da coluna
  const card = e.currentTarget;
  if (card.dataset.tid === dragId) return;
  card.classList.remove('drop-before','drop-after');
  const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2;
  card.classList.add(e.clientY < mid ? 'drop-before' : 'drop-after');
}
function onCardDragLeave(e) {
  e.currentTarget.classList.remove('drop-before','drop-after');
}
async function onCardDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const tgtCard = e.currentTarget;
  tgtCard.classList.remove('drop-before','drop-after');
  // Limpar indicadores em todos os cards
  document.querySelectorAll('.task-card.drop-before,.task-card.drop-after')
    .forEach(el=>el.classList.remove('drop-before','drop-after'));

  const srcId = +dragId;
  const tgtId = +tgtCard.dataset.tid;
  dragId = null;
  if (!srcId || srcId === tgtId) return;

  const srcTask = db.tarefas.find(t=>t.id===srcId);
  const tgtTask = db.tarefas.find(t=>t.id===tgtId);
  if (!srcTask || !tgtTask) return;

  const newStatus = tgtTask.status;
  const insertBefore = e.clientY < tgtCard.getBoundingClientRect().top + tgtCard.getBoundingClientRect().height / 2;

  // Lista ordenada atual da coluna destino (sem o card sendo movido)
  const colTasks = db.tarefas
    .filter(t => t.status===newStatus && t.projetoId===projId && t.id!==srcId)
    .sort((a,b)=>{
      if (a.kanbanOrdem!==null && b.kanbanOrdem!==null) return a.kanbanOrdem - b.kanbanOrdem;
      if (a.kanbanOrdem!==null) return -1;
      if (b.kanbanOrdem!==null) return  1;
      const pd=(b.prioridade||0)-(a.prioridade||0);
      return pd!==0?pd:a.nome.localeCompare(b.nome);
    });

  // Inserir na posição correta
  const tgtIdx = colTasks.findIndex(t=>t.id===tgtId);
  colTasks.splice(insertBefore ? tgtIdx : tgtIdx+1, 0, srcTask);

  // Atribuir kanban_ordem em múltiplos de 10
  colTasks.forEach((t,i)=>{ t.kanbanOrdem = (i+1)*10; });
  srcTask.status = newStatus;

  renderProject(projId);

  // Persistir tudo em paralelo
  try {
    await Promise.all(colTasks.map(t=>sbUpdate('tarefas',t.id,{kanban_ordem:t.kanbanOrdem,status:t.status})));
  } catch(err) {
    toast('Erro ao reordenar: '+err.message,'err');
    await reloadTable('tarefas');
    renderProject(projId);
  }
}

/* ================================================================
   TASK GRID
   ================================================================ */
function tgSetSort(col) {
  if (tgSortCol===col) tgSortDir = tgSortDir==='asc'?'desc':'asc';
  else { tgSortCol=col; tgSortDir='asc'; }
  renderProject(projId);
}
function tgSetFilter(key, val) {
  tgFilters[key] = val;
  renderProject(projId);
}
function tgClearFilters() {
  tgFilters = {status:[],responsavelId:'',tag:'',prazo:[],nome:''};
  tarefaTextFiltro = '';
  tgPrazoOpen = false; tgStatusOpen = false;
  renderProject(projId);
}
function tgToggleStatus(val) {
  const idx = tgFilters.status.indexOf(val);
  if (idx>=0) tgFilters.status.splice(idx,1);
  else tgFilters.status.push(val);
  tgStatusOpen = true;
  renderProject(projId);
}
function tgTogglePrazo(val) {
  const idx = tgFilters.prazo.indexOf(val);
  if (idx>=0) tgFilters.prazo.splice(idx,1);
  else tgFilters.prazo.push(val);
  tgPrazoOpen = true; // mantém o dropdown aberto após selecionar
  renderProject(projId);
}

function buildTaskGrid(pid) {
  let tasks = db.tarefas.filter(t=>t.projetoId===+pid);

  // ── Apply filters ──────────────────────────────────────────
  if (tarefaTextFiltro)       tasks = tasks.filter(t=>t.nome.toLowerCase().includes(tarefaTextFiltro.toLowerCase()));
  if (tgFilters.nome)         tasks = tasks.filter(t=>t.nome.toLowerCase().includes(tgFilters.nome.toLowerCase()));
  if (tgFilters.status.length) tasks = tasks.filter(t=>tgFilters.status.includes(t.status));
  if (tgFilters.responsavelId)tasks = tasks.filter(t=>taskResponsaveis(t.id).some(r=>String(r.id)===tgFilters.responsavelId));
  if (tgFilters.tag)          tasks = tasks.filter(t=>taskTags(t.id).some(tg=>String(tg.id)===tgFilters.tag));
  if (tgFilters.prazo.length) {
    tasks = tasks.filter(t=>{
      const sit = t.status==='Concluído' ? 'done' : isLateTask(t) ? 'late' : 'ontime';
      return tgFilters.prazo.includes(sit);
    });
  }

  // ── Sort ───────────────────────────────────────────────────
  tasks = [...tasks].sort((a,b)=>{
    let va, vb;
    switch(tgSortCol) {
      case 'nome':        va=a.nome.toLowerCase();   vb=b.nome.toLowerCase(); break;
      case 'status':      va=a.status;               vb=b.status; break;
      case 'responsavel': va=(byId('responsaveis',a.responsavelId)?.nome||'').toLowerCase();
                          vb=(byId('responsaveis',b.responsavelId)?.nome||'').toLowerCase(); break;
      case 'dataInicio':  va=a.dataInicio||'';       vb=b.dataInicio||''; break;
      case 'dataFim':     va=a.dataFim||'';          vb=b.dataFim||''; break;
      case 'tags':        va=taskTags(a.id).map(t=>t.nome).join();
                          vb=taskTags(b.id).map(t=>t.nome).join(); break;
      default:            va=a.nome.toLowerCase();   vb=b.nome.toLowerCase();
    }
    if (va<vb) return tgSortDir==='asc'?-1:1;
    if (va>vb) return tgSortDir==='asc'?1:-1;
    return 0;
  });

  // ── Filter options ─────────────────────────────────────────
  const allTasks = db.tarefas.filter(t=>t.projetoId===+pid);
  const respOpts = [...new Map(allTasks.filter(t=>t.responsavelId)
    .map(t=>{ const r=byId('responsaveis',t.responsavelId); return r?[r.id,r]:[null,null]; })
    .filter(([id])=>id)).values()]
    .map(r=>`<option value="${r.id}" ${tgFilters.responsavelId==r.id?'selected':''}>${r.nome}</option>`).join('');
  const allTagOpts = [...new Map(allTasks.flatMap(t=>taskTags(t.id))
    .map(tg=>[tg.id,tg])).values()]
    .map(tg=>`<option value="${tg.id}" ${tgFilters.tag==tg.id?'selected':''}>${tg.nome}</option>`).join('');
  const tagOpts = allTagOpts; // alias mantido para compatibilidade

  // helper: th with sort
  function th(label, col, filterHtml='') {
    const isSorted = col && tgSortCol===col;
    const cls = isSorted?(tgSortDir==='asc'?'sort-asc':'sort-desc'):'';
    const labelStyle = col ? '' : 'cursor:default';
    const clickHandler = col ? `onclick="tgSetSort('${col}')"` : '';
    return `<th>
      <div class="tg-th-inner">
        <div class="tg-th-label ${cls}" ${clickHandler} style="${labelStyle}">${label}</div>
        ${filterHtml?`<div class="tg-th-filter">${filterHtml}</div>`:''}
      </div>
    </th>`;
  }

  const hasFilters = Object.values(tgFilters).some(v=>v);
  const activeCount = Object.values(tgFilters).filter(v=>Array.isArray(v)?v.length>0:!!v).length;

  // ── Rows ───────────────────────────────────────────────────
  let rows = '';
  if (!tasks.length) {
    rows = `<tr><td colspan="8" class="tg-empty">
      ${hasFilters
        ? `Nenhuma tarefa encontrada para os filtros aplicados.<br><br>
           <button class="btn btn-secondary btn-sm" onclick="tgClearFilters()">Limpar filtros</button>`
        : 'Nenhuma tarefa cadastrada neste projeto.'}
    </td></tr>`;
  } else {
    tasks.forEach(t=>{
      const resps = taskResponsaveis(t.id);
      const late  = isLateTask(t);
      const nAnexos = taskAnexos(t.id).length;
      const situacao = t.status==='Concluído'
        ? '<span class="badge b-primary">Encerrado</span>'
        : late ? '<span class="badge b-danger">⚠️ Atrasado</span>'
               : '<span class="badge b-success">✓ No prazo</span>';
      const multiAvatar = resps.length
        ? `<div style="display:flex;align-items:center;">${resps.slice(0,3).map((r,i)=>`<div class="avatar" style="width:22px;height:22px;font-size:9px;background:${avatarColor(r.id)};margin-left:${i>0?'-7px':'0'};border:2px solid var(--white);" title="${r.nome}">${initials(r.nome)}</div>`).join('')}${resps.length>3?`<span style="font-size:10px;color:var(--g500);margin-left:4px;">+${resps.length-3}</span>`:''}<span style="margin-left:6px;font-size:12px;">${resps[0].nome}${resps.length>1?` +${resps.length-1}`:''}</span></div>`
        : '<span style="color:var(--g400)">—</span>';
      rows += `<tr>
        <td><span class="tg-task-name">${t.nome}</span>
          ${t.descricao?`<div style="font-size:11px;color:var(--g400);margin-top:2px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(t.descricao)}">${t.descricao}</div>`:''}
          ${nAnexos?`<span style="font-size:10px;color:var(--g400);">📎 ${nAnexos} anexo${nAnexos>1?'s':''}</span>`:''}
        </td>
        <td>${statusBadge(t.status)}</td>
        <td>${multiAvatar}</td>
        <td>${(()=>{const tgs=taskTags(t.id);return tgs.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;">${tgs.map(tg=>`<span class="tag-badge" style="background:${tg.cor}">${esc(tg.nome)}</span>`).join('')}</div>`:'<span style="color:var(--g400);font-size:12px;">—</span>'})()}</td>
        <td style="font-size:12px;color:var(--g500);white-space:nowrap">${fmtDate(t.dataInicio)||'—'}</td>
        <td style="font-size:12px;white-space:nowrap;color:${late&&t.status!=='Concluído'?'var(--danger)':'var(--g500)'};font-weight:${late&&t.status!=='Concluído'?700:400}">${fmtDate(t.dataFim)||'—'}</td>
        <td>${situacao}</td>
        <td style="white-space:nowrap;text-align:right">
          <button class="icon-btn" onclick="openTaskModal(${pid},${t.id})" title="Editar">✏️</button>
          <button class="icon-btn del" onclick="confirmDelete('tarefas',${t.id},'${esc(t.nome)}')" title="Excluir">🗑️</button>
        </td>
      </tr>`;
    });
  }

  return `
  <div class="tg-wrap">
    <div class="tg-toolbar">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:13px;font-weight:700;color:var(--g700)">${tasks.length} tarefa${tasks.length!==1?'s':''}</span>
        ${hasFilters?`<span class="tg-count">(${activeCount} filtro${activeCount>1?'s':''} ativo${activeCount>1?'s':''})</span>`:''}
        ${hasFilters?`<button class="tg-filter-chip" onclick="tgClearFilters()">✕ Limpar filtros</button>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-secondary" onclick="openCsvImportModal(${pid})">📥 Importar CSV</button>
        <button class="btn btn-primary" onclick="openTaskModal(${pid})">＋ Nova Tarefa</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="tg-table">
        <thead><tr>
          ${th('Tarefa','nome',`<input class="tg-filter-input ${tgFilters.nome?'active':''}" placeholder="Buscar..." oninput="tgFilters.nome=this.value;tgSetFilter('nome',this.value)" value="${tgFilters.nome||''}">`)}
          ${th('Status','status',`
            <details ${tgStatusOpen?'open':''} ontoggle="tgStatusOpen=this.open"
              style="position:relative;">
              <summary style="display:flex;align-items:center;justify-content:space-between;gap:4px;
                              padding:4px 8px;border-radius:var(--r);cursor:pointer;list-style:none;
                              border:1px solid ${tgFilters.status.length?'var(--primary)':'var(--g200)'};
                              background:${tgFilters.status.length?'var(--primary-lt)':'var(--white)'};
                              font-size:11px;font-weight:${tgFilters.status.length?700:400};
                              color:${tgFilters.status.length?'var(--primary)':'var(--g500)'};
                              white-space:nowrap;user-select:none;min-width:110px;">
                <span>${tgFilters.status.length===0?'Todos os status':tgFilters.status.length===1?tgFilters.status[0]:tgFilters.status.length+' selecionados'}</span>
                <span style="font-size:9px;opacity:.6;">▾</span>
              </summary>
              <div onclick="event.stopPropagation()"
                style="position:absolute;top:calc(100% + 4px);left:0;z-index:200;
                       background:var(--white);border:1px solid var(--g200);border-radius:var(--r);
                       box-shadow:0 4px 16px rgba(0,0,0,.12);padding:6px 4px;min-width:150px;">
                ${[['A Fazer','⬜'],['Em Andamento','🔵'],['Concluído','✅']].map(([val,ico])=>{
                  const on = tgFilters.status.includes(val);
                  return `<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;
                                 border-radius:4px;cursor:pointer;font-size:12px;
                                 color:${on?'var(--g900)':'var(--g600)'};font-weight:${on?600:400};
                                 background:${on?'var(--primary-lt)':'transparent'};
                                 transition:background .1s;">
                    <input type="checkbox" ${on?'checked':''} onchange="tgToggleStatus('${val}')"
                      style="width:14px;height:14px;cursor:pointer;accent-color:var(--primary);flex-shrink:0;">
                    ${ico} ${val}
                  </label>`;
                }).join('')}
              </div>
            </details>
          `)}
          ${th('Responsável','responsavel',`<select class="tg-filter-select ${tgFilters.responsavelId?'active':''}" onchange="tgSetFilter('responsavelId',this.value)">
            <option value="">Todos</option>${respOpts}
          </select>`)}
          ${th('Tags','tags', tagOpts
            ? `<select class="tg-filter-select ${tgFilters.tag?'active':''}" onchange="tgSetFilter('tag',this.value)">
                <option value="">Todas</option>${tagOpts}
               </select>`
            : '<div style="height:4px;"></div>')}
          ${th('Início','dataInicio')}
          ${th('Prazo Final','dataFim')}
          ${th('Situação','',`
            <details ${tgPrazoOpen?'open':''} ontoggle="tgPrazoOpen=this.open"
              style="position:relative;">
              <summary style="display:flex;align-items:center;justify-content:space-between;gap:4px;
                              padding:4px 8px;border-radius:var(--r);cursor:pointer;list-style:none;
                              border:1px solid ${tgFilters.prazo.length?'var(--primary)':'var(--g200)'};
                              background:${tgFilters.prazo.length?'var(--primary-lt)':'var(--white)'};
                              font-size:11px;font-weight:${tgFilters.prazo.length?700:400};
                              color:${tgFilters.prazo.length?'var(--primary)':'var(--g500)'};
                              white-space:nowrap;user-select:none;min-width:110px;">
                <span>${tgFilters.prazo.length===0?'Todas as situações':tgFilters.prazo.length===1?({'ontime':'✓ No prazo','late':'⚠️ Atrasado','done':'Encerrado'}[tgFilters.prazo[0]]):tgFilters.prazo.length+' selecionadas'}</span>
                <span style="font-size:9px;opacity:.6;">▾</span>
              </summary>
              <div onclick="event.stopPropagation()"
                style="position:absolute;top:calc(100% + 4px);left:0;z-index:200;
                       background:var(--white);border:1px solid var(--g200);border-radius:var(--r);
                       box-shadow:0 4px 16px rgba(0,0,0,.12);padding:6px 4px;min-width:150px;">
                ${[['ontime','✓ No prazo'],['late','⚠️ Atrasado'],['done','Encerrado']].map(([val,lbl])=>{
                  const on = tgFilters.prazo.includes(val);
                  return `<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;
                                 border-radius:4px;cursor:pointer;font-size:12px;
                                 color:${on?'var(--g900)':'var(--g600)'};font-weight:${on?600:400};
                                 background:${on?'var(--primary-lt)':'transparent'};
                                 transition:background .1s;">
                    <input type="checkbox" ${on?'checked':''} onchange="tgTogglePrazo('${val}')"
                      style="width:14px;height:14px;cursor:pointer;accent-color:var(--primary);flex-shrink:0;">
                    ${lbl}
                  </label>`;
                }).join('')}
              </div>
            </details>
          `)}
          <th><div class="tg-th-inner"><div class="tg-th-label" style="cursor:default;text-align:right">Ações</div></div></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// is a single task late?
function isLateTask(t) {
  return t.status!=='Concluído' && t.dataFim && t.dataFim < new Date().toISOString().slice(0,10);
}

/* ================================================================
   GANTT
   ================================================================ */
function buildGantt(pid) {
  const allGanttTasks = db.tarefas.filter(t=>t.projetoId===+pid);
  const tasks = tarefaTextFiltro
    ? allGanttTasks.filter(t=>t.nome.toLowerCase().includes(tarefaTextFiltro.toLowerCase()))
    : allGanttTasks;

  const ganttSearchHtml = `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
    <div style="position:relative;">
      <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;">🔍</span>
      <input
        data-gantt-search
        type="text"
        placeholder="Buscar tarefa..."
        value="${tarefaTextFiltro.replace(/"/g,'&quot;')}"
        oninput="setTarefaTextFiltro(this.value)"
        style="height:30px;padding:0 10px 0 28px;border:1px solid ${tarefaTextFiltro?'var(--primary)':'var(--g200)'};
               border-radius:var(--r);font-size:12px;color:var(--g700);width:200px;
               background:${tarefaTextFiltro?'var(--primary-lt)':'var(--white)'};
               font-weight:${tarefaTextFiltro?'600':'400'};outline:none;">
    </div>
    ${tarefaTextFiltro?`<button onclick="setTarefaTextFiltro('')"
      style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--g400);
             text-decoration:underline;padding:2px 4px;">✕ Limpar</button>
      <span style="font-size:12px;color:var(--g500);">
        <strong>${tasks.length}</strong>/${allGanttTasks.length} tarefa${allGanttTasks.length!==1?'s':''}
      </span>`:''}
  </div>`;

  if (!allGanttTasks.length) return `<div class="empty"><div class="empty-icon">📅</div><p>Nenhuma tarefa cadastrada.</p></div>`;
  if (!tasks.length) return ganttSearchHtml + `<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma tarefa encontrada para "<strong>${tarefaTextFiltro}</strong>".</p></div>`;

  const tasksWithDate = tasks.filter(t=>t.dataInicio);
  if (!tasksWithDate.length) return ganttSearchHtml + `<div class="empty"><div class="empty-icon">📅</div>
    <p>Defina datas nas tarefas para visualizar o cronograma.</p></div>`;

  const today = new Date(); today.setHours(0,0,0,0);

  // Date range
  let minD = new Date(Math.min(...tasksWithDate.map(t=>new Date(t.dataInicio))));
  let maxD  = new Date(Math.max(...tasks.filter(t=>t.dataFim).map(t=>new Date(t.dataFim)), today));
  minD.setDate(minD.getDate()-4);
  maxD.setDate(maxD.getDate()+8);
  const totalMs = maxD-minD;

  function pct(d) { return Math.max(0,Math.min(100,((new Date(d)-minD)/totalMs)*100)); }

  function barColor(t) {
    const pastDue = t.dataFim && new Date(t.dataFim)<today && t.status!=='Concluído';
    if (t.status==='Concluído')    return 'var(--success)';
    if (pastDue)                    return 'var(--danger)';
    if (t.status==='Em Andamento') return 'var(--primary)';
    return 'var(--g300)';
  }
  function barLabel(t) {
    const pastDue = t.dataFim && new Date(t.dataFim)<today && t.status!=='Concluído';
    if (t.status==='Concluído') return 'Concluído';
    if (pastDue)                 return 'Atrasado';
    return t.status;
  }

  // Month headers
  let months='';
  const mc = new Date(minD); mc.setDate(1);
  while (mc<=maxD) {
    const lft = pct(mc);
    months+=`<div class="gantt-month-marker" style="left:${lft}%">${mc.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})}</div>`;
    mc.setMonth(mc.getMonth()+1);
  }

  // Weekly grid lines
  const totalDays = totalMs/86400000;
  let gridLines='';
  for (let i=0;i<totalDays;i+=7) {
    gridLines+=`<div class="gantt-grid-line" style="left:${(i/totalDays)*100}%"></div>`;
  }

  const todayPct = pct(today);

  // Task rows
  let rows='';
  tasks.forEach(t=>{
    const resp = byId('responsaveis',t.responsavelId);
    let barHtml='<div class="gantt-no-date">sem data definida</div>';
    if (t.dataInicio) {
      const left  = pct(t.dataInicio);
      const right = t.dataFim ? pct(t.dataFim) : left+1.5;
      const width = Math.max(right-left, 0.8);
      const color = barColor(t);
      const lbl   = barLabel(t);
      barHtml=`<div class="gantt-bar" style="left:${left}%;width:${width}%;background:${color}"
        title="${t.nome} | ${fmtDate(t.dataInicio)} → ${fmtDate(t.dataFim||'')} | ${lbl}">
        <span class="gantt-bar-lbl">${lbl}</span>
      </div>`;
    }
    rows+=`
    <div class="gantt-row">
      <div class="gantt-label">
        <div class="gantt-task-name">${t.nome}</div>
        <div class="gantt-task-meta">${resp?.nome||'—'}</div>
      </div>
      <div class="gantt-bar-area">
        ${gridLines}
        <div class="gantt-today-line" style="left:${todayPct}%"></div>
        ${barHtml}
      </div>
    </div>`;
  });

  return ganttSearchHtml + `
  <div class="gantt-wrap">
    <div class="gantt-legend">
      <span class="gantt-legend-item"><span class="gantt-legend-dot" style="background:var(--success)"></span>Concluído</span>
      <span class="gantt-legend-item"><span class="gantt-legend-dot" style="background:var(--primary)"></span>Em Andamento</span>
      <span class="gantt-legend-item"><span class="gantt-legend-dot" style="background:var(--danger)"></span>Atrasado</span>
      <span class="gantt-legend-item"><span class="gantt-legend-dot" style="background:var(--g300)"></span>A Fazer</span>
      <span class="gantt-legend-item"><span class="gantt-today-dot"></span>Hoje</span>
    </div>
    <div class="gantt-scroll">
      <div class="gantt-table">
        <div class="gantt-head">
          <div class="gantt-head-label">Tarefa</div>
          <div class="gantt-head-timeline">${months}</div>
        </div>
        ${rows}
      </div>
    </div>
  </div>`;
}

/* ================================================================
   CUSTOS
   ================================================================ */
function buildCustos(pid) {
  const allCustos = db.custos.filter(c=>c.projetoId===+pid);

  // ── Period filter ─────────────────────────────────────────────
  const hoje = new Date().toISOString().slice(0,10);
  const d7   = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const d30  = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  const mesAtual = hoje.slice(0,7); // 'YYYY-MM'
  let custos = allCustos;
  if (custosPeriodo==='7d')    custos = allCustos.filter(c=>c.data && c.data>=d7);
  if (custosPeriodo==='30d')   custos = allCustos.filter(c=>c.data && c.data>=d30);
  if (custosPeriodo==='month') custos = allCustos.filter(c=>c.data && c.data.slice(0,7)===mesAtual);

  const total = custos.reduce((s,c)=>s+(+c.valor||0),0);
  const totalGeral = allCustos.reduce((s,c)=>s+(+c.valor||0),0);

  // ── Period selector labels ────────────────────────────────────
  const periodos = [
    ['7d','Últimos 7 dias'],['30d','Últimos 30 dias'],
    ['month','Mês atual'],['all','Projeto completo']
  ];
  const periodoBar = periodos.map(([k,lbl])=>`
    <button onclick="setCustosPeriodo('${k}')"
      style="padding:5px 14px;font-size:12px;font-weight:${custosPeriodo===k?700:400};
             border-radius:20px;border:1px solid ${custosPeriodo===k?'var(--primary)':'var(--g200)'};
             background:${custosPeriodo===k?'var(--primary)':'var(--white)'};
             color:${custosPeriodo===k?'var(--white)':'var(--g600)'};cursor:pointer;transition:all .15s;">
      ${lbl}
    </button>`).join('');

  // ── Group by category ─────────────────────────────────────────
  const groups = new Map(); // categoriaId (or 'sem') -> { label, custos[], total }
  custos.forEach(c=>{
    const key   = c.categoriaId ? String(c.categoriaId) : 'sem';
    const label = c.categoriaId ? (byId('categorias',c.categoriaId)?.nome||'Categoria removida') : 'Sem categoria';
    if (!groups.has(key)) groups.set(key,{label,custos:[],total:0});
    const g = groups.get(key);
    g.custos.push(c);
    g.total += +c.valor||0;
  });

  // Sort groups by total desc
  const sortedGroups = [...groups.values()].sort((a,b)=>b.total-a.total);

  // ── Summary cards per category ────────────────────────────────
  const PALETTE_COLORS = ['var(--primary)','var(--success)','var(--warning)','#8B5CF6','#14B8A6','#EC4899','#0EA5E9','#D97706'];
  let summaryCards = `<div class="cost-sum-card" style="border-left:3px solid var(--g800);">
    <div class="cost-sum-label">${custosPeriodo==='all'?'Total Geral':'Total do Período'}</div>
    <div class="cost-sum-value" style="color:var(--g800)">${fmtBRL(total)}</div>
    ${custosPeriodo!=='all'?`<div style="font-size:10px;color:var(--g400);margin-top:2px;">Projeto: ${fmtBRL(totalGeral)}</div>`:''}
  </div>`;
  sortedGroups.forEach(({label,total:t},i)=>{
    const col = PALETTE_COLORS[i % PALETTE_COLORS.length];
    const pct = total>0?Math.round(t/total*100):0;
    summaryCards += `<div class="cost-sum-card" style="border-left:3px solid ${col};">
      <div class="cost-sum-label">${esc(label)}</div>
      <div class="cost-sum-value" style="color:${col}">${fmtBRL(t)}</div>
      <div style="font-size:10px;color:var(--g400);margin-top:2px;">${pct}% do total</div>
    </div>`;
  });

  // ── Build table grouped ───────────────────────────────────────
  let tableHtml = '';
  if (!custos.length) {
    tableHtml = `<div class="empty" style="margin-top:16px;"><div class="empty-icon">💰</div>
      <p>${allCustos.length&&custosPeriodo!=='all'?'Nenhum custo neste período.':'Nenhum custo registrado.'}</p>
      <button class="btn btn-primary" onclick="openCostModal(${pid})">＋ Novo Custo</button></div>`;
  } else {
    tableHtml = `<div class="table-wrap" style="margin-top:16px;"><table>
      <thead><tr>
        <th>Descrição</th><th>Data</th>
        <th style="text-align:right">Valor</th>
        <th style="text-align:center">Ações</th>
      </tr></thead><tbody>`;

    sortedGroups.forEach(({label,custos:gc,total:gt},i)=>{
      const col = PALETTE_COLORS[i % PALETTE_COLORS.length];
      // Category header row
      tableHtml += `<tr style="background:var(--g50);">
        <td colspan="2" style="font-weight:700;color:var(--g700);padding:8px 12px;">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col};margin-right:6px;vertical-align:middle;"></span>
          ${esc(label)}
          <span style="font-size:11px;font-weight:400;color:var(--g400);margin-left:6px;">${gc.length} item${gc.length!==1?'s':''}</span>
        </td>
        <td style="text-align:right;font-weight:700;color:${col};padding:8px 12px;">${fmtBRL(gt)}</td>
        <td></td>
      </tr>`;
      // Rows within category
      [...gc].sort((a,b)=>(b.data||'')>(a.data||'')?1:-1).forEach(c=>{
        tableHtml += `<tr>
          <td style="padding-left:22px;">${esc(c.descricao)}</td>
          <td style="font-size:12px;color:var(--g500);white-space:nowrap;">${fmtDate(c.data)||'—'}</td>
          <td style="text-align:right;font-weight:600;">${fmtBRL(c.valor)}</td>
          <td style="text-align:center;white-space:nowrap;">
            <button class="icon-btn" onclick="openCostModal(${pid},${c.id})">✏️</button>
            <button class="icon-btn del" onclick="confirmDelete('custos',${c.id},'${esc(c.descricao)}')">🗑️</button>
          </td></tr>`;
      });
    });

    tableHtml += `<tr class="tfoot-row">
      <td colspan="2" style="text-align:right">Total</td>
      <td style="text-align:right">${fmtBRL(total)}</td>
      <td></td>
    </tr></tbody></table></div>`;
  }

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
    <div style="display:flex;gap:6px;flex-wrap:wrap;">${periodoBar}</div>
    <button class="btn btn-primary" onclick="openCostModal(${pid})">＋ Novo Custo</button>
  </div>
  <div class="costs-summary">${summaryCards}</div>
  ${tableHtml}`;
}

/* ================================================================
   INDICADORES PANEL
   ================================================================ */
const MES_NOMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MES_NOMES_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// Retorna variação % formatada com sinal e cor
function fmtVar(val, ref) {
  if (ref === null || ref === undefined || ref === 0) return { txt:'—', cls:'neu' };
  const pct = ((val - ref) / Math.abs(ref)) * 100;
  const abs = Math.abs(pct);
  const txt = (pct >= 0 ? '+' : '') + abs.toFixed(1) + '%';
  return { txt: pct >= 0 ? '▲ '+txt : '▼ '+txt, cls: pct >= 0 ? 'pos' : 'neg' };
}

// Retorna meta de um indicador para um mes/ano específico (ou null)
function getMeta(indId, mes, ano) {
  return db.indicadorMetas.find(m => m.indicadorId === indId && m.mes === mes && m.ano === ano) || null;
}

// Encontra o mês mais recente com meta_realizada preenchida
function ultimoMesRealizado(indId) {
  const realizados = db.indicadorMetas
    .filter(m => m.indicadorId === indId && m.metaRealizada !== null)
    .sort((a,b) => b.ano !== a.ano ? b.ano - a.ano : b.mes - a.mes);
  return realizados[0] || null;
}

// Gera gráfico SVG comparativo previsto vs realizado
// Gera path SVG suavizado (Catmull-Rom → Bézier cúbico)
function smoothCurve(pts) {
  if (!pts.length) return '';
  if (pts.length === 1) return `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  if (pts.length === 2) return `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)} L${pts[1][0].toFixed(1)},${pts[1][1].toFixed(1)}`;
  let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[i + 2] || pts[i + 1];
    const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
    const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
    const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d;
}

function buildIndChart(indId, ano) {
  const metas = db.indicadorMetas
    .filter(m => m.indicadorId === indId && m.ano === +ano)
    .sort((a,b) => a.mes - b.mes);
  if (!metas.length) return `<div style="padding:18px;text-align:center;font-size:12px;color:var(--g400);">Sem metas cadastradas para ${ano}.</div>`;

  const W = 540, H = 160;
  const PAD = { t:16, r:16, b:28, l:46 };
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;

  const prevVals = metas.map(m => m.metaPrevista);
  const realVals = metas.filter(m => m.metaRealizada !== null).map(m => m.metaRealizada);
  const allVals  = [...prevVals, ...realVals].filter(v => v !== null);
  if (!allVals.length) return '';

  const rawMin = Math.min(...allVals);
  const rawMax = Math.max(...allVals);
  const spread = rawMax - rawMin || 1;
  const minV   = rawMin - spread * 0.15;
  const maxV   = rawMax + spread * 0.15;

  const xS = i => PAD.l + (metas.length < 2 ? cW/2 : (i / (metas.length - 1)) * cW);
  const yS = v => PAD.t + cH - ((v - minV) / (maxV - minV)) * cH;

  // Y-axis ticks
  const tickCount = 4;
  let yTicks = '';
  for (let i = 0; i <= tickCount; i++) {
    const v  = minV + (maxV - minV) * (i / tickCount);
    const y  = yS(v);
    const lv = Math.abs(v) >= 1000 ? (v/1000).toFixed(1)+'k' : v % 1 === 0 ? Math.round(v) : v.toFixed(1);
    yTicks += `<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${PAD.l+cW}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/>
               <text x="${PAD.l-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="5.5" fill="#cdd5de">${lv}</text>`;
  }

  // Curva suavizada — previsto
  const prevPts  = metas.map((m,i) => [xS(i), yS(m.metaPrevista)]);
  const prevPath = smoothCurve(prevPts);

  // Curva suavizada — realizado (agrupa segmentos consecutivos com dados)
  let realPaths = '';
  let seg = [];
  metas.forEach((m,i) => {
    if (m.metaRealizada !== null) {
      seg.push([xS(i), yS(m.metaRealizada)]);
    } else {
      if (seg.length) { realPaths += `<path d="${smoothCurve(seg)}" fill="none" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`; seg = []; }
    }
  });
  if (seg.length) realPaths += `<path d="${smoothCurve(seg)}" fill="none" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Área preenchida sob curva previsto (sutil)
  const areaPath = prevPath + ` L${xS(metas.length-1).toFixed(1)},${(PAD.t+cH).toFixed(1)} L${PAD.l.toFixed(1)},${(PAD.t+cH).toFixed(1)} Z`;

  // Dots + labels
  let dots = '', xlabels = '';
  metas.forEach((m,i) => {
    const x = xS(i).toFixed(1);
    xlabels += `<text x="${x}" y="${H-6}" text-anchor="middle" font-size="5.5" fill="#cdd5de">${MES_NOMES[m.mes-1]}</text>`;
    dots += `<circle cx="${x}" cy="${yS(m.metaPrevista).toFixed(1)}" r="3" fill="#fff" stroke="#E8501A" stroke-width="2" opacity=".9"/>`;
    if (m.metaRealizada !== null) {
      const col = m.metaRealizada >= m.metaPrevista ? '#10B981' : '#EF4444';
      dots += `<circle cx="${x}" cy="${yS(m.metaRealizada).toFixed(1)}" r="3.5" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
    }
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">
    <defs>
      <linearGradient id="indGrad${indId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E8501A" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#E8501A" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${yTicks}
    <path d="${areaPath}" fill="url(#indGrad${indId})"/>
    <path d="${prevPath}" fill="none" stroke="#E8501A" stroke-width="2" stroke-dasharray="7,4" stroke-linecap="round" opacity=".8"/>
    ${realPaths}
    ${dots}
    ${xlabels}
  </svg>`;
}

function setIndMes(val)  { indMesFiltro  = +val; renderIndicadores(); }

function toggleIndExpand(id) {
