<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Indicadores e Projetos</title>
<style>
/* ===== RESET & VARIABLES ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#E8501A;--primary-lt:#FFF0EB;--primary-dk:#C94214;
  --success:#10B981;--success-lt:#ECFDF5;
  --warning:#F59E0B;--warning-lt:#FFFBEB;
  --danger:#EF4444;--danger-lt:#FEF2F2;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;
  --g800:#1E293B;--g900:#0F172A;--white:#FFFFFF;
  --sh:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shmd:0 4px 6px -1px rgba(0,0,0,.10),0 2px 4px -1px rgba(0,0,0,.06);
  --shlg:0 10px 15px -3px rgba(0,0,0,.10),0 4px 6px -2px rgba(0,0,0,.05);
  --r:8px;--rlg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{width:240px;background:var(--g900);color:var(--white);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s ease;}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
.sb-logo-icon{width:38px;height:38px;background:var(--primary);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sb-logo-text{font-size:15px;font-weight:700;line-height:1.3;}
.sb-logo-text small{display:block;font-size:11px;font-weight:400;color:var(--g400);}
.sb-nav{padding:14px 10px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;transition:background .15s;color:var(--g400);font-size:14px;font-weight:500;margin-bottom:2px;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--white);}
.nav-item.active{background:var(--primary);color:var(--white);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
/* Grupo de menu */
.nav-group{margin-bottom:2px;}
.nav-group-header{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;transition:background .15s;color:var(--g400);font-size:14px;font-weight:600;user-select:none;}
.nav-group-header:hover{background:rgba(255,255,255,.07);color:var(--white);}
.nav-group-header.open{color:var(--white);}
.nav-group-arrow{margin-left:auto;font-size:9px;transition:transform .2s;opacity:.6;}
.nav-group-header.open .nav-group-arrow{transform:rotate(90deg);}
.nav-sub{overflow:hidden;max-height:0;transition:max-height .25s ease;}
.nav-sub.open{max-height:200px;}
.nav-sub .nav-item{padding:8px 12px 8px 38px;font-size:13px;margin-bottom:1px;}
.sb-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.sb-user-info{flex:1;min-width:0;}
.sb-user-name{font-size:12px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-role{font-size:10px;color:var(--g400);margin-top:1px;}
.sb-logout{background:none;border:none;cursor:pointer;color:var(--g500);font-size:18px;padding:4px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.sb-logout:hover{color:var(--danger);}

/* ===== TOPBAR ===== */
.topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.hamburger{display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;font-size:18px;color:var(--g500);padding:6px;border-radius:var(--r);transition:background .15s,color .15s;width:34px;height:34px;flex-shrink:0;}
.hamburger:hover{background:var(--g100);color:var(--g800);}
.sidebar.collapsed{transform:translateX(-240px);}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s ease;}
.main.sb-collapsed{margin-left:0;}
.page-title{font-size:17px;font-weight:700;color:var(--g800);}
.page-sub{font-size:11px;color:var(--g400);margin-top:1px;}

/* ===== CONTENT ===== */
.content{padding:24px;flex:1;}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:var(--white);}
.btn-primary:hover{background:var(--primary-dk);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.btn-secondary{background:var(--white);color:var(--g700);border:1px solid var(--g200);}
.btn-secondary:hover{background:var(--g50);}
.btn-danger{background:var(--danger);color:var(--white);}
.btn-danger:hover{background:#DC2626;}
.btn-danger:disabled{opacity:.6;cursor:not-allowed;}
.btn-sm{padding:6px 12px;font-size:12px;}
.icon-btn{width:30px;height:30px;border-radius:6px;border:none;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:var(--g400);transition:all .15s;}
.icon-btn:hover{background:var(--g100);color:var(--g700);}
.icon-btn.del:hover{background:var(--danger-lt);color:var(--danger);}

/* ===== STATS ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--rlg);padding:12px 14px;box-shadow:var(--sh);border:1px solid var(--g100);transition:box-shadow .2s,transform .2s,border-color .2s;}
.stat-card.clickable{cursor:pointer;}
.stat-card.clickable:hover{box-shadow:var(--shmd);transform:translateY(-2px);}
.stat-card.clickable.active{border-color:currentColor;box-shadow:var(--shmd),0 0 0 3px rgba(232,80,26,.15);}
.stat-card.clickable.active-success{border-color:var(--success);box-shadow:var(--shmd),0 0 0 3px rgba(16,185,129,.15);}
.stat-card.clickable.active-primary{border-color:var(--primary);box-shadow:var(--shmd),0 0 0 3px rgba(232,80,26,.15);}
.stat-card.clickable.active-danger{border-color:var(--danger);box-shadow:var(--shmd),0 0 0 3px rgba(239,68,68,.15);}
.stat-card.clickable.active-warning{border-color:var(--warning);box-shadow:var(--shmd),0 0 0 3px rgba(245,158,11,.15);}
.stat-card.dimmed{opacity:.45;}
.stat-icon{font-size:18px;margin-bottom:4px;}
.stat-label{font-size:10px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.stat-value{font-size:22px;font-weight:800;color:var(--g800);}
.filter-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--primary-lt);color:var(--primary);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
.filter-badge:hover{background:#DDD6FE;}

/* ===== PROJECT CARDS ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.section-title{font-size:15px;font-weight:700;color:var(--g700);}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}

/* ===== VIEW TOGGLE ===== */
.view-toggle{display:flex;gap:4px;background:var(--g100);border-radius:var(--r);padding:3px;}
.view-btn{padding:5px 10px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:15px;color:var(--g500);transition:all .15s;line-height:1;}
.view-btn.active{background:var(--white);color:var(--primary);box-shadow:var(--sh);}

/* ===== PROJECTS TABLE ===== */
.proj-table-wrap{background:var(--white);border-radius:var(--rlg);border:1px solid var(--g100);box-shadow:var(--sh);overflow:hidden;}
.proj-table{width:100%;border-collapse:collapse;}
.proj-table th{background:var(--g50);padding:0;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);border-bottom:2px solid var(--g200);white-space:nowrap;user-select:none;vertical-align:bottom;}
.proj-table th.no-filter{padding:11px 16px;}
.proj-table th.sortable{cursor:pointer;transition:color .15s;}
.proj-table th.sortable:hover .proj-th-label{color:var(--primary);}
.proj-th-inner{display:flex;flex-direction:column;}
.proj-th-label{padding:9px 14px 7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);white-space:nowrap;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;transition:color .15s;}
.proj-th-label.sort-asc::after{content:'↑';color:var(--primary);font-size:12px;}
.proj-th-label.sort-desc::after{content:'↓';color:var(--primary);font-size:12px;}
.proj-th-filter{padding:0 8px 8px;}
.proj-table td{padding:12px 16px;font-size:13px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle;}
.proj-table tr:last-child td{border-bottom:none;}
.proj-table tr:hover td{background:var(--g50);}
.proj-table .td-name{font-weight:700;color:var(--g800);cursor:pointer;}
.proj-table .td-name:hover{color:var(--primary);text-decoration:underline;}
.proj-table .td-progress{min-width:120px;}
.proj-table .td-actions{white-space:nowrap;text-align:right;}
.proj-card{background:var(--white);border-radius:var(--rlg);padding:20px;box-shadow:var(--sh);border:1px solid var(--g100);transition:box-shadow .2s,transform .2s;}
.proj-card:hover{box-shadow:var(--shmd);transform:translateY(-2px);}
.proj-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.proj-card-name{font-size:15px;font-weight:700;color:var(--g800);line-height:1.3;}
.proj-icon-opt{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r);font-size:20px;cursor:pointer;transition:all .15s;border:2px solid transparent;}
.proj-icon-opt:hover{background:var(--g200);}
.proj-icon-opt.selected{background:var(--primary-lt);border-color:var(--primary);}
.proj-card-actions{display:flex;gap:2px;flex-shrink:0;margin-left:8px;}
.proj-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.proj-card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g500);margin-bottom:14px;}
.progress-wrap{margin-bottom:12px;}
.progress-top{display:flex;justify-content:space-between;font-size:11px;color:var(--g500);margin-bottom:5px;font-weight:500;}
.progress-bar{height:6px;background:var(--g100);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.proj-dates{font-size:11px;color:var(--g400);margin-bottom:14px;}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.b-success{background:var(--success-lt);color:#065F46;}
.b-warning{background:var(--warning-lt);color:#92400E;}
.b-danger{background:var(--danger-lt);color:#991B1B;}
.b-primary{background:var(--primary-lt);color:#C94214;}
.b-gray{background:var(--g100);color:var(--g600);}

/* ===== AVATAR ===== */
.avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:var(--white);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* ===== TAGS ===== */
.tag-picker{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);min-height:44px;cursor:default;}
.tag-picker-empty{font-size:12px;color:var(--g400);align-self:center;font-style:italic;}
.tag-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none;color:#fff;}
.tag-pill:hover{filter:brightness(.92);}
.tag-pill.selected{border-color:rgba(0,0,0,.22);filter:brightness(.88);}
.tag-pill-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.65);flex-shrink:0;}
.tag-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;color:#fff;margin-right:3px;margin-top:2px;}
.tag-color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid var(--g200);cursor:pointer;display:inline-block;vertical-align:middle;}
.tag-colors{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 4px;}

/* ===== TASK GRID ===== */
.tg-wrap{background:var(--white);border-radius:var(--rlg);border:1px solid var(--g100);box-shadow:var(--sh);overflow:hidden;overflow-x:auto;}
.tg-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--g100);flex-wrap:wrap;gap:8px;}
.tg-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tg-filter-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--primary-lt);color:var(--primary);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;}
.tg-filter-chip:hover{background:#DDD6FE;}
.tg-table{width:100%;border-collapse:collapse;}
.tg-table th{background:var(--g50);padding:0;border-bottom:2px solid var(--g200);vertical-align:bottom;}
.tg-th-inner{display:flex;flex-direction:column;}
.tg-th-label{padding:9px 14px 7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);white-space:nowrap;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;transition:color .15s;}
.tg-th-label:hover{color:var(--primary);}
.tg-th-label.sort-asc::after{content:'↑';color:var(--primary);font-size:12px;}
.tg-th-label.sort-desc::after{content:'↓';color:var(--primary);font-size:12px;}
.tg-th-filter{padding:0 8px 8px;}
.tg-filter-select{width:100%;padding:4px 6px;font-size:11px;border:1px solid var(--g200);border-radius:5px;background:var(--white);color:var(--g700);cursor:pointer;outline:none;}
.tg-filter-select:focus{border-color:var(--primary);}
.tg-filter-select.active{border-color:var(--primary);background:var(--primary-lt);color:var(--primary);font-weight:600;}
.tg-filter-input{width:100%;padding:4px 6px;font-size:11px;border:1px solid var(--g200);border-radius:5px;background:var(--white);color:var(--g700);outline:none;}
.tg-filter-input:focus{border-color:var(--primary);}
.tg-filter-input.active{border-color:var(--primary);background:var(--primary-lt);}
.tg-table td{padding:10px 14px;font-size:13px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle;}
.tg-table tr:last-child td{border-bottom:none;}
.tg-table tr:hover td{background:var(--g50);}
.tg-task-name{font-weight:600;color:var(--g800);}
.tg-count{font-size:11px;color:var(--g400);margin-left:4px;font-weight:400;}
.tg-empty{text-align:center;padding:40px;color:var(--g400);font-size:13px;}

/* ===== CSV IMPORT ===== */
.csv-drop-zone{border:2px dashed var(--g300);border-radius:var(--rlg);padding:32px 20px;text-align:center;transition:all .2s;cursor:pointer;background:var(--g50);}
.csv-drop-zone:hover,.csv-drop-zone.drag-active{border-color:var(--primary);background:var(--primary-lt);}
.csv-drop-zone input[type=file]{display:none;}
.csv-drop-icon{font-size:38px;margin-bottom:10px;}
.csv-drop-text{font-size:14px;font-weight:600;color:var(--g600);margin-bottom:4px;}
.csv-drop-sub{font-size:12px;color:var(--g400);}
.csv-layout-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.csv-layout-table th{background:var(--g800);color:white;padding:7px 10px;text-align:left;font-weight:600;}
.csv-layout-table td{padding:6px 10px;border-bottom:1px solid var(--g100);vertical-align:top;}
.csv-layout-table tr:nth-child(even) td{background:var(--g50);}
.csv-req{color:var(--danger);font-weight:700;}
.csv-preview-table{width:100%;border-collapse:collapse;font-size:12px;}
.csv-preview-table th{background:var(--g100);padding:7px 10px;text-align:left;font-weight:700;color:var(--g600);border-bottom:2px solid var(--g200);}
.csv-preview-table td{padding:6px 10px;border-bottom:1px solid var(--g100);vertical-align:middle;}
.csv-preview-table tr.row-ok td{background:#F0FDF4;}
.csv-preview-table tr.row-err td{background:#FEF2F2;}
.csv-row-status{font-size:11px;font-weight:700;white-space:nowrap;}
.csv-err-msg{font-size:11px;color:var(--danger);}
.import-summary{display:flex;gap:12px;padding:12px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);margin-bottom:14px;}
.import-summary-item{text-align:center;flex:1;}
.import-summary-num{font-size:20px;font-weight:800;}
.import-summary-lbl{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:60px 20px;color:var(--g400);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty p{font-size:14px;margin-bottom:18px;}

/* ===== PROJECT DETAIL ===== */
.proj-detail-header{background:var(--white);border-radius:var(--rlg);padding:22px 24px;margin-bottom:20px;box-shadow:var(--sh);border:1px solid var(--g100);}
.pdh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:16px;}
.pdh-name{font-size:21px;font-weight:800;color:var(--g800);margin-bottom:5px;}
.pdh-desc{font-size:13px;color:var(--g500);max-width:580px;line-height:1.5;}
.pdh-meta{display:flex;flex-wrap:wrap;gap:20px;padding-top:14px;border-top:1px solid var(--g100);}
.meta-item{display:flex;flex-direction:column;gap:3px;}
.meta-label{font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.meta-value{font-size:13px;color:var(--g700);font-weight:600;}

/* ===== TABS ===== */
.tabs{display:flex;border-bottom:2px solid var(--g200);margin-bottom:20px;}
.tab{padding:10px 22px;font-size:14px;font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab:hover{color:var(--g700);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* ===== KANBAN ===== */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start;}
.k-col{background:var(--g100);border-radius:var(--rlg);padding:14px;min-height:340px;border:2px solid transparent;transition:border-color .15s,background .15s;}
.k-col.drag-over{background:var(--primary-lt);border-color:var(--primary);}
.k-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.k-col-title{font-size:12px;font-weight:700;color:var(--g600);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.4px;}
.k-count{background:var(--white);color:var(--g600);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;}
.k-cards{display:flex;flex-direction:column;gap:8px;min-height:60px;}
.task-card{background:var(--white);border-radius:var(--r);padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.06);border:1px solid var(--g100);cursor:grab;transition:box-shadow .15s,opacity .15s;user-select:none;}
.task-card:hover{box-shadow:var(--sh);}
.task-card.dragging{opacity:.45;cursor:grabbing;}
.task-card.drop-before{border-top:3px solid var(--primary)!important;margin-top:-1px;}
.task-card.drop-after{border-bottom:3px solid var(--primary)!important;margin-bottom:-1px;}
.task-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:6px;}
.task-card-title{font-size:13px;font-weight:600;color:var(--g800);line-height:1.35;flex:1;min-width:0;}
.task-card-foot{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap;}
.task-resp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--g500);flex-shrink:0;}
.task-actions{display:flex;gap:2px;flex-shrink:0;}
.task-date{font-size:10px;color:var(--g400);white-space:nowrap;}
.k-no-tasks{text-align:center;padding:20px 0;font-size:12px;color:var(--g300);}

/* ===== COSTS ===== */
.costs-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.cost-sum-card{background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--g100);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.cost-sum-label{font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;}
.cost-sum-value{font-size:20px;font-weight:800;}
.table-wrap{background:var(--white);border-radius:var(--rlg);border:1px solid var(--g100);overflow:hidden;overflow-x:auto;box-shadow:var(--sh);}
table{width:100%;border-collapse:collapse;}
th{background:var(--g50);padding:10px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);border-bottom:1px solid var(--g200);white-space:nowrap;}
td{padding:11px 16px;font-size:13px;color:var(--g700);border-bottom:1px solid var(--g100);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--g50);}
.tfoot-row td{background:var(--g50);font-weight:700;color:var(--g900);}

/* ===== GANTT ===== */
.gantt-wrap{background:var(--white);border-radius:var(--rlg);border:1px solid var(--g100);box-shadow:var(--sh);overflow:hidden;}
.gantt-legend{display:flex;gap:16px;padding:12px 16px;border-bottom:1px solid var(--g100);flex-wrap:wrap;align-items:center;}
.gantt-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g600);font-weight:500;}
.gantt-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.gantt-today-dot{width:3px;height:16px;border-radius:2px;background:var(--danger);flex-shrink:0;}
.gantt-scroll{overflow-x:auto;}
.gantt-table{min-width:700px;}
.gantt-head{display:flex;background:var(--g50);border-bottom:2px solid var(--g200);}
.gantt-head-label{width:220px;min-width:220px;padding:10px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);}
.gantt-head-timeline{flex:1;position:relative;height:36px;overflow:hidden;}
.gantt-month-marker{position:absolute;top:0;padding:10px 0 0 4px;font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;white-space:nowrap;}
.gantt-row{display:flex;border-bottom:1px solid var(--g100);min-height:50px;}
.gantt-row:last-child{border-bottom:none;}
.gantt-row:hover{background:var(--g50);}
.gantt-label{width:220px;min-width:220px;padding:10px 16px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--g100);}
.gantt-task-name{font-size:13px;font-weight:600;color:var(--g800);}
.gantt-task-meta{font-size:11px;color:var(--g400);margin-top:2px;}
.gantt-bar-area{flex:1;position:relative;display:flex;align-items:center;overflow:hidden;}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--g100);}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.6;z-index:2;}
.gantt-today-line::before{content:'hoje';position:absolute;top:3px;left:4px;font-size:9px;color:var(--danger);font-weight:700;white-space:nowrap;}
.gantt-bar{position:absolute;height:26px;border-radius:5px;display:flex;align-items:center;padding:0 8px;cursor:default;z-index:1;transition:opacity .15s;min-width:6px;}
.gantt-bar:hover{opacity:.82;}
.gantt-bar-lbl{font-size:10px;color:white;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.gantt-no-date{font-size:11px;color:var(--g300);padding:0 16px;font-style:italic;}

/* ===== SETTINGS ===== */
.settings-card{background:var(--white);border-radius:var(--rlg);border:1px solid var(--g100);box-shadow:var(--sh);margin-bottom:22px;overflow:hidden;}
.settings-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--g100);}
.settings-card-title{font-size:15px;font-weight:700;color:var(--g800);}
.settings-card-sub{font-size:12px;color:var(--g400);margin-top:2px;}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .2s;pointer-events:none;}
.overlay.on{opacity:1;pointer-events:all;}
.overlay.dragging{background:transparent!important;}
.modal{background:var(--white);border-radius:var(--rlg);width:100%;max-width:520px;box-shadow:var(--shlg);transform:scale(.95);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.overlay.on .modal{transform:scale(1);}
.modal-drag-bar{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--g50);border-bottom:1px solid var(--g100);border-radius:var(--rlg) var(--rlg) 0 0;cursor:grab;user-select:none;color:var(--g400);font-size:11px;font-weight:600;letter-spacing:.4px;}
.modal-drag-bar:active{cursor:grabbing;}
.modal-drag-bar span{font-size:15px;line-height:1;color:var(--g300);}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.modal-title{font-size:15px;font-weight:700;color:var(--g800);}
.modal-x{width:30px;height:30px;border-radius:var(--r);border:none;background:var(--g100);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--g500);transition:background .15s;}
.modal-x:hover{background:var(--g200);}
.modal-body{padding:18px 22px;}
.modal-foot{padding:14px 22px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--g100);}

/* ===== FORMS ===== */
.fg{margin-bottom:14px;}
.fg:last-child{margin-bottom:0;}
label.lbl{display:block;font-size:12px;font-weight:600;color:var(--g700);margin-bottom:5px;}
label.lbl .req{color:var(--danger);margin-left:2px;}
.fc{width:100%;padding:8px 11px;border:1px solid var(--g200);border-radius:var(--r);font-size:13px;color:var(--g800);background:var(--white);transition:border-color .15s;outline:none;font-family:inherit;}
.fc:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,80,26,.1);}
textarea.fc{resize:vertical;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ===== DELETE MODAL ===== */
.del-body{text-align:center;padding:28px 24px;}
.del-ico{font-size:44px;margin-bottom:12px;}
.del-title{font-size:17px;font-weight:700;color:var(--g800);margin-bottom:8px;}
.del-msg{font-size:13px;color:var(--g500);line-height:1.55;margin-bottom:22px;}
.del-actions{display:flex;gap:8px;justify-content:center;}

/* ===== AUTH SCREEN ===== */
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1E293B 0%,#C94214 100%);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;}
.auth-card{background:var(--white);border-radius:var(--rlg);width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;}
.auth-hd{background:linear-gradient(135deg,var(--primary-dk),var(--primary));padding:28px 32px 22px;text-align:center;color:white;}
.auth-hd-ico{font-size:38px;margin-bottom:8px;}
.auth-hd-title{font-size:22px;font-weight:800;}
.auth-hd-sub{font-size:13px;opacity:.8;margin-top:4px;}
.auth-body{padding:26px 32px;}
.auth-foot{padding:0 32px 24px;text-align:center;font-size:13px;color:var(--g500);}
.auth-link{color:var(--primary);font-weight:600;cursor:pointer;}
.auth-link:hover{text-decoration:underline;}
.auth-msg{border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
.auth-msg.show{display:block;}
.auth-msg.err{background:var(--danger-lt);border:1px solid #FECACA;color:var(--danger);}
.auth-msg.ok{background:var(--success-lt);border:1px solid #A7F3D0;color:#065F46;}

/* ===== PENDING SCREEN ===== */
.pending-screen{position:fixed;inset:0;background:var(--g50);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;}
.pending-card{background:var(--white);border-radius:var(--rlg);width:100%;max-width:440px;padding:40px 32px;text-align:center;box-shadow:var(--shlg);border:1px solid var(--g100);}

/* ===== DB BADGE ===== */
.db-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;}
.db-badge.online{background:var(--success-lt);color:#065F46;}
.db-badge.offline{background:var(--danger-lt);color:#991B1B;}
.db-dot{width:7px;height:7px;border-radius:50%;}
.db-badge.online .db-dot{background:var(--success);}
.db-badge.offline .db-dot{background:var(--danger);}

/* ===== LOADING ===== */
.loading-screen{position:fixed;inset:0;background:rgba(248,250,252,.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:40px;height:40px;border:4px solid var(--g200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:14px;color:var(--g500);font-weight:500;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== TOAST ===== */
.toasts{position:fixed;bottom:22px;right:22px;z-index:3000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--g800);color:var(--white);padding:11px 15px;border-radius:var(--r);font-size:13px;box-shadow:var(--shlg);display:flex;align-items:center;gap:8px;max-width:320px;animation:toastIn .25s ease;}
.toast.ok{background:#065F46;}
.toast.err{background:#991B1B;}
@keyframes toastIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ===== MOBILE OVERLAY ===== */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  /* Sidebar */
  .sidebar{transform:translateX(-100%);z-index:400;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.35);}
  .sidebar.collapsed{transform:translateX(-100%);}
  .mob-overlay{z-index:350;}
  .mob-overlay.show{display:block;}
  .main{margin-left:0 !important;}

  /* Hamburger: trocar SVG de desktop por ☰ claro no mobile */
  #sidebarToggleIcon{display:none;}
  #sidebarToggleBtn{width:40px;height:40px;background:var(--g100);border-radius:var(--r);color:var(--g700);}
  #sidebarToggleBtn::before{content:'☰';font-size:20px;line-height:1;}
  #sidebarToggleBtn[data-open="1"]::before{content:'✕';font-size:18px;}

  /* Topbar */
  .topbar{padding:0 12px;height:56px;}
  .page-title{font-size:15px;}
  .db-badge{display:none;}

  /* Content */
  .content{padding:12px;}

  /* Grids */
  .stats-row{grid-template-columns:1fr 1fr;}
  .kanban{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .costs-summary{grid-template-columns:1fr;}
  .projects-grid{grid-template-columns:1fr;}
  .pdh-top{flex-direction:column;}

  /* Variações: scroll horizontal */
  .ind-vars{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
  .ind-var{flex:0 0 auto;min-width:90px;}

  /* Modal */
  .modal{max-width:100%;margin:0;border-radius:var(--rlg) var(--rlg) 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh;}
  .overlay{align-items:flex-end;padding:0;}
  .modal-drag-bar{display:flex;}
  .modal-body{padding:14px 16px;}
  .modal-foot{padding:12px 16px;}

  /* Tabelas: garantir scroll horizontal */
  .table-wrap,
  .tg-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* AGM KPIs */
  .agmrel-kpis{grid-template-columns:repeat(2,1fr);}

  /* === Indicadores: card header mobile === */
  .ind-card-head{flex-direction:column!important;gap:10px;padding:12px 14px 10px!important;}
  .ind-card-actions{width:100%;justify-content:flex-end;}
  .ind-card-title{font-size:14px;}

  /* === KPI grid mobile: 2 colunas === */
  .ind-kpis{
    grid-template-columns:repeat(2,1fr)!important;
    min-width:unset!important;
  }
  .ind-kpi:nth-child(even){border-right:none!important;}
  .ind-kpi:nth-child(3),
  .ind-kpi:nth-child(4){border-top:1px solid var(--g100);}
  .ind-kpi:nth-child(5){grid-column:1/-1!important;border-top:1px solid var(--g100);border-right:none!important;}
  .ind-kpi-value{font-size:15px!important;}
  .ind-kpi-label{font-size:9px;}

  /* === Monthly table mobile: card por linha === */
  .ind-table-wrap{overflow-x:unset!important;padding:8px 12px 12px;}
  .ind-mes-table{font-size:12px;border-collapse:separate!important;border-spacing:0 8px!important;}
  .ind-mes-table thead{display:none!important;}
  .ind-mes-table tbody tr{
    display:block!important;
    border:1px solid var(--g200)!important;
    border-radius:10px;
    overflow:hidden;
    background:var(--white);
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .ind-mes-table td{
    display:flex!important;
    align-items:center;
    justify-content:space-between;
    padding:7px 12px!important;
    border-bottom:1px solid var(--g100)!important;
    border-right:none!important;
    text-align:right;
    white-space:normal!important;
    vertical-align:unset!important;
  }
  .ind-mes-table td:last-child{border-bottom:none!important;}
  .ind-mes-table td[data-label=""]{justify-content:flex-end;gap:6px;}
  .ind-mes-table td::before{
    content:attr(data-label);
    font-size:10px;
    font-weight:700;
    color:var(--g500);
    text-transform:uppercase;
    letter-spacing:.04em;
    flex-shrink:0;
    margin-right:8px;
    text-align:left;
  }
  .ind-mes-table td[data-label="Mês"]{
    background:var(--g50);
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid var(--g200)!important;
  }
  .ind-mes-table td[data-label=""]{background:var(--g50);}
  .ind-mes-table tr:hover td{background:unset!important;}

  /* === AGM Seções: 1 coluna no mobile === */
  .agmrel-sec-grid{grid-template-columns:1fr;}
  .agmrel-filters{flex-direction:column;align-items:stretch!important;gap:8px!important;}
  .agmrel-filters select{width:100%;}
  .agmrel-export-btn{width:100%;justify-content:center!important;margin-left:0!important;}

  /* === Gráfico: full width no mobile === */
  .ind-chart{padding:10px 12px 8px;}
  .ind-chart-inner{width:100%;}
  .ind-chart-title.ind-chart-inner{flex-direction:column;align-items:center;gap:6px;text-align:center;}

  /* Botões: levemente menores */
  .btn{padding:7px 12px;font-size:12px;}

  /* Toolbar das tabelas */
  .tg-toolbar{padding:10px 12px;}

  /* PDH meta */
  .pdh-meta{gap:12px;}
  .pdh-name{font-size:17px;}
}

@media(max-width:480px){
  /* Stats: 2 colunas compactas */
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;}

  .ind-var{flex:0 0 auto;min-width:80px;}

  /* Topbar */
  .topbar{padding:0 10px;height:52px;}
  .page-title{font-size:14px;}
  .page-sub{display:none;}

  /* Content */
  .content{padding:10px;}

  /* Modal ocupa quase a tela toda */
  .modal{max-height:96vh;}

  /* Cards de stat menores */
  .stat-card{padding:12px 14px;}
  .stat-val{font-size:22px;}

  /* Botões menores */
  .btn{padding:6px 10px;font-size:12px;}
  .btn-sm{padding:4px 8px;font-size:11px;}

  /* Chips de filtro */
  .tg-filter-chip{padding:3px 8px;font-size:10px;}
}

@media(max-width:360px){
  /* Stats: coluna única em telas muito pequenas */
  .stats-row{grid-template-columns:1fr;}


  .content{padding:8px;}
  .topbar{padding:0 8px;}
}

/* ===== INDICADORES PANEL ===== */
.ind-grid{display:grid;grid-template-columns:1fr;gap:16px;}
.ind-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--rlg);box-shadow:var(--sh);overflow:hidden;}
.ind-kpis-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--g100);}
.ind-kpis-scroll .ind-kpis{border-bottom:none;}
.ind-card-head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px 14px;border-bottom:1px solid var(--g100);}
.ind-card-title{font-size:15px;font-weight:700;color:var(--g800);}
.ind-card-sub{font-size:12px;color:var(--g500);margin-top:2px;}
.ind-card-actions{display:flex;gap:4px;flex-shrink:0;}
/* KPIs numéricos */
.ind-kpis{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));min-width:550px;gap:0;border-bottom:1px solid var(--g100);}
.ind-kpi{padding:10px 10px;text-align:center;border-right:1px solid var(--g100);}
.ind-kpi:last-child{border-right:none;}
.ind-kpi-label{font-size:9.5px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ind-kpi-value{font-size:16px;font-weight:800;color:var(--g800);line-height:1;}
.ind-kpi-unit{font-size:10px;color:var(--g400);margin-top:2px;}
.ind-row-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:5px 12px 3px;color:var(--g500);border-bottom:1px solid var(--g100);}
/* Variações */
.ind-vars{display:flex;gap:0;border-bottom:1px solid var(--g100);}
.ind-var{flex:1;padding:8px 14px;text-align:center;border-right:1px solid var(--g100);}
.ind-var:last-child{border-right:none;}
.ind-var-label{font-size:10px;color:var(--g500);margin-bottom:3px;}
.ind-var-val{font-size:13px;font-weight:700;}
.ind-var-val.pos{color:var(--success);}
.ind-var-val.neg{color:var(--danger);}
.ind-var-val.neu{color:var(--g400);}
/* Wrapper da tabela mensal */
.ind-table-wrap{overflow-x:auto;padding:0 16px 10px;margin-top:10px;}
/* Chart area */
.ind-chart{padding:12px 16px 10px;}
.ind-chart-inner{width:80%;}
.ind-chart-title{font-size:11px;font-weight:600;color:var(--g500);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.ind-legend{display:flex;gap:14px;font-size:10px;color:var(--g500);}
.ind-legend span{display:flex;align-items:center;gap:4px;}
/* Expand toggle */
.ind-chart-toggle{text-align:center;padding:6px;border-top:1px solid var(--g100);cursor:pointer;font-size:11px;color:var(--g400);transition:background .15s;}
.ind-chart-toggle:hover{background:var(--g50);color:var(--primary);}
/* Mês/Ano seletor */
.ind-mes-table{width:100%;border-collapse:collapse;font-size:11px;}
.ind-mes-table th{background:var(--g50);padding:6px 10px;font-size:9px;font-weight:700;color:var(--g500);text-transform:uppercase;border-bottom:1px solid var(--g200);text-align:left;}
.ind-mes-table td{padding:6px 10px;border-bottom:1px solid var(--g100);vertical-align:middle;}
.ind-mes-table tr:last-child td{border-bottom:none;}
.ind-mes-table tr:hover td{background:var(--g50);}
/* Empty */
.ind-empty{text-align:center;padding:48px 24px;color:var(--g400);}
.ind-empty-icon{font-size:40px;margin-bottom:12px;}

/* ===== UTILS ===== */
.hidden{display:none!important;}
.c-success{color:var(--success);}.c-warning{color:var(--warning);}
.c-danger{color:var(--danger);}.c-muted{color:var(--g400);}
.fw7{font-weight:700;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px;}

/* ── Relatório AGM ───────────────────────────────────────────── */
.agmrel-card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:22px 24px;margin-bottom:28px;page-break-inside:avoid;}
.agmrel-card-title{font-size:16px;font-weight:800;color:var(--g900);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.agmrel-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:14px 0;}
.agmrel-kpi{background:var(--g50);border-radius:8px;padding:10px 14px;text-align:center;}
.agmrel-kpi-lbl{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.agmrel-kpi-val{font-size:17px;font-weight:800;color:var(--g800);}
.agmrel-sec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:stretch;margin:0 auto;}
.agmrel-sec{border-radius:8px;margin-bottom:10px;overflow:hidden;}
.agmrel-sec-head{padding:9px 14px;font-size:12px;font-weight:800;letter-spacing:.3px;}
.agmrel-sec-body{padding:10px 14px;}
.agmrel-sec-item{font-size:13px;color:var(--g800);line-height:1.6;padding:7px 10px;background:#fff;border-radius:6px;margin-bottom:5px;white-space:pre-wrap;border-left:3px solid transparent;}
.agm-item-dragging{opacity:.4;}
.agm-item-drop-over{outline:2px dashed var(--primary);outline-offset:2px;background:#fff0eb!important;border-radius:8px;}

async function apiFetch(table, query='') {
  const res = await withTokenRefresh(()=>fetch(`${REST}/${table}?${query}`, { headers:H }));
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbCreate(table, data) {
  const res = await withTokenRefresh(()=>fetch(`${REST}/${table}`, {
    method:'POST', headers:{...H,'Prefer':'return=representation'}, body:JSON.stringify(data)
  }));
  if (!res.ok) throw new Error(await res.text());
  const arr = await res.json();
  return Array.isArray(arr) ? arr[0] : arr;
}
async function sbUpdate(table, id, data) {
  const res = await withTokenRefresh(()=>fetch(`${REST}/${table}?id=eq.${id}`, {
    method:'PATCH', headers:{...H,'Prefer':'return=minimal'}, body:JSON.stringify(data)
  }));
  if (!res.ok) throw new Error(await res.text());
}
async function sbDelete(table, id) {
  const res = await withTokenRefresh(()=>fetch(`${REST}/${table}?id=eq.${id}`, { method:'DELETE', headers:H }));
  if (!res.ok) throw new Error(await res.text());
}

// Upload anexo to Supabase Storage and save record
const STORAGE = 'https://ikmjoddgmshybdxyfttg.supabase.co/storage/v1';
const BUCKET  = 'tarefa-anexos';
async function uploadAnexo(tid, file) {
  // Sanitize filename preserving extension
  const ext  = file.name.includes('.') ? '.'+file.name.split('.').pop() : '';
  const base = file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9._-]/g,'_');
  const path = `${tid}/${Date.now()}_${base}${ext}`;
  const mime = file.type || 'application/octet-stream';
  const upRes = await fetch(`${STORAGE}/object/${BUCKET}/${path}`, {
    method:'POST',
    headers:{ 'Authorization':H['Authorization'], 'Content-Type':mime, 'x-upsert':'true' },
    body: file
  });
  if (!upRes.ok) {
    let errMsg = `HTTP ${upRes.status}`;
    try { const j=await upRes.json(); errMsg = j.message||j.error||JSON.stringify(j); } catch(_){}
    if (upRes.status===404) errMsg = `Bucket "${BUCKET}" não encontrado. Crie-o no Supabase Dashboard → Storage.`;
    if (upRes.status===403||upRes.status===401) errMsg = `Sem permissão para upload. Configure a policy do bucket "${BUCKET}" no Supabase.`;
    throw new Error(errMsg);
  }
  const url = `${STORAGE}/object/public/${BUCKET}/${path}`;
  const metaRes = await fetch(`${REST}/tarefa_anexos`, {
    method:'POST', headers:{...H,'Prefer':'return=minimal'},
    body:JSON.stringify({ tarefa_id:+tid, nome:file.name, url, tamanho:file.size, tipo:mime })
  });
  if (!metaRes.ok) throw new Error('Arquivo enviado mas erro ao salvar metadados: '+(await metaRes.text()));
}
async function deleteAnexo(anexoId, url) {
  const path = url.replace(`${STORAGE}/object/public/tarefa-anexos/`,'');
  await fetch(`${STORAGE}/object/tarefa-anexos/${path}`, { method:'DELETE', headers:{ 'Authorization':H['Authorization'] }});
  await fetch(`${REST}/tarefa_anexos?id=eq.${anexoId}`, { method:'DELETE', headers:H });

/* ── Token refresh ─────────────────────────────────────────── */
let _refreshPromise = null; // evita múltiplos refreshes simultâneos
let _refreshTimer   = null;

async function authRefreshToken(refreshToken) {
  const res = await fetch(`${AUTH}/token?grant_type=refresh_token`, {
    method:'POST', headers:{'apikey':KEY,'Content-Type':'application/json'},
    body:JSON.stringify({ refresh_token: refreshToken })
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error_description||d.msg||'Erro ao renovar sessão');
  return d;
}

async function refreshSession() {
  const sess = loadSession();
  if (!sess?.refresh_token) throw new Error('Sem refresh token salvo.');
  const newSess = await authRefreshToken(sess.refresh_token);
  saveSession({ access_token:newSess.access_token, refresh_token:newSess.refresh_token,
                user_id:sess.user_id, email:sess.email });
  setAuthToken(newSess.access_token);
  scheduleTokenRefresh(); // reagenda o próximo refresh preventivo
}

// Agenda renovação preventiva 5 min antes de expirar (token Supabase = 1h por padrão)
function scheduleTokenRefresh(delayMs = 55 * 60 * 1000) {
  if (_refreshTimer) clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(async () => {
    try { await refreshSession(); } catch(e) { /* será capturado na próxima chamada */ }
  }, delayMs);
}

// Intercepta erro de JWT expirado, renova e retenta a chamada original
async function withTokenRefresh(fn) {
  let res = await fn();
  if (res.status === 401 || res.status === 403) {
    const txt = await res.clone().text();
    if (txt.includes('JWT expired') || txt.includes('PGRST303') || txt.includes('invalid_token')) {
      if (!_refreshPromise) _refreshPromise = refreshSession().finally(()=>{ _refreshPromise=null; });
      try { await _refreshPromise; }
      catch(e) {
        clearSession(); setAuthToken(null);
        toast('Sessão expirada. Faça login novamente.','err');
        setTimeout(()=>{ currentUser=null; currentProfile=null; renderLogin(); }, 1500);
        throw new Error('Sessão expirada.');
      }
      res = await fn(); // retenta com novo token
    }
  }
  return res;
}

// Carrega as permissões do usuário logado (chamado após loadAll)
async function loadMyPermissions() {
  myPermissions = null;
  if (!currentUser || currentProfile?.is_admin) return; // admin: sem restrições
  try {
    const rows = await apiFetch('user_permissions', `select=*&user_id=eq.${currentUser.id}`);

    // Sem linhas ou sem sentinela 'restricted' → usuário não configurado → acesso total
    const isRestricted = rows.some(r => r.resource_type === 'restricted');
    if (!isRestricted) return;

    const projRows = rows.filter(r => r.resource_type === 'projeto');
    const indRows  = rows.filter(r => r.resource_type === 'indicador');
    const cadRow   = rows.find(r  => r.resource_type === 'cadastros');
    const relRow   = rows.find(r  => r.resource_type === 'agmrelatorio');
    const mapaRow  = rows.find(r  => r.resource_type === 'mapaestrategico');

    // Mapa de abas por projeto: pid → Set<'tarefas'|'lista'|'cronograma'|'custos'>
    const TAB_MAP = { proj_kanban:'tarefas', proj_lista:'lista', proj_cronograma:'cronograma', proj_custos:'custos' };
    const tabRows = rows.filter(r => r.resource_type in TAB_MAP);
    const projetoTabs = new Map();
    tabRows.forEach(r => {
      const tab = TAB_MAP[r.resource_type];
      if (!projetoTabs.has(r.resource_id)) projetoTabs.set(r.resource_id, new Set());
      projetoTabs.get(r.resource_id).add(tab);
    });

    // Sempre usa Set (jamais null) quando o usuário está configurado:
    // Set vazio = sem acesso a nenhum item do tipo; Set preenchido = acesso apenas aos ids contidos
    myPermissions = {
      projetos:      new Set(projRows.map(r => r.resource_id)),
      projetoTabs:   tabRows.length ? projetoTabs : null,
      indicadores:   new Set(indRows.map(r  => r.resource_id)),
      cadastros:        !!cadRow,
      agmrelatorio:     !!relRow,
      mapaestrategico:  !!mapaRow,
    };
  } catch(e) {
    console.warn('Erro ao carregar permissões:', e.message);
  }
}

// Verifica acesso: type = 'projeto' | 'indicador' | 'cadastros'
// id = null → verifica se tem acesso a pelo menos um item do tipo (usado para mostrar/ocultar nav)
function canSee(type, id = null) {
  if (!myPermissions) return true; // sem restrições
  if (type === 'cadastros')       return myPermissions.cadastros;
  if (type === 'agmrelatorio')    return myPermissions.agmrelatorio;
  if (type === 'mapaestrategico') return myPermissions.mapaestrategico;
  const set = type === 'projeto' ? myPermissions.projetos : myPermissions.indicadores;
  if (set == null) return true; // tipo não configurado (nunca deve ocorrer após fix) → acesso total
  if (id === null) return set.size > 0; // sem id: basta ter ao menos um
  return set.has(id);
}

// Verifica acesso a uma aba específica de um projeto
// tab = 'tarefas' | 'lista' | 'cronograma' | 'custos'
function canSeeTab(pid, tab) {
  if (!myPermissions) return true;
  if (!canSee('projeto', pid)) return false;
  if (!myPermissions.projetoTabs) return true; // sem restrição de abas
  const tabs = myPermissions.projetoTabs.get(pid);
  if (!tabs) return true; // projeto sem restrição de abas
  return tabs.has(tab);
}

  const btn      = document.getElementById('sidebarToggleBtn');
  const icon     = document.getElementById('sidebarToggleIcon');

    sidebar.classList.remove('collapsed');           // garante que 'collapsed' não interfere
    const isOpen = sidebar.classList.toggle('open');
    document.getElementById('mobOverlay').classList.toggle('show', isOpen);

    if (toggleBtn) toggleBtn.style.setProperty('--mob-icon', isOpen ? '"✕"' : '"☰"');

    main.classList.toggle('sb-collapsed', collapsed);
    if (btn) btn.title = collapsed ? 'Expandir menu' : 'Recolher menu';
    if (icon) {

function setAuthMsg(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className   = `auth-msg ${type} show`;
}

/* ================================================================
   AUTH ACTIONS
   ================================================================ */
async function doLogin() {
  const email = g('li_email').trim();
  const pass  = g('li_pass');
  if (!email||!pass) { setAuthMsg('liErr','Preencha e-mail e senha.','err'); return; }
  const btn = document.getElementById('btnLogin');
  btn.disabled=true; btn.textContent='Entrando...';
  try {
    const sess    = await authLogin(email, pass);
    setAuthToken(sess.access_token);
    const profile = await getProfile(sess.user.id);
    if (!profile) throw new Error('Perfil não encontrado. Contacte o administrador.');
    saveSession({ access_token:sess.access_token, refresh_token:sess.refresh_token, user_id:sess.user.id, email:sess.user.email });
    currentUser    = sess.user;
    currentProfile = profile;
    if (!profile.aprovado) { renderPending(); return; }
    if (profile.ativo === false) { setAuthMsg('liErr','Sua conta foi inativada. Entre em contato com o administrador.','err'); btn.disabled=false; btn.textContent='Entrar'; return; }
    hideAuthScreen();
    updateSidebarUser();
    showLoading(true,'Carregando dados...');
    await loadAll();
    await loadMyPermissions();
    applyNavPermissions();
    scheduleTokenRefresh();
    showLoading(false);
    render();
  } catch(e) {
    setAuthMsg('liErr', e.message, 'err');
    btn.disabled=false; btn.textContent='Entrar';
  }
}

async function doRegister() {
  const nome  = g('reg_nome').trim();
  const email = g('reg_email').trim();
  const pass  = g('reg_pass');
  const pass2 = g('reg_pass2');
  if (!nome||!email||!pass)   { setAuthMsg('regErr','Preencha todos os campos.','err'); return; }
  if (pass.length<6)           { setAuthMsg('regErr','Senha com mínimo 6 caracteres.','err'); return; }
  if (pass!==pass2)            { setAuthMsg('regErr','As senhas não coincidem.','err'); return; }
  const btn = document.getElementById('btnReg');
  btn.disabled=true; btn.textContent='Criando...';
  try {
    await authSignup(nome, email, pass);
    document.getElementById('regErr').classList.remove('show');
    setAuthMsg('regOk','✅ Conta criada! Confirme seu e-mail e aguarde aprovação do administrador.','ok');
    btn.disabled=false; btn.textContent='Criar Conta';
  } catch(e) {
    setAuthMsg('regErr', e.message, 'err');
    btn.disabled=false; btn.textContent='Criar Conta';
  }
}

async function doForgot() {
  const email = g('fg_email').trim();
  if (!email) { setAuthMsg('fgErr','Informe seu e-mail.','err'); return; }
  const btn = document.getElementById('btnFg');
  btn.disabled=true; btn.textContent='Enviando...';
  try {
    await authRecover(email);
    document.getElementById('fgErr').classList.remove('show');
    setAuthMsg('fgOk','✅ Link enviado! Verifique sua caixa de entrada (e spam).','ok');
    btn.disabled=false; btn.textContent='Enviar link de recuperação';
  } catch(e) {
    setAuthMsg('fgErr', e.message,'err');
    btn.disabled=false; btn.textContent='Enviar link de recuperação';
  }
}

async function logout() {
  const sess = loadSession();
  if (sess?.access_token) await authLogoutAPI(sess.access_token);
  clearSession();
  setAuthToken(null);
  if (_refreshTimer) { clearTimeout(_refreshTimer); _refreshTimer=null; }
  currentUser=null; currentProfile=null;
  document.getElementById('sbUser').style.display='none';
  document.getElementById('pendingScreen').style.display='none';
  renderLogin();
}

function renderDashboard() {
  document.getElementById('pageTitle').textContent = 'Dashboard';
  document.getElementById('pageSub').textContent   = 'Visão geral dos projetos';
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-primary" onclick="openProjectModal()">＋ Novo Projeto</button>`;

  const projs      = db.projetos.filter(p => canSee('projeto', p.id));
  const nAtivos    = projs.filter(p=>p.status==='Ativo').length;
  const nFim       = projs.filter(p=>p.status==='Concluído').length;
  const nLate      = projs.filter(p=>isLate(p)).length;
  // tarefas sem prazo final (excluindo concluídas)
  // minhas tarefas — responsável vinculado ao usuário logado
  const meuResponsavel = db.responsaveis.find(r=>r.userId === currentUser?.id);
  const tarefasSemData = db.tarefas.filter(t=>t.status!=='Concluído' && !t.dataFim);
  const tarefasSemDataVisiveis = currentProfile?.is_admin
    ? tarefasSemData
    : tarefasSemData.filter(t => meuResponsavel &&
        (t.responsavelId===meuResponsavel.id || taskResponsaveis(t.id).some(r=>r.id===meuResponsavel.id)));
  const nSemData = tarefasSemDataVisiveis.length;
  const nMinhas = meuResponsavel
    ? db.tarefas.filter(t=>t.status!=='Concluído' &&
        (t.responsavelId===meuResponsavel.id || taskResponsaveis(t.id).some(r=>r.id===meuResponsavel.id))
      ).length
    : 0;

  // apply filters
  let filtered = projs;
  if (dashFilter==='ativo')          filtered = projs.filter(p=>p.status==='Ativo');
  else if (dashFilter==='concluido') filtered = projs.filter(p=>p.status==='Concluído');
  else if (dashFilter==='atrasado')  filtered = projs.filter(p=>isLate(p));
  if (dashRespFiltro) filtered = filtered.filter(p => String(p.responsavelId) === String(dashRespFiltro));
  // favoritos no topo, depois por data de início (mais recente primeiro), sem data ao final
  filtered = [...filtered].sort((a,b)=>{
    const fa = favorites.has(a.id), fb = favorites.has(b.id);
    if (fa && !fb) return -1;
    if (!fa && fb) return 1;
    const da = a.dataInicio ? new Date(a.dataInicio) : null;
    const db_ = b.dataInicio ? new Date(b.dataInicio) : null;
    if (da && db_) return db_ - da;   // mais recente primeiro
    if (da && !db_) return -1;         // com data antes de sem data
    if (!da && db_) return 1;
    return 0;
  });
  // 'semdata' não filtra projetos — exibe painel próprio de tarefas

  // helper: dim card when another filter is active
  function cardCls(f, activeCls) {
    if (!dashFilter) return 'clickable';
    if (dashFilter===f) return `clickable ${activeCls}`;
    return 'clickable dimmed';
  }

  const filterLabels = {ativo:'Ativos',concluido:'Concluídos',atrasado:'Atrasados',semdata:'Sem Data',naoconcluidas:'Tarefas não concluídas'};

  let html = `
  <div class="stats-row" style="grid-template-columns:repeat(${currentProfile?.is_admin?7:6},1fr);">
    <div class="stat-card clickable ${!dashFilter?'':'dimmed'}" onclick="setDashFilter(null)" title="Ver todos os projetos">
      <div class="stat-icon">📁</div><div class="stat-label">Total</div><div class="stat-value">${projs.length}</div></div>
    <div class="stat-card ${cardCls('ativo','active-success')}" onclick="setDashFilter('ativo')" title="Filtrar por ativos">
      <div class="stat-icon">🟢</div><div class="stat-label">Ativos</div><div class="stat-value" style="color:var(--success)">${nAtivos}</div></div>
    <div class="stat-card ${cardCls('concluido','active-primary')}" onclick="setDashFilter('concluido')" title="Filtrar por concluídos">
      <div class="stat-icon">✅</div><div class="stat-label">Concluídos</div><div class="stat-value" style="color:var(--primary)">${nFim}</div></div>
    <div class="stat-card ${cardCls('atrasado','active-danger')}" onclick="setDashFilter('atrasado')" title="Filtrar por atrasados">
      <div class="stat-icon">⚠️</div><div class="stat-label">Atrasados</div><div class="stat-value" style="color:var(--danger)">${nLate}</div></div>
    <div class="stat-card ${cardCls('semdata','active-warning')}" onclick="setDashFilter('semdata')" title="Tarefas sem prazo definido">
      <div class="stat-icon">📅</div><div class="stat-label">Tarefas s/ Data</div><div class="stat-value" style="color:var(--warning)">${nSemData}</div></div>
    ${currentProfile?.is_admin ? `
    <div class="stat-card ${cardCls('naoconcluidas','active-danger')}" onclick="setDashFilter('naoconcluidas')" title="Todas as tarefas não concluídas">
      <div class="stat-icon">🗂️</div><div class="stat-label">Tarefas não concluídas</div><div class="stat-value" style="color:var(--danger)">${db.tarefas.filter(t=>t.status!=='Concluído').length}</div></div>
    ` : ''}
    <div class="stat-card ${cardCls('minhastarefas','active-primary')}" onclick="setDashFilter('minhastarefas')" title="Minhas tarefas em aberto">
      <div class="stat-icon">🙋</div><div class="stat-label">Minhas Tarefas</div><div class="stat-value" style="color:var(--primary)">${nMinhas}</div></div>
  </div>
  <div class="section-header">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span class="section-title">${filtered.length} Projeto${filtered.length!==1?'s':''}</span>
      ${dashFilter ? `<button class="filter-badge" onclick="setDashFilter(null)">✕ ${filterLabels[dashFilter]}</button>` : ''}
      ${dashRespFiltro ? `<button class="filter-badge" onclick="setDashResp('')">✕ ${esc(db.responsaveis.find(r=>r.id==dashRespFiltro)?.nome||'Responsável')}</button>` : ''}
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      ${(()=>{
        const respIds = [...new Set(projs.map(p=>p.responsavelId).filter(Boolean))];
        if (!respIds.length) return '';
        const opts = respIds
          .map(rid => db.responsaveis.find(r=>r.id===rid)).filter(Boolean)
          .sort((a,b)=>a.nome.localeCompare(b.nome))
          .map(r=>`<option value="${r.id}" ${dashRespFiltro==r.id?'selected':''}>${esc(r.nome)}</option>`).join('');
        return `<div style="display:flex;align-items:center;gap:6px;">
          <label style="font-size:12px;color:var(--g600);font-weight:600;white-space:nowrap;">Responsável:</label>
          <select class="fc" style="height:32px;min-width:150px;font-size:12px;" onchange="setDashResp(this.value)">
            <option value="">Todos</option>
            ${opts}
          </select>
        </div>`;
      })()}
      ${projs.length ? `<div class="view-toggle">
        <button class="view-btn ${dashView==='cards'?'active':''}" onclick="setDashView('cards')" title="Visualização em cards">⊞</button>
        <button class="view-btn ${dashView==='table'?'active':''}" onclick="setDashView('table')" title="Visualização em tabela">☰</button>
      </div>` : ''}
    </div>
  </div>`;

  if (dashFilter === 'minhastarefas') {
    html += buildMinhasTarefasPanel();
  } else if (dashFilter === 'naoconcluidas') {
    html += buildNaoConcluidasPanel();
  } else if (dashFilter === 'semdata') {
    html += buildSemDataPanel();
  } else if (!projs.length) {
    html+=`<div class="empty"><div class="empty-icon">📋</div><p>Nenhum projeto cadastrado ainda.</p>
      <button class="btn btn-primary" onclick="openProjectModal()">＋ Novo Projeto</button></div>`;
  } else if (!filtered.length) {
    html+=`<div class="empty"><div class="empty-icon">🔍</div><p>Nenhum projeto encontrado para este filtro.</p>
      <button class="btn btn-secondary" onclick="setDashFilter(null)">Limpar filtro</button></div>`;
  } else if (dashView === 'table') {
    html += buildProjectsTable(filtered);
  } else {
    html+=`<div class="projects-grid">`;
    filtered.forEach(p=>{
      const resp=byId('responsaveis',p.responsavelId);
      const emp=p.empresaId?db.empresas.find(e=>e.id===p.empresaId):null;
      const pct=projectProgress(p.id);
      const late=isLate(p);
      html+=`
      <div class="proj-card" style="${favorites.has(p.id)?'border-color:var(--warning);box-shadow:0 0 0 1px var(--warning);':''}">
        <div class="proj-card-head">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
            <span style="font-size:22px;flex-shrink:0;">${p.icone||'📁'}</span>
            <div style="min-width:0;">
              <div class="proj-card-name">${esc(p.nome)}</div>
              ${emp?`<div style="font-size:11px;color:var(--g400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">🏢 ${esc(emp.nome)}</div>`:''}
            </div>
          </div>
        </div>
        <div class="proj-badges">
          ${statusBadge(p.status)}
          ${p.status!=='Concluído'?(late?'<span class="badge b-danger">⚠️ Atrasado</span>':'<span class="badge b-success">✓ No prazo</span>'):''}
        </div>
        <div class="proj-card-meta">
          <div class="avatar" style="background:${avatarColor(p.responsavelId)}">${initials(resp?.nome)}</div>
          <span>${resp?.nome||'Sem responsável'}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-top"><span>Progresso</span><span class="fw7">${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${progressColor(pct)}"></div></div>
        </div>
        <div class="proj-dates">📅 ${fmtDate(p.dataInicio)} → ${fmtDate(p.dataFim)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
          <button class="icon-btn" onclick="event.stopPropagation();toggleFavorite(${p.id})"
            title="${favorites.has(p.id)?'Remover dos favoritos':'Marcar como favorito'}"
            style="font-size:16px;color:${favorites.has(p.id)?'#F59E0B':'var(--g300)'};transition:color .15s;">
            ${favorites.has(p.id)?'★':'☆'}
          </button>
          <button class="icon-btn" onclick="event.stopPropagation();openProjectModal(${p.id})" title="Editar">✏️</button>
          <button class="icon-btn del" onclick="event.stopPropagation();confirmDelete('projetos',${p.id},'${esc(p.nome)}')" title="Excluir">🗑️</button>
          <button class="btn btn-secondary btn-sm" style="flex:1;justify-content:center;"
            onclick="navigateTo('project',${p.id})">Ver Projeto →</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function setDashView(v)   { dashView = v; renderDashboard(); }

function buildMinhasTarefasPanel() {
  const meuResp = db.responsaveis.find(r => r.userId === currentUser?.id);
  if (!meuResp) return `
    <div class="empty">
      <div class="empty-icon">🔗</div>
      <p style="max-width:380px;text-align:center;">
        Nenhum responsável vinculado ao seu usuário.<br>
        Peça a um administrador para associar seu usuário a um responsável em <strong>Configurações → Responsáveis</strong>.
      </p>
      <button class="btn btn-secondary" onclick="setDashFilter(null)">← Voltar</button>
    </div>`;

  const allTarefas = db.tarefas.filter(t =>
    t.status !== 'Concluído' &&
    (
      t.responsavelId === meuResp.id ||
      taskResponsaveis(t.id).some(r => r.id === meuResp.id)
    )
  );

  if (!allTarefas.length) return `
    <div class="empty"><div class="empty-icon">🎉</div>
      <p>Você não tem tarefas em aberto no momento!</p>
      <button class="btn btn-secondary" onclick="setDashFilter(null)">← Voltar</button>
    </div>`;

  // Ordena: atrasadas primeiro, depois por data de fim
  const sorted = [...allTarefas].sort((a,b) => {
    const la = isLateTask(a), lb = isLateTask(b);
    if (la && !lb) return -1; if (!la && lb) return 1;
    if (a.dataFim && b.dataFim) return a.dataFim.localeCompare(b.dataFim);
    if (a.dataFim && !b.dataFim) return -1;
    if (!a.dataFim && b.dataFim) return 1;
    return a.nome.localeCompare(b.nome);
  });

  let rows = '';
  sorted.forEach(t => {
    const proj = byId('projetos', t.projetoId);
    const tgs  = taskTags(t.id);
    const late = isLateTask(t);
    rows += `<tr>
      <td><span class="td-name" onclick="navigateTo('project',${t.projetoId})">${proj ? esc(proj.nome) : '—'}</span></td>
      <td style="font-weight:600;color:var(--g800);">${esc(t.nome)}
        ${t.descricao ? `<div style="font-size:11px;color:var(--g400);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${esc(t.descricao)}</div>` : ''}
      </td>
      <td>${statusBadge(t.status)}</td>
      <td style="font-size:12px;white-space:nowrap;">
        ${t.dataFim
          ? `<span style="color:${late?'var(--danger)':'var(--g500)'};font-weight:${late?700:400};">${late?'⚠️ ':''} ${fmtDate(t.dataFim)}</span>`
          : `<span class="badge b-warning" style="font-size:10px;">Sem prazo</span>`}
      </td>
      <td style="white-space:nowrap;">
        ${tgs.length ? `<div style="display:flex;flex-wrap:wrap;gap:3px;">${tgs.map(tg=>`<span class="tag-badge" style="background:${tg.cor}">${tg.nome}</span>`).join('')}</div>` : '<span style="color:var(--g400);font-size:12px;">—</span>'}
      </td>
      <td style="text-align:right;white-space:nowrap;">
        <button class="icon-btn" onclick="navigateTo('project',${t.projetoId})" title="Abrir projeto">🔍</button>
        <button class="icon-btn" onclick="openTaskModal(${t.projetoId},${t.id})" title="Editar">✏️</button>
      </td>
    </tr>`;
  });

  return `
  <div class="proj-table-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--g100);flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar" style="width:36px;height:36px;font-size:14px;background:${avatarColor(meuResp.id)};">${initials(meuResp.nome)}</div>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--g800);">
            ${allTarefas.length} tarefa${allTarefas.length!==1?'s':''} em aberto — ${esc(meuResp.nome)}
          </div>
          <div style="font-size:12px;color:var(--g400);margin-top:2px;">Tarefas não concluídas atribuídas a você</div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="setDashFilter(null)">← Voltar</button>
    </div>
    <table class="proj-table">
      <thead><tr>
        <th>Projeto</th>
        <th>Tarefa</th>
        <th>Status</th>
        <th>Prazo</th>
        <th>Tags</th>
        <th style="text-align:right;">Ações</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function buildSemDataPanel() {
  const meuResp = db.responsaveis.find(r=>r.userId === currentUser?.id);
  const todasSemData = db.tarefas.filter(t=>t.status!=='Concluído' && !t.dataFim);
  const allTarefas = currentProfile?.is_admin
    ? todasSemData
    : todasSemData.filter(t => meuResp &&
        (t.responsavelId===meuResp.id || taskResponsaveis(t.id).some(r=>r.id===meuResp.id)));

          ${th('Status','status', statusFilter)}
          ${th('Responsável','responsavel',`<select class="tg-filter-select ${ncFilters.responsavelId?'active':''}" onchange="ncSetFilter('responsavelId',this.value)">
            <option value="">Todos</option>${respOpts}</select>`)}
          ${th('Início','inicio')}
          ${th('Data Final Prevista','datafim')}
          ${th('Tags','tags',tagOpts?`<select class="tg-filter-select ${ncFilters.tag?'active':''}" onchange="ncSetFilter('tag',this.value)">
            <option value="">Todas</option>${tagOpts}</select>`:'')}
          <th><div class="tg-th-inner"><div class="tg-th-label" style="cursor:default;text-align:right">Ações</div></div></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>

}

  if (f !== 'naoconcluidas'){ ncFilters={projetoId:'',status:[],responsavelId:'',tag:'',nome:''}; ncStatusOpen=false; }

}
function setDashResp(val) { dashRespFiltro = val; renderDashboard(); }
function sdSetFilter(key, val) { sdFilters[key]=val; renderDashboard(); }
function sdSetSort(col) { sdSortDir = sdSortCol===col && sdSortDir==='asc' ? 'desc' : 'asc'; sdSortCol=col; renderDashboard(); }
function sdClearFilters() { sdFilters={projetoId:'',status:[],responsavelId:'',tag:'',nome:''}; sdStatusOpen=false; renderDashboard(); }
function sdToggleStatus(val) {

}
function ncSetFilter(key, val) { ncFilters[key]=val; renderDashboard(); }

function ncSetSort(col) { ncSortDir = ncSortCol===col && ncSortDir==='asc' ? 'desc' : 'asc'; ncSortCol=col; renderDashboard(); }
function ncClearFilters() { ncFilters={projetoId:'',status:[],responsavelId:'',tag:'',nome:''}; ncStatusOpen=false; renderDashboard(); }
function ncToggleStatus(val) {
  const idx=ncFilters.status.indexOf(val);
  if (idx>=0) ncFilters.status.splice(idx,1); else ncFilters.status.push(val);

function toggleFavorite(pid) {
  if (favorites.has(pid)) favorites.delete(pid);
  else favorites.add(pid);
  localStorage.setItem('pf_favorites', JSON.stringify([...favorites]));
  renderDashboard();
}

function setSortCol(col) {
  if (sortCol === col) sortDir = sortDir==='asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  renderDashboard();
}
function setProjFilter(key, val) {
  projFilters[key] = val;
  renderDashboard();
}
function projClearFilters() {
  projFilters = { nome:'', status:'', empresa:'', responsavel:'', situacao:'' };
  renderDashboard();
}

function buildProjectsTable(projs) {
  // ── Aplicar filtros ──────────────────────────────────────────
  let filtered = projs;
  if (projFilters.nome)       filtered = filtered.filter(p => p.nome.toLowerCase().includes(projFilters.nome.toLowerCase()));
  if (projFilters.status)     filtered = filtered.filter(p => p.status === projFilters.status);
  if (projFilters.empresa)    filtered = filtered.filter(p => String(p.empresaId||'') === projFilters.empresa);
  if (projFilters.responsavel)filtered = filtered.filter(p => String(p.responsavelId||'') === projFilters.responsavel);
  if (projFilters.situacao) {
    filtered = filtered.filter(p => {
      const late = isLate(p);
      if (projFilters.situacao === 'encerrado') return p.status === 'Concluído';
      if (projFilters.situacao === 'atrasado')  return p.status !== 'Concluído' && late;
      if (projFilters.situacao === 'no_prazo')  return p.status !== 'Concluído' && !late;
      return true;
    });
  }

  // ── Ordenação ────────────────────────────────────────────────
  const sorted = [...filtered].sort((a, b) => {
    // Favoritos sempre primeiro, independente do critério de ordenação
    const fa = favorites.has(a.id), fb = favorites.has(b.id);
    if (fa && !fb) return -1;
    if (!fa && fb) return  1;

    let va, vb;
    switch (sortCol) {
      case 'nome':        va=a.nome.toLowerCase();           vb=b.nome.toLowerCase(); break;
      case 'status':      va=a.status;                       vb=b.status; break;
      case 'empresa':     va=(db.empresas.find(e=>e.id===a.empresaId)?.nome||'').toLowerCase();
                          vb=(db.empresas.find(e=>e.id===b.empresaId)?.nome||'').toLowerCase(); break;
      case 'responsavel': va=(byId('responsaveis',a.responsavelId)?.nome||'').toLowerCase();
                          vb=(byId('responsaveis',b.responsavelId)?.nome||'').toLowerCase(); break;
      case 'progresso':   va=projectProgress(a.id);          vb=projectProgress(b.id); break;
      case 'dataInicio':  va=a.dataInicio||'';               vb=b.dataInicio||''; break;
      case 'dataFim':     va=a.dataFim||'';                  vb=b.dataFim||''; break;
      case 'prazo':       va=isLate(a)?1:0;                  vb=isLate(b)?1:0; break;
      default:            va=a.nome.toLowerCase();           vb=b.nome.toLowerCase();
    }
    if (va < vb) return sortDir==='asc' ? -1 : 1;
    if (va > vb) return sortDir==='asc' ?  1 : -1;
    return 0;
  });

  // Opções para selects
  const statusOpts = ['Em Elaboração','Ativo','Concluído','Cancelado','Suspenso']
    .map(s=>`<option value="${s}" ${projFilters.status===s?'selected':''}>${s}</option>`).join('');
  const empresaOpts = db.empresas
    .map(e=>`<option value="${e.id}" ${projFilters.empresa==e.id?'selected':''}>${esc(e.nome)}</option>`).join('');
  const respOpts = db.responsaveis.slice().sort((a,b)=>a.nome.localeCompare(b.nome))
    .map(r=>`<option value="${r.id}" ${projFilters.responsavel==r.id?'selected':''}>${esc(r.nome)}</option>`).join('');

  function th(label, col, filterHtml='') {
    const cls = sortCol===col ? (sortDir==='asc'?'sort-asc':'sort-desc') : '';
    return `<th class="sortable">
      <div class="proj-th-inner">
        <div class="proj-th-label ${cls}" onclick="setSortCol('${col}')">${label}</div>
        ${filterHtml ? `<div class="proj-th-filter">${filterHtml}</div>` : '<div style="height:8px;"></div>'}
      </div>
    </th>`;
  }
  function thPlain(label) {
    return `<th class="no-filter">${label}</th>`;
  }

  const hasFilters = Object.values(projFilters).some(v=>!!v);
  const totalAll = projs.length;

  let rows = '';
  sorted.forEach(p => {
    const resp = byId('responsaveis', p.responsavelId);
    const emp  = p.empresaId ? db.empresas.find(e=>e.id===p.empresaId) : null;
    const pct  = projectProgress(p.id);
    const late = isLate(p);
    rows += `
    <tr>
      <td style="text-align:center;padding:0 4px;">
        <button class="icon-btn" onclick="toggleFavorite(${p.id})"
          title="${favorites.has(p.id)?'Remover dos favoritos':'Marcar como favorito'}"
          style="font-size:18px;color:${favorites.has(p.id)?'#F59E0B':'var(--g300)'};">
          ${favorites.has(p.id)?'★':'☆'}
        </button>
      </td>
      <td><span style="display:inline-flex;align-items:center;gap:7px;"><span style="font-size:18px;">${p.icone||'📁'}</span><span class="td-name" onclick="navigateTo('project',${p.id})">${esc(p.nome)}</span></span></td>
      <td>${statusBadge(p.status)}</td>
      <td>${emp?`<span style="font-size:12px;background:var(--primary-lt);color:var(--primary-dk);padding:2px 8px;border-radius:10px;">${esc(emp.nome)}</span>`:'<span style="color:var(--g400)">—</span>'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="avatar" style="background:${avatarColor(p.responsavelId)};width:24px;height:24px;font-size:9px;">${initials(resp?.nome)}</div>
          <span>${resp?.nome||'—'}</span>
        </div>
      </td>
      <td class="td-progress">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-bar" style="flex:1;height:6px;"><div class="progress-fill" style="width:${pct}%;background:${progressColor(pct)}"></div></div>
          <span style="font-size:12px;font-weight:700;color:var(--g600);min-width:30px;">${pct}%</span>
        </div>
      </td>
      <td style="text-align:center;white-space:nowrap;">${(()=>{
        const tarefas = db.tarefas.filter(t => t.projetoId === p.id);
        const total   = tarefas.length;
        const abertas = tarefas.filter(t => t.status !== 'Concluído').length;
        if (!total) return '<span style="color:var(--g300)">—</span>';
        const col = abertas === 0 ? 'var(--success)' : abertas === total ? 'var(--danger)' : 'var(--warning)';
        return `<span style="font-size:12px;font-weight:700;color:${col};">${abertas}</span><span style="font-size:11px;color:var(--g400);">/${total}</span>`;
      })()}</td>
      <td style="color:var(--g500)">${fmtDate(p.dataInicio)||'—'}</td>
      <td style="color:${late?'var(--danger)':'var(--g500)'};font-weight:${late?700:400}">${fmtDate(p.dataFim)||'—'}</td>
      <td>${p.status!=='Concluído'?(late?'<span class="badge b-danger">⚠️ Atrasado</span>':'<span class="badge b-success">✓ No prazo</span>'):'<span class="badge b-primary">Encerrado</span>'}</td>
      <td class="td-actions">
        <button class="icon-btn" onclick="navigateTo('project',${p.id})" title="Abrir projeto">🔍</button>
        <button class="icon-btn" onclick="openProjectModal(${p.id})" title="Editar">✏️</button>
        <button class="icon-btn del" onclick="confirmDelete('projetos',${p.id},'${esc(p.nome)}')" title="Excluir">🗑️</button>
      </td>
    </tr>`;
  });

  return `
  <div class="proj-table-wrap">
    ${hasFilters ? `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--primary-lt);border-bottom:1px solid var(--primary);font-size:12px;">
      <span style="color:var(--primary);font-weight:600;">🔍 ${sorted.length} de ${totalAll} projeto${totalAll!==1?'s':''} encontrado${sorted.length!==1?'s':''}</span>
      <button onclick="projClearFilters()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--primary);font-weight:700;text-decoration:underline;">✕ Limpar filtros</button>
    </div>` : ''}
    <table class="proj-table">
      <thead><tr>
        <th class="no-filter" style="width:36px;text-align:center;">★</th>
        ${th('Projeto','nome',`<input class="tg-filter-input ${projFilters.nome?'active':''}" placeholder="Buscar..." oninput="setProjFilter('nome',this.value)" value="${esc(projFilters.nome||'')}">`)}
        ${th('Status','status',`<select class="tg-filter-select ${projFilters.status?'active':''}" onchange="setProjFilter('status',this.value)"><option value="">Todos</option>${statusOpts}</select>`)}
        ${th('Empresa','empresa',empresaOpts?`<select class="tg-filter-select ${projFilters.empresa?'active':''}" onchange="setProjFilter('empresa',this.value)"><option value="">Todas</option>${empresaOpts}</select>`:'<div style="height:4px;"></div>')}
        ${th('Responsável','responsavel',respOpts?`<select class="tg-filter-select ${projFilters.responsavel?'active':''}" onchange="setProjFilter('responsavel',this.value)"><option value="">Todos</option>${respOpts}</select>`:'<div style="height:4px;"></div>')}
        ${th('Progresso','progresso')}
        ${thPlain('Tarefas')}
        ${th('Início','dataInicio')}
        ${th('Prazo Final','dataFim')}
        ${th('Situação','prazo',`<select class="tg-filter-select ${projFilters.situacao?'active':''}" onchange="setProjFilter('situacao',this.value)">
          <option value="">Todas</option>
          <option value="no_prazo" ${projFilters.situacao==='no_prazo'?'selected':''}>✓ No prazo</option>
          <option value="atrasado" ${projFilters.situacao==='atrasado'?'selected':''}>⚠️ Atrasado</option>
          <option value="encerrado" ${projFilters.situacao==='encerrado'?'selected':''}>Encerrado</option>
        </select>`)}
        ${thPlain('Ações')}
      </tr></thead>
      <tbody>${sorted.length ? rows : `<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--g400);">Nenhum projeto encontrado para os filtros aplicados.<br><br><button class="btn btn-secondary" onclick="projClearFilters()">Limpar filtros</button></td></tr>`}</tbody>
    </table>
  </div>`;
}
