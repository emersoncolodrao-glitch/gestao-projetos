function startAgmEdit(id, tipo) {
  document.getElementById(`agm-view-${id}`).style.display = 'none';
  document.getElementById(`agm-edit-${id}`).style.display = 'block';
  document.getElementById(`agm-edit-ta-${id}`)?.focus();
}

function cancelAgmEdit(id) {
  document.getElementById(`agm-edit-${id}`).style.display = 'none';
  document.getElementById(`agm-view-${id}`).style.display = 'flex';
}

async function saveAgmEdit(id, tipo) {
  const ta = document.getElementById(`agm-edit-ta-${id}`);
  const conteudo = ta?.value.trim();
  if (!conteudo) { alert('O conteúdo não pode estar vazio.'); ta?.focus(); return; }
  const btn = ta.parentElement.querySelector('button:last-child');
  if (btn) { btn.disabled=true; btn.textContent='Salvando...'; }
  try {
    await sbUpdate('agm_registros', id, { conteudo });
    const reg = db.agmRegistros.find(r => r.id === id);
    if (reg) reg.conteudo = conteudo;
    _renderAgmModal();
    const isIndView = document.getElementById('nav-indicadores')?.classList.contains('active');
    if (isIndView) setTimeout(renderIndicadores, 50);
  } catch(e) {
    toast('Erro ao salvar: '+e.message, 'err');
    if (btn) { btn.disabled=false; btn.textContent='💾 Salvar'; }
  }
}

async function saveAgmItem(tipo) {
  const ta = document.getElementById(`agm-input-${tipo}`);
  const conteudo = ta?.value.trim();
  if (!conteudo) { alert('Digite o conteúdo antes de adicionar.'); ta?.focus(); return; }
  try {
    const existentes = db.agmRegistros.filter(r =>
      r.responsavelId === agmRespId && r.ano === agmAno && r.mes === agmMes && r.tipo === tipo);
    const maxOrdem = existentes.length > 0 ? Math.max(...existentes.map(r => r.ordem)) : 0;
    const novo = await sbCreate('agm_registros', {
      responsavel_id: agmRespId,
      ano: agmAno,
      mes: agmMes,
      tipo,
      conteudo,
      ordem: maxOrdem + 1,
    });
    db.agmRegistros.push(fromDB.agmRegistro(novo));
    ta.value = '';
    _renderAgmModal();
    // Refresca o botão AGM no painel de indicadores sem recarregar tudo
    const view = document.getElementById('nav-indicadores')?.classList.contains('active');
    if (view) setTimeout(renderIndicadores, 50);
  } catch(e) { toast('Erro ao salvar: '+e.message,'err'); }
}

/* ---- AGM drag-and-drop reorder ---- */
function onAgmDragStart(e, id) {
  agmDragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => {
    const el = document.getElementById(`agm-item-${id}`);
    if (el) el.classList.add('agm-item-dragging');
  }, 0);
}

function onAgmDragEnd(e, id) {
  agmDragSrcId = null;
  document.querySelectorAll('.agm-item-dragging').forEach(el => el.classList.remove('agm-item-dragging'));
  document.querySelectorAll('.agm-item-drop-over').forEach(el => el.classList.remove('agm-item-drop-over'));
}

function onAgmDragOver(e, id) {
  if (agmDragSrcId === null || agmDragSrcId === id) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.getElementById(`agm-item-${id}`);
  if (el) el.classList.add('agm-item-drop-over');
}

function onAgmDragLeave(e, id) {
  const el = document.getElementById(`agm-item-${id}`);
  if (el) el.classList.remove('agm-item-drop-over');
}

async function onAgmDrop(e, targetId, tipo) {
  e.preventDefault();
  if (agmDragSrcId === null || agmDragSrcId === targetId) return;

  // Build ordered list for this section
  const secItems = db.agmRegistros
    .filter(r => r.responsavelId === agmRespId && r.ano === agmAno && r.mes === agmMes && r.tipo === tipo)
    .sort((a, b) => a.ordem - b.ordem || a.id - b.id);

  const srcIdx    = secItems.findIndex(r => r.id === agmDragSrcId);
  const targetIdx = secItems.findIndex(r => r.id === targetId);
  if (srcIdx === -1 || targetIdx === -1) return;

  // Reorder in place
  const [moved] = secItems.splice(srcIdx, 1);
  secItems.splice(targetIdx, 0, moved);

  // Assign new ordem values (1-based)
  secItems.forEach((r, i) => { r.ordem = i + 1; });

  // Re-render immediately for responsiveness
  _renderAgmModal();

  // Persist in background
  try {
    await Promise.all(secItems.map(r => sbUpdate('agm_registros', r.id, { ordem: r.ordem })));
  } catch(e2) {
    toast('Erro ao salvar ordem: ' + e2.message, 'err');
  }
}

async function deleteAgmItem(id) {
  if (!confirm('Excluir este registro?')) return;
  try {
    await sbDelete('agm_registros', id);
    db.agmRegistros = db.agmRegistros.filter(r => r.id !== id);
    _renderAgmModal();
    const view = document.getElementById('nav-indicadores')?.classList.contains('active');
    if (view) setTimeout(renderIndicadores, 50);
  } catch(e) { toast('Erro ao excluir: '+e.message,'err'); }
}

function renderObjetivosGrid() {
  const grid = document.getElementById('objetivosGrid');
  if (!grid) return;
  const filtroNome = (document.getElementById('objFiltroNome')?.value || '').toLowerCase();
  const filtroEmp  = document.getElementById('objFiltroEmp')?.value || '';

  let lista = db.objetivosEstrategicos;
  if (filtroNome) lista = lista.filter(o => o.nome.toLowerCase().includes(filtroNome) || o.descricao.toLowerCase().includes(filtroNome));
  if (filtroEmp)  lista = lista.filter(o => String(o.empresaId||'') === filtroEmp);

  const count = document.getElementById('objFiltroCount');

async function loadAndRenderUsers() {
  const sec = document.getElementById('usersSection');
  if (!sec) return;
  try {
    const profiles = await loadAllProfiles();
    const pending  = profiles.filter(p=>!p.aprovado);
    const approved = profiles.filter(p=>p.aprovado);

    let html='<table><thead><tr><th>Nome</th><th>E-mail</th><th>Empresa</th><th>Status</th><th>Perfil</th><th style="text-align:center">Ações</th></tr></thead><tbody>';

    if (!profiles.length) {
      html+='<tr><td colspan="6" style="text-align:center;padding:22px;color:var(--g400)">Nenhum usuário cadastrado.</td></tr>';
    }

    // Pending first
    profiles.sort((a,b)=>a.aprovado-b.aprovado||new Date(a.created_at)-new Date(b.created_at)).forEach(p=>{
      const isSelf = p.id === currentProfile?.id;
      const isAtivo = p.ativo !== false;
      const curStatus = !p.aprovado ? 'pendente' : isAtivo ? 'ativo' : 'inativo';
      const statusColor = curStatus==='ativo' ? 'var(--success)' : curStatus==='inativo' ? 'var(--danger)' : 'var(--warning)';

      // Select inline de status (desabilitado para si mesmo e admins)
      const canChangeStatus = !isSelf && !p.is_admin;
      const statusCtrl = canChangeStatus
        ? `<select style="font-size:12px;padding:3px 6px;border:1px solid ${statusColor};border-radius:20px;background:white;color:${statusColor};font-weight:600;cursor:pointer;outline:none;"
             onchange="changeUserStatus('${p.id}',this.value,'${esc(p.nome)}',this)">
             <option value="ativo"    ${curStatus==='ativo'   ?'selected':''}>✅ Ativo</option>
             <option value="inativo"  ${curStatus==='inativo' ?'selected':''}>🔴 Inativo</option>
             <option value="pendente" ${curStatus==='pendente'?'selected':''} style="display:${curStatus==='pendente'?'':'none'}">⏳ Pendente</option>
           </select>`
        : `<span class="badge" style="background:${curStatus==='ativo'?'var(--success-lt)':curStatus==='inativo'?'#fef2f2':'var(--warning-lt)'};color:${statusColor};border:1px solid ${statusColor}40;">
             ${curStatus==='ativo'?'✅ Ativo':curStatus==='inativo'?'🔴 Inativo':'⏳ Pendente'}
           </span>`;

      const roleBadge = p.is_admin ? '<span class="badge b-primary">Admin</span>' : '<span class="badge b-gray">Usuário</span>';
      const emp = p.empresa_id ? db.empresas.find(e=>e.id===p.empresa_id) : null;
      const empBadge = emp
        ? `<span style="font-size:12px;background:var(--primary-lt);color:var(--primary-dk);padding:2px 8px;border-radius:10px;">${esc(emp.nome)}</span>`
        : '<span style="color:var(--g400);font-size:12px;">—</span>';
      const pJson = esc(JSON.stringify({id:p.id,nome:p.nome,email:p.email,is_admin:p.is_admin,aprovado:p.aprovado,ativo:isAtivo,empresa_id:p.empresa_id||null}));
      html+=`<tr style="${curStatus==='inativo'?'opacity:.55;':''}">
        <td><div style="display:flex;align-items:center;gap:8px;">
          <div class="avatar" style="background:${avatarColor(p.id||0)};width:24px;height:24px;font-size:9px">${initials(p.nome)}</div>
          <span style="font-weight:600">${p.nome}${isSelf?' <em style="font-weight:400;color:var(--g400)">(você)</em>':''}</span>
        </div></td>
        <td style="font-size:12px;color:var(--g500)">${p.email}</td>
        <td>${empBadge}</td>
        <td>${statusCtrl}</td>
        <td>${roleBadge}</td>
        <td style="text-align:center;white-space:nowrap">
          <button class="icon-btn" title="Editar usuário" onclick="openUserModal('${pJson}')">✏️</button>
          <button class="icon-btn" title="Redefinir senha" onclick="openResetPasswordModal('${esc(p.email)}','${esc(p.nome)}','${p.id}')">🔑</button>
          ${!p.is_admin && !isSelf ? `<button class="icon-btn" title="Permissões de acesso" onclick="openPermissionsModal('${p.id}','${esc(p.nome)}')">🔒</button>` : ''}
          ${!isSelf?`<button class="btn btn-sm btn-secondary" onclick="toggleAdmin('${p.id}',${!p.is_admin})">${p.is_admin?'↓ Remover admin':'↑ Tornar admin'}</button>`:''}
          ${!isSelf?`<button class="icon-btn del" title="Excluir usuário" style="width:28px;height:28px;font-size:13px;" onclick="confirmDeleteUser('${p.id}','${esc(p.nome)}')">🗑️</button>`:''}
        </td></tr>`;
    });

    html+='</tbody></table>';
    sec.innerHTML=html;
  } catch(e) {
    sec.innerHTML=`<div style="padding:16px;color:var(--danger);font-size:13px">Erro ao carregar usuários: ${e.message}</div>`;
  }
}

async function changeUserStatus(userId, newStatus, nome, selectEl) {
  try {
    if (newStatus === 'ativo') {
      // Aprovar se pendente, ou reativar se inativo
      await sbUpdate('profiles', userId, { aprovado: true, ativo: true });
      toast(`Usuário "${nome}" ativado.`);

    loadAndRenderUsers(); // restaura select ao estado original
  }
}

let _rpActiveTab = 1;
function rpSwitchTab(n) {
  _rpActiveTab = n;
  document.getElementById('rpPane1').style.display = n===1?'':'none';
  document.getElementById('rpPane2').style.display = n===2?'':'none';
  const t1 = document.getElementById('rpTab1');
  const t2 = document.getElementById('rpTab2');
  t1.style.borderBottomColor = n===1?'var(--primary)':'transparent';
  t1.style.color = n===1?'var(--primary)':'var(--g400)';
  t2.style.borderBottomColor = n===2?'var(--primary)':'transparent';
  t2.style.color = n===2?'var(--primary)':'var(--g400)';
  const btn = document.getElementById('btnResetPwd');
  btn.textContent = n===1?'📧 Enviar link':'✏️ Definir senha';
}

function rpStrength(pwd) {
  if (!pwd) return '';
  if (pwd.length < 6)  return '🔴 Muito curta';
  if (pwd.length < 8)  return '🟡 Fraca';
  const strong = /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd);
  const medium = /[A-Z]/.test(pwd) || /[0-9]/.test(pwd);
  return strong ? '🟢 Forte' : medium ? '🟡 Média' : '🟡 Fraca';
}

async function rpExecute(email, userId) {
  const btn = document.getElementById('btnResetPwd');
  const msg = document.getElementById('resetMsg');
  msg.style.display = 'none';

  if (_rpActiveTab === 1) {
    // Enviar e-mail
    btn.disabled = true; btn.textContent = 'Enviando…';
    try {
      await authRecover(email);
      msg.style.display = 'block';
      msg.innerHTML = `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--r);padding:10px 14px;font-size:12px;color:#15803d;">
        ✅ E-mail enviado! O usuário receberá o link em instantes.
      </div>`;
      btn.textContent = '✓ Enviado';
      setTimeout(closeModal, 2500);
    } catch(e) {
      msg.style.display = 'block';
      msg.innerHTML = `<div style="background:var(--danger-lt);border:1px solid #fca5a5;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--danger);">
        ❌ Erro: ${e.message}
      </div>`;
      btn.disabled = false; btn.textContent = '📧 Tentar novamente';
    }
  } else {
    // Definir senha diretamente
    const pwd  = document.getElementById('rp_pwd').value;
    const pwd2 = document.getElementById('rp_pwd2').value;
    if (!pwd || pwd.length < 6) {
      msg.style.display='block';
      msg.innerHTML=`<div style="background:var(--danger-lt);border:1px solid #fca5a5;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--danger);">A senha deve ter pelo menos 6 caracteres.</div>`;
      return;
    }
    if (pwd !== pwd2) {
      msg.style.display='block';
      msg.innerHTML=`<div style="background:var(--danger-lt);border:1px solid #fca5a5;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--danger);">As senhas não coincidem.</div>`;
      return;
    }
    btn.disabled = true; btn.textContent = 'Salvando…';
    try {
      const EDGE = `https://ikmjoddgmshybdxyfttg.supabase.co/functions/v1/admin-reset-password`;
      const res  = await fetch(EDGE, {
        method:'POST',
        headers:{ 'apikey':KEY, 'Authorization':H['Authorization'], 'Content-Type':'application/json' },
        body: JSON.stringify({ userId, newPassword: pwd })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao redefinir senha');
      msg.style.display='block';
      msg.innerHTML=`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--r);padding:10px 14px;font-size:12px;color:#15803d;">
        ✅ Senha redefinida com sucesso!
      </div>`;
      btn.textContent='✓ Salvo';

    const existing     = await apiFetch('user_permissions', `select=*&user_id=eq.${userId}`);

    const projPerms    = existing.filter(r => r.resource_type === 'projeto').map(r => r.resource_id);

// Quando o checkbox do projeto muda, habilita/desabilita as abas filhas
function toggleProjSubitems(chk) {
  const pid = chk.dataset.id;
  const sub = document.getElementById(`proj_tabs_${pid}`);
  if (!sub) return;
  if (chk.checked) {
    sub.style.opacity = '';
    sub.style.pointerEvents = '';
    sub.querySelectorAll('input[type=checkbox]').forEach(el => el.checked = true);
  } else {
    sub.style.opacity = '0.4';
    sub.style.pointerEvents = 'none';
    sub.querySelectorAll('input[type=checkbox]').forEach(el => el.checked = false);
  }
}

function toggleAllPerms(type, check) {
  if (type === 'projeto') {
    document.querySelectorAll('input[data-type="projeto"]').forEach(chk => {
      chk.checked = check;
      toggleProjSubitems(chk);
    });
  } else {
    document.querySelectorAll(`input[data-type="${type}"]`).forEach(el => el.checked = check);
  }
}

// Marca/desmarca um subconjunto de indicadores pelo array de ids
function toggleIndGroup(ids, check) {
  ids.forEach(id => {
    const el = document.querySelector(`input[data-type="indicador"][data-id="${id}"]`);
    if (el) el.checked = check;
  });
}

async function savePermissions(userId) {
  const btn = document.querySelector('.modal-foot .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando…'; }
  try {
    const projIds = [...document.querySelectorAll('input[data-type="projeto"]:checked')].map(el => +el.dataset.id);
    const indIds  = [...document.querySelectorAll('input[data-type="indicador"]:checked')].map(el => +el.dataset.id);
    const cad     = document.getElementById('perm_cadastros')?.checked       || false;
    const rel     = document.getElementById('perm_agmrelatorio')?.checked    || false;
    const mapaEst = document.getElementById('perm_mapaestrategico')?.checked || false;

    // Tab permissions: por project type
    const tabRows = [];
    PERM_TABS.forEach(pt => {
      document.querySelectorAll(`input[data-type="${pt.type}"]:checked`).forEach(el => {
        tabRows.push({ user_id:userId, resource_type:pt.type, resource_id:+el.dataset.pid });
      });
    });

    const allProj   = projIds.length === db.projetos.length;
    const allInd    = indIds.length  === db.indicadores.length;
    const allTabs   = tabRows.length === db.projetos.length * PERM_TABS.length;

    // Remove tudo e reinicia
    const delRes = await fetch(`${REST}/user_permissions?user_id=eq.${userId}`, { method:'DELETE', headers:H });
    if (!delRes.ok && delRes.status !== 404) throw new Error(await delRes.text());

    // Acesso total: não salva nada (ausência de sentinela = irrestrito)
    if (allProj && allTabs && allInd && cad && rel && mapaEst) {
      toast('Permissões salvas — acesso total liberado.');
      closeModal();
      loadAndRenderUsers();
      return;
    }

    // Sentinela obrigatória: marca que este usuário tem restrições configuradas
    const rows = [{ user_id:userId, resource_type:'restricted', resource_id:null }];
    projIds.forEach(id => rows.push({ user_id:userId, resource_type:'projeto',   resource_id:id }));
    indIds.forEach(id  => rows.push({ user_id:userId, resource_type:'indicador', resource_id:id }));
    tabRows.forEach(r  => rows.push(r));
    if (rel)      rows.push({ user_id:userId, resource_type:'agmrelatorio',    resource_id:null });
    if (mapaEst)  rows.push({ user_id:userId, resource_type:'mapaestrategico', resource_id:null });
    if (cad)      rows.push({ user_id:userId, resource_type:'cadastros',       resource_id:null });

    if (rows.length) {
      const insRes = await fetch(`${REST}/user_permissions`, {
        method:'POST', headers:{...H,'Prefer':'return=minimal'},
        body: JSON.stringify(rows)
      });
      if (!insRes.ok) throw new Error(await insRes.text());
    }

    toast('Permissões salvas com sucesso!');
    closeModal();
    loadAndRenderUsers();
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Salvar Permissões'; }
  }
}

async function saveUser(userId, isSelf) {
  const nome  = document.getElementById('fu_nome')?.value.trim();
  const email = document.getElementById('fu_email')?.value.trim();
  if (!nome)  { alert('O nome é obrigatório.'); return; }
  if (!email) { alert('O e-mail é obrigatório.'); return; }

  const btn = document.getElementById('btnSvUser');
  btn.disabled=true; btn.textContent='Salvando...';

  const empVal = document.getElementById('fu_empresa')?.value;
  const data = { nome, email, empresa_id: empVal ? +empVal : null };

}

async function createUser() {
  const nome     = document.getElementById('nu_nome')?.value.trim();
  const email    = document.getElementById('nu_email')?.value.trim();
  const passMode    = document.querySelector('input[name="nu_passMode"]:checked')?.value || 'define';
  const pass        = document.getElementById('nu_pass')?.value;
  const isAdmin     = document.getElementById('nu_admin')?.value === 'true';
  const aprovado    = document.getElementById('nu_aprovado')?.value === 'true';
  const sendWelcome = document.getElementById('nu_sendWelcome')?.checked ?? true;
  const empVal      = document.getElementById('nu_empresa')?.value;

  const errEl = document.getElementById('nu_err');
  const showErr = msg => { errEl.textContent=msg; errEl.classList.add('show'); };
  errEl.classList.remove('show');

  if (!nome)  return showErr('O nome é obrigatório.');
  if (!email) return showErr('O e-mail é obrigatório.');
  if (passMode === 'define' && (!pass || pass.length < 6))
    return showErr('A senha precisa ter no mínimo 6 caracteres.');

  const btn = document.getElementById('btnCriarUser');
  btn.disabled=true; btn.textContent='Criando...';

  try {
    // 1. Create user via Auth API
    // Modo "email": gera senha aleatória forte (usuário vai redefinir via link)
    const signupPass = passMode === 'define'
      ? pass
      : Math.random().toString(36).slice(-10) + Math.random().toString(36).slice(-6).toUpperCase() + '!1';

    const res = await fetch(`${AUTH}/signup`, {
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body:JSON.stringify({ email, password:signupPass, data:{ nome } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg||data.message||data.error_description||'Erro ao criar usuário');

    const userId = data.user?.id || data.id;
    if (!userId) throw new Error('Não foi possível obter o ID do usuário criado.');

    // 2. Atualiza perfil criado pelo trigger com os campos do formulário.
    //    Usa PATCH primeiro (sem risco de FK) — se 0 linhas atualizadas, tenta INSERT.
    const profileData = { email, nome, is_admin: isAdmin, aprovado, ativo: true,
                          empresa_id: empVal ? +empVal : null };

    const patchRes = await fetch(`${REST}/profiles?id=eq.${userId}`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal,count=exact' },
      body: JSON.stringify(profileData)
    });
    if (!patchRes.ok) throw new Error(await patchRes.text());

    // Content-Range: "0-0/1" → 1 linha; "*/0" → nenhuma (trigger não criou o perfil)
    const cr = patchRes.headers.get('Content-Range') || '';
    const rowsUpdated = cr.includes('/') ? parseInt(cr.split('/')[1], 10) : 1;

    if (rowsUpdated === 0) {
      // Perfil não existe: o trigger falhou (provavelmente email NOT NULL no banco).
      // Tenta INSERT direto como fallback.
      const insRes = await fetch(`${REST}/profiles`, {
        method: 'POST',
        headers: { ...H, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ id: userId, ...profileData })
      });
      if (!insRes.ok) {
        const errJson = await insRes.json().catch(() => null);
        if (errJson?.code === '23503') {
          throw new Error(
            'Falha ao criar o perfil: o usuário foi gerado no Auth mas não existe no banco ' +
            '(constraint de chave estrangeira). Isso ocorre porque o trigger falhou.\n\n' +
            '✅ Solução: execute o arquivo "supabase_migrations_2026.sql" no SQL Editor do ' +
            'Supabase (migration #1 e #1b) e tente cadastrar o usuário novamente.'
          );
        }
        throw new Error(errJson?.message || await insRes.text() || 'Erro ao salvar perfil');
      }
    }

    // 3. Modo "email": envia link de redefinição de senha
    if (passMode === 'email') {
      await authRecover(email).catch(()=>{});
    }

    // 4. E-mail de boas-vindas
    if (sendWelcome) {
      await sendWelcomeEmail(email, nome, passMode === 'define' ? pass : null).catch(()=>{});
    }

    toast(`Usuário "${nome}" criado! Configure as permissões de acesso.`);
    openPermissionsModal(userId, nome, true);
  } catch(e) {
    showErr(e.message);
    btn.disabled=false; btn.textContent='Criar Usuário';
  }
}

function csvDragOver(e)  { e.preventDefault(); document.getElementById('csvDropZone')?.classList.add('drag-active'); }

// CSV parser (handles quoted fields and semicolon delimiter)
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  const rows = [];
  for (const line of lines) {
    const fields = [];
    let cur = '', inQ = false;
    for (let i=0; i<line.length; i++) {
      const ch = line[i];
      if (ch==='"' && !inQ) { inQ=true; continue; }
      if (ch==='"' && inQ)  { inQ=false; continue; }
      if (ch===';' && !inQ) { fields.push(cur.trim()); cur=''; continue; }
      cur+=ch;
    }
    fields.push(cur.trim());
    rows.push(fields);
  }
  return rows;
}

function parseCsvFile(file, pid) {
  const msg = document.getElementById('csvFileMsg');
  msg.textContent = `Lendo "${file.name}"...`;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error('O arquivo precisa ter ao menos uma linha de dados além do cabeçalho.');

      // Map header columns (case-insensitive, trim)
      const header = rows[0].map(h=>h.toLowerCase().replace(/[^a-z_]/g,''));
      const colIdx = {};
      CSV_COLS.forEach(c=>{ const i=header.indexOf(c.label); if(i>=0) colIdx[c.key]=i; });

      if (colIdx['nome'] === undefined) throw new Error('Coluna "nome" não encontrada. Verifique o cabeçalho do CSV.');

      // Validate each data row
      csvParsedRows = rows.slice(1).map((fields, i) => {
        const get = key => colIdx[key]!==undefined ? (fields[colIdx[key]]||'').trim() : '';
        const row = {
          _line: i+2,
          nome:        get('nome'),
          descricao:   get('descricao'),
          status:      get('status') || 'A Fazer',
          responsavel: get('responsavel'),
          dataInicio:  get('data_inicio'),
          dataFim:     get('data_fim'),
          tagsRaw:     get('tags'),
          errors: [],
        };
        // Validations
        if (!row.nome) row.errors.push('Nome obrigatório');
        if (row.nome.length > 200) row.errors.push('Nome muito longo (máx 200 car.)');
        const validStatus = ['A Fazer','Em Andamento','Concluído'];
        if (!validStatus.includes(row.status)) {
          row.errors.push(`Status inválido: "${row.status}"`);
          row.status = 'A Fazer';
        }
        if (row.dataInicio && !/^\d{4}-\d{2}-\d{2}$/.test(row.dataInicio)) row.errors.push('data_inicio inválida (use AAAA-MM-DD)');
        if (row.dataFim    && !/^\d{4}-\d{2}-\d{2}$/.test(row.dataFim))    row.errors.push('data_fim inválida (use AAAA-MM-DD)');
        // Resolve responsavel ID
        row.responsavelId = null;
        if (row.responsavel) {
          const found = db.responsaveis.find(r=>r.nome.toLowerCase()===row.responsavel.toLowerCase());
          if (found) row.responsavelId = found.id;
          else row.errors.push(`Responsável não encontrado: "${row.responsavel}"`);
        }
        // Resolve tag IDs
        row.tagIds = [];
        if (row.tagsRaw) {
          row.tagsRaw.split(';').map(t=>t.trim()).filter(Boolean).forEach(tName=>{
            const found = db.tags.find(tg=>tg.nome.toLowerCase()===tName.toLowerCase());
            if (found) row.tagIds.push(found.id);
            else row.errors.push(`Tag não encontrada: "${tName}"`);
          });
        }
        row.valid = row.errors.length === 0;
        return row;
      }).filter(r=>r.nome || r.errors.length); // skip truly empty lines

      renderCsvPreview(pid);
    } catch(err) {
      msg.textContent = '❌ ' + err.message;
    }
  };
  reader.onerror = ()=>{ msg.textContent = 'Erro ao ler o arquivo.'; };
  reader.readAsText(file, 'UTF-8');
}

             <div class="csv-err-msg">${r.errors.join(' · ')}</div>`}
      </td>
    </tr>`).join('');
}

async function doImportCsv(pid) {
  const validRows = csvParsedRows.filter(r=>r.valid);
  if (!validRows.length) return;

  const btn = document.getElementById('btnDoImport');
  btn.disabled=true; btn.textContent='Importando...';

  let imported=0, failed=0;
  for (const r of validRows) {
    try {
      const data = toDB.tarefa({
        nome:r.nome, descricao:r.descricao, projetoId:+pid,
        responsavelId:r.responsavelId||null, status:r.status,
        dataInicio:r.dataInicio||null, dataFim:r.dataFim||null,
      });
      const created = await sbCreate('tarefas', data);
      if (r.tagIds.length) await saveTaskTags(created.id, r.tagIds);
      imported++;
    } catch(e) { failed++; }
  }

  await reloadTable('tarefas');
  await reloadTable('tarefaTags');

function parseIndCsvFile(file) {
  const msg = document.getElementById('indFileMsg');
  msg.textContent = `Lendo "${file.name}"...`;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      if (rows.length < 2) throw new Error('O arquivo precisa ter ao menos uma linha de dados além do cabeçalho.');

      const header = rows[0].map(h => h.toLowerCase().trim().replace(/[^a-z_]/g, ''));
      const idx = {};
      IND_CSV_COLS.forEach(c => { const i = header.indexOf(c.label); if (i >= 0) idx[c.key] = i; });

      if (idx['nome'] === undefined) throw new Error('Coluna "nome" não encontrada. Verifique o cabeçalho.');
      if (idx['ano']  === undefined) throw new Error('Coluna "ano" não encontrada.');
      if (idx['mes']  === undefined) throw new Error('Coluna "mes" não encontrada.');

      const get = (fields, key) => idx[key] !== undefined ? (fields[idx[key]] || '').trim() : '';

      indImportRows = rows.slice(1).map((fields, i) => {
        const row = {
          _line:         i + 2,
          nome:          get(fields, 'nome'),
          descricao:     get(fields, 'descricao'),
          unidade:       get(fields, 'unidade') || '%',
          objetivo:      get(fields, 'objetivo'),
          responsavel:   get(fields, 'responsavel'),
          acumulado:     get(fields, 'acumulado').toLowerCase() === 'sim',
          ano:           parseInt(get(fields, 'ano')),
          mes:           parseInt(get(fields, 'mes')),
          meta_prevista: get(fields, 'meta_prevista')  ? parseFloat(get(fields, 'meta_prevista').replace(',','.'))  : null,
          meta_realizada:get(fields, 'meta_realizada') ? parseFloat(get(fields, 'meta_realizada').replace(',','.')) : null,
          errors: [],
        };

        if (!row.nome)                     row.errors.push('Nome obrigatório');
        if (isNaN(row.ano) || row.ano < 2000 || row.ano > 2100) row.errors.push('Ano inválido');
        if (isNaN(row.mes) || row.mes < 1  || row.mes > 12)    row.errors.push('Mês inválido (use 1 a 12)');
        if (!['%','R$','un'].includes(row.unidade))            { row.errors.push(`Unidade inválida: "${row.unidade}"`); row.unidade = '%'; }
        if (row.meta_prevista  !== null && isNaN(row.meta_prevista))  row.errors.push('meta_prevista não é número');
        if (row.meta_realizada !== null && isNaN(row.meta_realizada)) row.errors.push('meta_realizada não é número');

        // Resolve objetivo
        row.objetivoId = null;
        if (row.objetivo) {
          const found = db.objetivosEstrategicos.find(o => o.nome.toLowerCase() === row.objetivo.toLowerCase());
          if (found) row.objetivoId = found.id;
          else row.errors.push(`Objetivo não encontrado: "${row.objetivo}"`);
        }
        // Resolve responsável
        row.responsavelId = null;
        if (row.responsavel) {
          const found = db.responsaveis.find(r => r.nome.toLowerCase() === row.responsavel.toLowerCase());
          if (found) row.responsavelId = found.id;
          else row.errors.push(`Responsável não encontrado: "${row.responsavel}"`);
        }

        row.valid = row.errors.length === 0;
        return row;
      }).filter(r => r.nome || r.errors.length);

      renderIndImportPreview();
    } catch(err) {
      msg.textContent = '❌ ' + err.message;
    }
  };
  reader.onerror = () => { msg.textContent = 'Erro ao ler o arquivo.'; };
  reader.readAsText(file, 'UTF-8');
}

      </td>
    </tr>`).join('');

async function doImportIndicadores() {
  const validRows = indImportRows.filter(r => r.valid);
  if (!validRows.length) return;

  const btn = document.getElementById('btnDoIndImport');
  btn.disabled = true; btn.textContent = 'Importando...';

  // Agrupa linhas por nome do indicador
  const byNome = new Map();
  validRows.forEach(r => {
    if (!byNome.has(r.nome)) byNome.set(r.nome, []);
    byNome.get(r.nome).push(r);
  });

  let importedInds = 0, importedMetas = 0, failed = 0;

  for (const [nome, rows] of byNome) {
    try {
      // Verifica se o indicador já existe (mesmo nome, case-insensitive)
      let ind = db.indicadores.find(i => i.nome.toLowerCase() === nome.toLowerCase());
      const firstRow = rows[0];

      if (!ind) {
        // Cria o indicador
        const indData = toDB.indicador({
          nome, descricao: firstRow.descricao,
          unidade: firstRow.unidade, objetivoId: firstRow.objetivoId,
          acumulado: firstRow.acumulado, responsavelId: firstRow.responsavelId,
        });
        ind = await sbCreate('indicadores', indData);
        importedInds++;
      }

      // Cria/atualiza metas mensais
      for (const r of rows) {
        try {
          const existing = getMeta(ind.id, r.mes, r.ano);
          const metaData = {
            indicador_id:   ind.id,
            ano:            r.ano,
            mes:            r.mes,
            meta_prevista:  r.meta_prevista,
            meta_realizada: r.meta_realizada,
          };
          if (existing) {
            await sbUpdate('indicador_metas', existing.id, {
              meta_prevista:  r.meta_prevista,
              meta_realizada: r.meta_realizada,
            });
          } else {
            await sbCreate('indicador_metas', metaData);
          }
          importedMetas++;
        } catch(e) { failed++; }
      }
    } catch(e) { failed++; }
  }

  await reloadTable('indicadores');
  await reloadTable('indicadorMetas');
  closeModal();

  const msg = failed
    ? `${importedInds} indicador(es) · ${importedMetas} meta(s) importadas. ${failed} falha(s).`
    : `✅ ${importedInds} indicador(es) criado(s) · ${importedMetas} meta(s) importadas com sucesso!`;
  toast(msg, failed ? 'err' : 'ok');
  renderIndicadores();
}

function openModal(inner, maxWidth) {
  const root=document.getElementById('modalRoot');
  const wStyle = maxWidth ? `max-width:${maxWidth};` : '';
  const dragBar = `<div class="modal-drag-bar" onmousedown="startModalDrag(event)"><span>⠿</span> Mover janela</div>`;
  root.innerHTML=`<div class="overlay" id="ov"><div class="modal" style="${wStyle}">${dragBar}${inner}</div></div>`;
  requestAnimationFrame(()=>document.getElementById('ov').classList.add('on'));
}
function closeModal() {
  const ov=document.getElementById('ov');
  if (!ov) return;
  ov.classList.remove('on');
  setTimeout(()=>{document.getElementById('modalRoot').innerHTML='';},200);
}
document.addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});

/* ---- Modal drag-to-move ---- */
let _modalDrag = null;
function startModalDrag(e) {
  if (e.button !== 0) return;
  const modal = document.querySelector('#ov .modal');
  const ov    = document.getElementById('ov');
  if (!modal || !ov) return;
  e.preventDefault();
  // Snapshot current visual position and switch to absolute
  const rect = modal.getBoundingClientRect();
  modal.style.position  = 'absolute';
  modal.style.margin    = '0';
  modal.style.transform = 'none';
  modal.style.left      = rect.left + 'px';
  modal.style.top       = rect.top  + 'px';
  modal.style.maxHeight = '90vh';
  // Remove dark overlay so content behind becomes visible
  ov.classList.add('dragging');
  ov.style.pointerEvents = 'none';
  modal.style.pointerEvents = 'all';
  _modalDrag = { startX: e.clientX, startY: e.clientY, initLeft: rect.left, initTop: rect.top };
  document.addEventListener('mousemove', _onModalDrag);
  document.addEventListener('mouseup',   _endModalDrag);
}
function _onModalDrag(e) {
  if (!_modalDrag) return;
  const modal = document.querySelector('#ov .modal');
  if (!modal) return;
  const dx = e.clientX - _modalDrag.startX;
  const dy = e.clientY - _modalDrag.startY;
  modal.style.left = Math.max(0, _modalDrag.initLeft + dx) + 'px';
  modal.style.top  = Math.max(0, _modalDrag.initTop  + dy) + 'px';
}
function _endModalDrag() {
  _modalDrag = null;
  document.removeEventListener('mousemove', _onModalDrag);
  document.removeEventListener('mouseup',   _endModalDrag);
}

            style="opacity:0;width:0;height:0;position:absolute;"
            onchange="
              const sl=this.closest('label').querySelector('.toggle-sl');

              sl.closest('div').style.background=this.checked?'var(--primary)':'var(--g300)';
            ">
          <div style="position:absolute;inset:0;border-radius:34px;background:${(p?.controlaCusto !== false)?'var(--primary)':'var(--g300)'};transition:background .2s;"></div>

    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btnSvProj" onclick="saveProject(${pid||'null'})">${p?'Salvar Alterações':'Criar Projeto'}</button>

}
async function saveProject(pid) {
  const nome=g('f_pnome').trim();
  if (!nome){alert('O nome é obrigatório.');return;}
  const btn=document.getElementById('btnSvProj');
  btn.disabled=true;btn.textContent='Salvando...';
  const empVal=g('f_pemp');
  const controlaCusto = document.getElementById('f_pcontrola_custo')?.checked !== false;
  const data=toDB.projeto({nome,descricao:g('f_pdesc').trim(),status:g('f_pstatus'),
    icone:g('f_picone')||'📁',
    empresaId:empVal?+empVal:null,
    controlaCusto,
    responsavelId:+g('f_presp')||null,dataInicio:g('f_pinicio')||null,dataFim:g('f_pfim')||null});
  try {
    if (pid){await sbUpdate('projetos',pid,data);toast('Projeto atualizado!');}
    else    {await sbCreate('projetos',data);toast('Projeto criado!');}
    await reloadTable('projetos');closeModal();render();
  } catch(e){toast('Erro: '+e.message,'err');btn.disabled=false;btn.textContent=pid?'Salvar Alterações':'Criar Projeto';}
}

             box-shadow:0 8px 24px rgba(0,0,0,.14);overflow:hidden;">

            onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
            onmouseout="this.style.borderColor='var(--g200)';this.style.color='var(--g500)'">
            <input type="file" multiple style="display:none;" onchange="handleAnexoUpload(this,${tid})">

      💬 Comentários${(()=>{const n=db.tarefaComentarios.filter(c=>c.tarefaId===tid&&(c.status==='Aberta'||c.status==='Em Andamento')).length;return n>0?` (${n})`:''})()}
    </button>` : ''}
    <button class="btn btn-primary" id="btnSvTask" onclick="saveTask(${pid},${tid||'null'})">${t?'Salvar Alterações':'Criar Tarefa'}</button>

}
function toggleTagPill(el) { el.classList.toggle('selected'); }
function updateRespDropdown() {
  const checks = [...document.querySelectorAll('#respList input[type=checkbox]')];
  const selIds = checks.filter(c=>c.checked).map(c=>+c.dataset.respid);
  // update label
  const lbl = selIds.length===0 ? 'Selecionar responsáveis...'
    : selIds.length===1 ? (db.responsaveis.find(r=>r.id===selIds[0])?.nome||'1 selecionado')
    : `${selIds.length} responsáveis selecionados`;
  document.getElementById('respDropdownLabel').textContent = lbl;
  // update avatar row
  document.getElementById('respAvatarRow').innerHTML = selIds.map(rid=>{
    const r = db.responsaveis.find(x=>x.id===rid);
    return r ? `<div class="avatar" style="width:24px;height:24px;font-size:9px;background:${avatarColor(r.id)};" title="${r.nome}">${initials(r.nome)}</div>` : '';
  }).join('');
  // update row highlight
  checks.forEach(c=>{
    const lbl = c.closest('label');
    if (lbl) lbl.style.background = c.checked ? 'var(--primary-lt)' : 'transparent';
  });
  // update button border
  const btn = document.getElementById('respDropdownBtn');
  if (btn) btn.style.borderColor = selIds.length ? 'var(--primary)' : 'var(--g200)';
}
function filterRespList(q) {
  const term = q.toLowerCase();
  document.querySelectorAll('#respList label').forEach(lbl=>{
    const name = lbl.querySelector('span')?.textContent?.toLowerCase()||'';
    lbl.style.display = name.includes(term) ? '' : 'none';
  });
}
// Close resp dropdown when clicking outside
document.addEventListener('click', e=>{
  const dd = document.getElementById('respDropdown');
  const btn = document.getElementById('respDropdownBtn');
  if (dd && btn && !dd.contains(e.target) && !btn.contains(e.target)) dd.style.display='none';
});
function fileIcon(tipo) {
  if (!tipo) return '📄';
  if (tipo.startsWith('image/')) return '🖼️';
  if (tipo.includes('pdf')) return '📕';
  if (tipo.includes('word') || tipo.includes('document')) return '📝';
  if (tipo.includes('sheet') || tipo.includes('excel')) return '📊';
  if (tipo.includes('zip') || tipo.includes('rar')) return '🗜️';
  return '📄';
}
function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes+'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}
async function handleAnexoUpload(input, tid) {
  const files = [...input.files];
  if (!files.length) return;
  const btn = document.getElementById('btnSvTask');
  btn.disabled=true; btn.textContent='Enviando...';
  let erros = [];
  try {
    for (const file of files) {
      try { await uploadAnexo(tid, file); }
      catch(e) { erros.push(`"${file.name}": ${e.message}`); }
    }
    if (erros.length) { toast('Erro no upload:\n'+erros.join('\n'),'err'); }
    await reloadTable('tarefaAnexos');
    // re-render attachment list in open modal
    const pid = byId('tarefas',tid)?.projetoId;
    const anexos = taskAnexos(tid);
    document.getElementById('anexosList').innerHTML = anexos.map(a=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);">
        <span style="font-size:16px;">${fileIcon(a.tipo)}</span>
        <a href="${a.url}" target="_blank" style="flex:1;font-size:12px;color:var(--primary);font-weight:600;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.nome}">${a.nome}</a>
        <span style="font-size:11px;color:var(--g400);white-space:nowrap;">${fmtSize(a.tamanho)}</span>
        <button class="icon-btn del" style="width:24px;height:24px;font-size:12px;flex-shrink:0;" onclick="deleteAnexoModal(${a.id},'${a.url}')" title="Remover">✕</button>
      </div>`).join('');
    const ok = files.length - erros.length;
    if (ok > 0) toast(`${ok} arquivo${ok>1?'s':''} enviado${ok>1?'s':''}!`);
  } catch(e) { toast('Erro inesperado: '+e.message,'err'); }
  finally { btn.disabled=false; btn.textContent='Salvar Alterações'; input.value=''; }
}
async function deleteAnexoModal(anexoId, url) {
  try {
    await deleteAnexo(anexoId, url);
    const el = document.querySelector(`button[onclick="deleteAnexoModal(${anexoId},'${url}')"]`)?.closest('div[style]');
    if (el) el.remove();
    toast('Anexo removido.');
  } catch(e) { toast('Erro ao remover: '+e.message,'err'); }
}
async function saveTask(pid,tid) {
  const nome=g('f_tnome').trim();
  if (!nome){alert('O nome é obrigatório.');return;}
  const dataInicio=g('f_tinicio')||null;
  const dataFim=g('f_tfim')||null;
  if (dataInicio && dataFim && dataFim<dataInicio){
    document.getElementById('f_tfim').style.borderColor='var(--danger)';
    toast('A data de fim deve ser igual ou posterior à data de início.','err');
    return;
  }
  const selRespIds=[...document.querySelectorAll('#respList input[type=checkbox]:checked')].map(el=>+el.dataset.respid);
  const primaryResp = selRespIds[0]||null;
  const btn=document.getElementById('btnSvTask');
  btn.disabled=true;btn.textContent='Salvando...';
  const data=toDB.tarefa({nome,descricao:g('f_tdesc').trim(),projetoId:+pid,
    status:g('f_tstatus'),responsavelId:primaryResp,
    horasRealizadas:parseFloat(g('f_thoras'))||0,
    pctExecucao:parseInt(g('f_texecucao'))||0,
    dataInicio,dataFim});
  const selTagIds=[...document.querySelectorAll('#tagPicker .tag-pill.selected')].map(el=>+el.dataset.tagid);
  try {
    let realTid=tid;
    if (tid){await sbUpdate('tarefas',tid,data);toast('Tarefa atualizada!');}
    else    {const created=await sbCreate('tarefas',data);realTid=created.id;toast('Tarefa criada!');}
    await saveTaskTags(realTid, selTagIds);
    await saveTaskResponsaveis(realTid, selRespIds);
    await reloadTable('tarefas');
    await reloadTable('tarefaTags');
    await reloadTable('tarefaResponsaveis');
    closeModal();render();
  } catch(e){toast('Erro: '+e.message,'err');btn.disabled=false;btn.textContent=tid?'Salvar Alterações':'Criar Tarefa';}
}

    </div>

async function saveCost(pid,cid) {
  const desc=g('f_cdesc').trim();
  const valor=parseFloat(g('f_cvalor'));
  if (!desc){alert('A descrição é obrigatória.');return;}
  if (isNaN(valor)||valor<0){alert('Informe um valor válido.');return;}
  const btn=document.getElementById('btnSvCost');
  btn.disabled=true;btn.textContent='Salvando...';
  const data=toDB.custo({descricao:desc,projetoId:+pid,
    categoriaId:+g('f_ccat')||null,valor,data:g('f_cdata')||null});
  try {
    if (cid){await sbUpdate('custos',cid,data);toast('Custo atualizado!');}
    else    {await sbCreate('custos',data);toast('Custo registrado!');}
    await reloadTable('custos');closeModal();render();
  } catch(e){toast('Erro: '+e.message,'err');btn.disabled=false;btn.textContent=cid?'Salvar Alterações':'Registrar Custo';}
}

/* ================================================================
   TAG MODAL
   ================================================================ */
const TAG_PALETTE = ['#E8501A','#8B5CF6','#EC4899','#EF4444','#F59E0B','#10B981','#14B8A6','#3B82F6','#0EA5E9','#64748B','#1E293B','#D97706'];
function openTagModal(tid=null) {
  const tg = tid ? db.tags.find(t=>t.id===tid) : null;
  const cur = tg?.cor || TAG_PALETTE[0];
  const swatches = TAG_PALETTE.map(c=>`
    <span class="tag-color-swatch" style="background:${c};${c===cur?'border-color:var(--g700);outline:2px solid var(--primary);':''}"
      onclick="selectTagColor('${c}',this)"></span>`).join('');
  openModal(`
  <div class="modal-head">
    <div class="modal-title">${tg?'✏️ Editar Tag':'🏷️ Nova Tag'}</div>
    <button class="modal-x" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="fg"><label class="lbl">Nome <span class="req">*</span></label>
      <input id="f_tgnome" class="fc" type="text" value="${tg?.nome||''}" placeholder="Ex: Bug, Feature, Urgente"></div>
    <div class="fg"><label class="lbl">Cor</label>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);">
        <div id="tagColorPreview" style="display:flex;align-items:center;gap:8px;margin-bottom:4px;width:100%;">
          <span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:${cur};border:2px solid var(--g200);" id="tagColorDot"></span>
          <span id="tagColorHex" style="font-size:12px;color:var(--g600);font-family:monospace;">${cur}</span>
        </div>
        <input type="hidden" id="f_tgcor" value="${cur}">
        <div class="tag-colors">${swatches}</div>
      </div>
    </div>
    <div style="margin-top:10px;">
      <label class="lbl">Prévia</label>
      <span class="tag-badge" id="tagPreview" style="background:${cur};font-size:13px;padding:4px 12px;">${tg?.nome||'Tag'}</span>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btnSvTag" onclick="saveTag(${tid||'null'})">${tg?'Salvar Alterações':'Criar Tag'}</button>
  </div>`);
  document.getElementById('f_tgnome').addEventListener('input', e=>{
    const prev=document.getElementById('tagPreview');
    if (prev) prev.textContent = e.target.value||'Tag';
  });
}
function selectTagColor(cor, el) {
  document.getElementById('f_tgcor').value = cor;
  document.getElementById('tagColorDot').style.background = cor;
  document.getElementById('tagColorHex').textContent = cor;
  document.getElementById('tagPreview').style.background = cor;
  document.querySelectorAll('.tag-color-swatch').forEach(s=>{
    s.style.outline='none'; s.style.borderColor='var(--g200)';
  });
  el.style.outline='2px solid var(--primary)'; el.style.borderColor='var(--g700)';
}
async function saveTag(tid) {
  const nome=g('f_tgnome').trim();
  if (!nome){alert('O nome é obrigatório.');return;}
  const cor=g('f_tgcor')||TAG_PALETTE[0];
  const btn=document.getElementById('btnSvTag');
  btn.disabled=true;btn.textContent='Salvando...';
  const data=toDB.tag({nome,cor});
  try {
    if (tid){await sbUpdate('tags',tid,data);toast('Tag atualizada!');}
    else    {await sbCreate('tags',data);toast('Tag criada!');}
    await reloadTable('tags');closeModal();render();
  } catch(e){toast('Erro: '+e.message,'err');btn.disabled=false;btn.textContent=tid?'Salvar Alterações':'Criar Tag';}
}

/* ================================================================
   INDICADOR MODAL
   ================================================================ */

    <option value="${o.id}" ${ind?.objetivoId===o.id?'selected':''}>${esc(o.nome)}</option>`).join('');

    <option value="${r.id}" ${ind?.responsavelId===r.id?'selected':''}>${esc(r.nome)}${r.cargo?' — '+esc(r.cargo):''}</option>`).join('');

  <div class="modal-head">

    <div class="fg"><label class="lbl">Descrição</label>

        <select id="f_indunidade" class="fc">

          <option value="R$" ${ind?.unidade==='R$'?'selected':''}>R$ Valor monetário</option>
          <option value="un" ${ind?.unidade==='un'?'selected':''}>un Quantidade</option>
          <option value="h"  ${ind?.unidade==='h' ?'selected':''}>h Horas</option>
          <option value="d"  ${ind?.unidade==='d' ?'selected':''}>d Dias</option>

        <select id="f_indobjetivo" class="fc">
          <option value="">— Sem objetivo —</option>${objOpts}
        </select>
        ${!db.objetivosEstrategicos.length
          ? `<div style="font-size:10px;color:var(--g400);margin-top:3px;">Cadastre objetivos em <a href="#" onclick="event.preventDefault();closeModal();navigateTo('settings')" style="color:var(--primary)">Configurações</a></div>`

      <select id="f_indresp" class="fc">
        <option value="">— Sem responsável —</option>${respOpts}

    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);margin-top:4px;">
      <input type="checkbox" id="f_indacumulado" ${ind?.acumulado?'checked':''} style="margin-top:2px;accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--g700);">📈 Visualizar acumulado no ano</div>
        <div style="font-size:11px;color:var(--g500);margin-top:2px;">Exibe coluna adicional na tabela mensal com o valor acumulado (YTD) de previsto e realizado.</div>
      </div>

      <input type="checkbox" id="f_indmenormelhor" ${ind?.menorMelhor?'checked':''} style="margin-top:2px;accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--g700);">📉 Menor é melhor</div>

      </div>
    </label>
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);margin-top:6px;">
      <input type="checkbox" id="f_indocultaracum" ${ind?.ocultarAcum?'checked':''} style="margin-top:2px;accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--g700);">🙈 Ocultar acumulado do ano no card</div>
        <div style="font-size:11px;color:var(--g500);margin-top:2px;">Remove a linha de acumulado YTD do card. O card exibirá apenas os resultados do mês atual e o comparativo ano anterior (YoY).</div>

    <button class="btn btn-primary" id="btnSvInd" onclick="saveIndicador(${iid||'null'})">${ind?'Salvar Alterações':'Criar Indicador'}</button>
  </div>`);
  setTimeout(()=>document.getElementById('f_indnome')?.focus(),100);
}
async function saveIndicador(iid) {
  const nome = g('f_indnome').trim();
  if (!nome){alert('O nome é obrigatório.');return;}
  const btn=document.getElementById('btnSvInd');
  btn.disabled=true; btn.textContent='Salvando...';
  const data = toDB.indicador({ nome, descricao:g('f_inddesc').trim(), unidade:g('f_indunidade'), objetivoId:+g('f_indobjetivo')||null, acumulado:document.getElementById('f_indacumulado')?.checked||false, menorMelhor:document.getElementById('f_indmenormelhor')?.checked||false, ocultarAcum:document.getElementById('f_indocultaracum')?.checked||false, responsavelId:+g('f_indresp')||null });
  try {
    if (iid) { await sbUpdate('indicadores',iid,data); toast('Indicador atualizado!'); }
    else {
      const c = await sbCreate('indicadores', data);
      toast('Indicador criado!');
      if (c?.id) {
        indExpandedIds.add(c.id);
        // Se o usuário tem restrições configuradas, libera automaticamente o novo indicador para ele
        if (!currentProfile?.is_admin && myPermissions !== null && currentUser?.id) {
          try {
            await fetch(`${REST}/user_permissions`, {
              method:'POST',
              headers:{...H,'Prefer':'return=minimal'},
              body: JSON.stringify({ user_id:currentUser.id, resource_type:'indicador', resource_id:c.id })
            });
            // Atualiza myPermissions em memória para refletir o novo acesso imediatamente
            myPermissions.indicadores.add(c.id);
          } catch(e) { console.warn('Não foi possível liberar permissão automática:', e.message); }
        }
      }
    }
    await reloadTable('indicadores'); closeModal(); render();
  } catch(e){ toast('Erro: '+e.message,'err'); btn.disabled=false; btn.textContent=iid?'Salvar Alterações':'Criar Indicador'; }
}

/* ================================================================
   META MENSAL MODAL
   ================================================================ */
function openMetaModal(indId, mes=null, ano=null) {
  const ind  = db.indicadores.find(i=>i.id===indId);
  const now  = new Date();
  const mRef = mes  || now.getMonth()+1;
  const aRef = ano  || now.getFullYear();
  const meta = getMeta(indId, mRef, aRef);

  // Opções de mês/ano (meses do ano selecionado)
  const mOpts = MES_NOMES_FULL.map((n,i)=>`<option value="${i+1}" ${(i+1)===mRef?'selected':''}>${n}</option>`).join('');
  // Anos: 3 anos para trás e 2 à frente
  const anoAtual = now.getFullYear();
  const aOpts = Array.from({length:6},(_,i)=>anoAtual-3+i)
    .map(a=>`<option value="${a}" ${a===+aRef?'selected':''}>${a}</option>`).join('');

  openModal(`
  <div class="modal-head">
    <div class="modal-title">📝 Lançar Meta — ${esc(ind?.nome||'')}</div>
    <button class="modal-x" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-row">
      <div class="fg"><label class="lbl">Mês</label>
        <select id="f_mmes" class="fc" onchange="updateMetaPreview(${indId})">${mOpts}</select></div>
      <div class="fg"><label class="lbl">Ano</label>
        <select id="f_mano" class="fc" onchange="updateMetaPreview(${indId})">${aOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="lbl">Meta Prevista <span class="req">*</span></label>
        <input id="f_mprev" class="fc" type="number" step="any" value="${meta?.metaPrevista??''}" placeholder="0" oninput="updateMetaPreview(${indId})"></div>
      <div class="fg"><label class="lbl">Meta Realizada <span style="font-size:10px;color:var(--g400)">(opcional)</span></label>
        <input id="f_mreal" class="fc" type="number" step="any" value="${meta?.metaRealizada??''}" placeholder="Deixe em branco se ainda não realizado" oninput="updateMetaPreview(${indId})"></div>
    </div>
    ${ind?.unidade === '%' ? `
    <div style="margin-top:10px;padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--r);">
      <div style="font-size:11px;font-weight:700;color:#1d4ed8;margin-bottom:8px;letter-spacing:.3px;">
        📊 ACUMULADO YTD — Jan até o mês selecionado
      </div>
      <div style="font-size:11px;color:#3b82f6;margin-bottom:10px;">
        Para indicadores em %, o acumulado não pode ser calculado por soma. Informe o valor YTD real.
      </div>
      <div class="form-row">
        <div class="fg"><label class="lbl" style="font-size:11px;">Acum. Previsto YTD <span style="color:var(--g400)">(opcional)</span></label>
          <input id="f_macumprev" class="fc" type="number" step="any" value="${meta?.acumPrevisto??''}" placeholder="Ex: 12.5" oninput="updateMetaPreview(${indId})"></div>
        <div class="fg"><label class="lbl" style="font-size:11px;">Acum. Realizado YTD <span style="color:var(--g400)">(opcional)</span></label>
          <input id="f_macumreal" class="fc" type="number" step="any" value="${meta?.acumRealizado??''}" placeholder="Ex: 11.8" oninput="updateMetaPreview(${indId})"></div>
      </div>
    </div>` : ''}
    <div id="meta-preview" style="margin-top:8px;padding:10px 12px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);min-height:38px;"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btnSvMeta" onclick="saveMeta(${indId},'${ind?.unidade||'%'}')">Salvar Meta</button>
  </div>`);
  setTimeout(()=>{ updateMetaPreview(indId); },100);
}

function updateMetaPreview(indId) {
  const prev = document.getElementById('meta-preview'); if (!prev) return;
  const p    = parseFloat(document.getElementById('f_mprev')?.value);
  const r    = parseFloat(document.getElementById('f_mreal')?.value);
  const mes  = parseInt(document.getElementById('f_mmes')?.value||0);
  const ano  = parseInt(document.getElementById('f_mano')?.value||0);
  const ind  = db.indicadores.find(i=>i.id===indId);
  const und  = ind?.unidade||'%';
  const fmt  = v => und==='R$'?fmtBRLInt(v):v.toLocaleString('pt-BR')+(und!=='un'?' '+und:'');

  if (!mes||!ano||isNaN(p)) { prev.innerHTML='<span style="font-size:12px;color:var(--g400);">Preencha o mês, ano e meta prevista.</span>'; return; }

  const ating = (!isNaN(r) && p!==0) ? Math.round((r/p)*100) : null;
  const col   = ating===null?'var(--g400)':ating>=100?'var(--success)':'var(--danger)';
  const varR  = (!isNaN(r)) ? fmtVar(r,p) : { txt:'—', cls:'neu' };

  prev.innerHTML = `
  <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;">
    <span>📅 <strong>${MES_NOMES_FULL[mes-1]}/${ano}</strong></span>
    <span>🎯 Previsto: <strong>${isNaN(p)?'—':fmt(p)}</strong></span>
    ${!isNaN(r)?`<span>✅ Realizado: <strong style="color:${col}">${fmt(r)}</strong></span>`:''}
    ${ating!==null?`<span>📈 Atingimento: <strong style="color:${col}">${ating}%</strong></span>`:''}
    ${varR.txt!=='—'?`<span>Δ <strong class="ind-var-val ${varR.cls}">${varR.txt}</strong></span>`:''}
  </div>`;
}

async function saveMeta(indId, unidade) {
  const mes  = parseInt(g('f_mmes'));
  const ano  = parseInt(g('f_mano'));
  const prev = parseFloat(g('f_mprev'));
  const realStr = g('f_mreal').trim();
  const real = realStr === '' ? null : parseFloat(realStr);

  if (isNaN(mes)||isNaN(ano)){alert('Selecione mês e ano.');return;}
  if (isNaN(prev)){alert('Meta prevista é obrigatória.');return;}
  if (realStr !== '' && isNaN(real)){alert('Valor realizado inválido.');return;}

  const btn=document.getElementById('btnSvMeta');
  btn.disabled=true; btn.textContent='Salvando...';

  const existente = getMeta(indId, mes, ano);
  const acumPrevStr  = document.getElementById('f_macumprev')?.value.trim()  ?? '';
  const acumRealStr  = document.getElementById('f_macumreal')?.value.trim()  ?? '';
  const acumPrevisto  = acumPrevStr  === '' ? null : parseFloat(acumPrevStr);
  const acumRealizado = acumRealStr  === '' ? null : parseFloat(acumRealStr);
  const data = toDB.indicadorMeta({ indicadorId:indId, mes, ano, metaPrevista:prev, metaRealizada:real, acumPrevisto, acumRealizado });

  try {
    if (existente) {
      await sbUpdate('indicador_metas', existente.id, data);
      toast('Meta atualizada!');
    } else {
      await sbCreate('indicador_metas', data);
      toast('Meta registrada!');
    }
    indExpandedIds.add(indId);
    await reloadTable('indicadorMetas'); closeModal(); render();
  } catch(e){ toast('Erro: '+e.message,'err'); btn.disabled=false; btn.textContent='Salvar Meta'; }
}

/* ================================================================
   COMENTÁRIOS DE INDICADOR
   ================================================================ */
function openComentariosModal(indId, mes, ano) {
  const ind     = db.indicadores.find(i => i.id === indId);
  const mesNome = MES_NOMES_FULL[mes - 1];
  const cmts    = db.indicadorComentarios.filter(c => c.indicadorId === indId && c.mes === mes && c.ano === +ano);

  const statusCfg = {
    'Aberta':       { bg:'#fef2f2', col:'#dc2626', border:'#fca5a5' },
    'Em Andamento': { bg:'#fffbeb', col:'#d97706', border:'#fcd34d' },
    'Concluída':    { bg:'#f0fdf4', col:'#16a34a', border:'#86efac' },
    'Comentário':   { bg:'#dbeafe', col:'#1d4ed8', border:'#93c5fd' },
  };
  const statusBadge = s => {
    const c = statusCfg[s] || { bg:'var(--g100)', col:'var(--g600)', border:'var(--g200)' };
    return `<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${c.bg};color:${c.col};border:1px solid ${c.border};font-weight:600;white-space:nowrap;">${s}</span>`;
  };

  const listaHtml = cmts.length === 0
    ? `<p style="text-align:center;font-size:12px;color:var(--g400);padding:16px 0 8px;">Nenhum comentário ainda para este mês.</p>`
    : cmts.map(c => `
      <div style="border:1px solid var(--g100);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;background:var(--white);">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${statusBadge(c.status)}
            ${c.data ? `<span style="font-size:11px;color:var(--g500);">📅 ${new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;">
            <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:#E8501A;"
              onclick="editComentario(${c.id},${indId},${mes},${ano})" title="Editar comentário">✏️</button>
            <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:var(--danger);"
              onclick="deleteComentario(${c.id},${indId},${mes},${ano})" title="Excluir comentário">🗑️</button>
          </div>
        </div>
        ${c.titulo ? `<div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px;">📌 ${esc(c.titulo)}</div>` : ''}
        <div style="font-size:13px;color:var(--g800);line-height:1.55;white-space:pre-wrap;">${esc(c.descricao)}</div>
      </div>`).join('');

  const hoje = new Date().toISOString().slice(0, 10);
  const sOpts = ['Aberta','Em Andamento','Concluída','Comentário']
    .map(s => `<option value="${s}">${s}</option>`).join('');

  openModal(`
  <div class="modal-head">
    <div class="modal-title">💬 Comentários — ${esc(ind?.nome||'')} — ${mesNome}/${ano}</div>
    <button class="modal-x" onclick="closeModal();renderIndicadores()">✕</button>
  </div>
  <div class="modal-body" style="max-height:65vh;overflow-y:auto;">
    <div id="cmt-lista" style="margin-bottom:14px;">${listaHtml}</div>
    <div style="border-top:2px solid var(--g100);padding-top:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:10px;">➕ Novo comentário</div>
      <div class="fg"><label class="lbl">Título</label>
        <input id="fc_titulo" class="fc" type="text" placeholder="Título resumido (opcional)..."></div>
      <div class="form-row" style="grid-template-columns:1fr 1fr;">
        <div class="fg"><label class="lbl">Data</label>
          <input id="fc_data" class="fc" type="date" value="${hoje}"></div>
        <div class="fg"><label class="lbl">Status</label>
          <select id="fc_status" class="fc">${sOpts}</select></div>
      </div>
      <div class="fg"><label class="lbl">Comentário <span class="req">*</span></label>
        <textarea id="fc_desc" class="fc" rows="5" placeholder="Descreva a observação ou ação..."
          style="resize:vertical;min-height:100px;font-family:inherit;line-height:1.55;"></textarea></div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="closeModal();renderIndicadores()">Fechar</button>
    <button class="btn btn-primary" id="btnSvCmt" onclick="saveComentario(${indId},${mes},${ano})">➕ Adicionar</button>
  </div>`);

  // foca no campo de título
  setTimeout(() => document.getElementById('fc_titulo')?.focus(), 100);
}

async function saveComentario(indId, mes, ano) {
  const titulo = document.getElementById('fc_titulo')?.value.trim();
  const data   = document.getElementById('fc_data')?.value.trim();
  const status = document.getElementById('fc_status')?.value;
  const desc   = document.getElementById('fc_desc')?.value.trim();

  if (!desc) { alert('O comentário é obrigatório.'); return; }

  const btn = document.getElementById('btnSvCmt');
  btn.disabled = true; btn.textContent = 'Salvando...';

  try {
    await sbCreate('indicador_comentarios', {
      indicador_id: indId,
      mes: +mes,
      ano: +ano,
      titulo: titulo || null,
      data: data || null,
      descricao: desc,
      status
    });
    await reloadTable('indicadorComentarios');
    toast('Comentário adicionado!');

    // Atualiza só a lista sem re-renderizar o modal inteiro
    const ind     = db.indicadores.find(i => i.id === indId);
    const statusCfg = {
      'Aberta':       { bg:'#fef2f2', col:'#dc2626', border:'#fca5a5' },
      'Em Andamento': { bg:'#fffbeb', col:'#d97706', border:'#fcd34d' },
      'Concluída':    { bg:'#f0fdf4', col:'#16a34a', border:'#86efac' },
      'Comentário':   { bg:'#dbeafe', col:'#1d4ed8', border:'#93c5fd' },
    };
    const statusBadge = s => {
      const c = statusCfg[s] || { bg:'var(--g100)', col:'var(--g600)', border:'var(--g200)' };
      return `<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${c.bg};color:${c.col};border:1px solid ${c.border};font-weight:600;white-space:nowrap;">${s}</span>`;
    };
    const cmts = db.indicadorComentarios.filter(c => c.indicadorId === indId && c.mes === +mes && c.ano === +ano);
    const novaLista = cmts.length === 0
      ? `<p style="text-align:center;font-size:12px;color:var(--g400);padding:16px 0 8px;">Nenhum comentário ainda para este mês.</p>`
      : cmts.map(c => `
        <div style="border:1px solid var(--g100);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;background:var(--white);">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              ${statusBadge(c.status)}
              ${c.data ? `<span style="font-size:11px;color:var(--g500);">📅 ${new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0;">
              <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:#E8501A;"
                onclick="editComentario(${c.id},${indId},${mes},${ano})" title="Editar comentário">✏️</button>
              <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:var(--danger);"
                onclick="deleteComentario(${c.id},${indId},${mes},${ano})" title="Excluir comentário">🗑️</button>
            </div>
          </div>
          ${c.titulo ? `<div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px;">📌 ${esc(c.titulo)}</div>` : ''}
          <div style="font-size:13px;color:var(--g800);line-height:1.55;white-space:pre-wrap;">${esc(c.descricao)}</div>
        </div>`).join('');

    const listaEl = document.getElementById('cmt-lista');
    if (listaEl) listaEl.innerHTML = novaLista;

    // Limpa o formulário e mantém foco
    const hoje = new Date().toISOString().slice(0, 10);
    const tituloEl = document.getElementById('fc_titulo');
    const dataEl   = document.getElementById('fc_data');
    const descEl   = document.getElementById('fc_desc');
    if (tituloEl) tituloEl.value = '';
    if (dataEl)   dataEl.value   = hoje;
    if (descEl)   descEl.value   = '';
    btn.disabled = false; btn.textContent = '➕ Adicionar';
    if (tituloEl) tituloEl.focus();

  } catch(e) {
    toast('Erro: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '➕ Adicionar';
  }
}

async function deleteComentario(comentarioId, indId, mes, ano) {
  if (!confirm('Excluir este comentário?')) return;
  try {
    await sbDelete('indicador_comentarios', comentarioId);
    await reloadTable('indicadorComentarios');
    toast('Comentário excluído.');
    openComentariosModal(indId, mes, ano);
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }
}

function openTarefaComentariosModal(tarefaId, pid) {
  const tarefa  = db.tarefas.find(t => t.id === tarefaId);
  const cmts    = db.tarefaComentarios.filter(c => c.tarefaId === tarefaId);

  const statusCfg = {
    'Aberta':       { bg:'#fef2f2', col:'#dc2626', border:'#fca5a5' },
    'Em Andamento': { bg:'#fffbeb', col:'#d97706', border:'#fcd34d' },
    'Concluída':    { bg:'#f0fdf4', col:'#16a34a', border:'#86efac' },
    'Comentário':   { bg:'#dbeafe', col:'#1d4ed8', border:'#93c5fd' },
  };
  const statusSelect = (cId, s) => {
    const c = statusCfg[s] || { bg:'var(--g100)', col:'var(--g600)', border:'var(--g200)' };
    const opts = ['Aberta','Em Andamento','Concluída','Comentário']
      .map(v => `<option value="${v}" ${v===s?'selected':''}>${v}</option>`).join('');
    return `<select onchange="changeTarefaComentarioStatus(${cId},this.value,${tarefaId},${pid})"
      style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;
             background:${c.bg};color:${c.col};border:1px solid ${c.border};
             cursor:pointer;outline:none;">${opts}</select>`;
  };

  const listaHtml = cmts.length === 0
    ? `<p style="text-align:center;font-size:12px;color:var(--g400);padding:16px 0 8px;">Nenhum comentário ainda para esta tarefa.</p>`
    : cmts.map(c => `
      <div style="border:1px solid var(--g100);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;background:var(--white);">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${statusSelect(c.id, c.status)}
            ${c.data ? `<span style="font-size:11px;color:var(--g500);">📅 ${new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
          </div>
          <div style="display:flex;gap:4px;">
            <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:#E8501A;"
              onclick="editTarefaComentario(${c.id},${tarefaId},${pid})" title="Editar">✏️</button>
            <button class="icon-btn" style="width:20px;height:20px;font-size:11px;color:var(--danger);"
              onclick="deleteTarefaComentario(${c.id},${tarefaId},${pid})" title="Excluir">🗑️</button>
          </div>
        </div>
        ${c.titulo ? `<div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px;">📌 ${esc(c.titulo)}</div>` : ''}
        <div style="font-size:13px;color:var(--g800);line-height:1.55;white-space:pre-wrap;">${esc(c.descricao)}</div>
      </div>`).join('');

  const hoje = new Date().toISOString().slice(0, 10);
  const sOpts = ['Aberta','Em Andamento','Concluída','Comentário']
    .map(s => `<option value="${s}">${s}</option>`).join('');

  openModal(`
  <div class="modal-head">
    <div class="modal-title">💬 Comentários — ${esc(tarefa?.nome||'Tarefa')}</div>
    <button class="modal-x" onclick="closeModal();renderProject(${pid})">✕</button>
  </div>
  <div class="modal-body" style="max-height:65vh;overflow-y:auto;">
    ${listaHtml.length ? `<div style="margin-bottom:14px;">${listaHtml}</div>` : ''}
    <div style="${cmts.length ? 'border-top:2px solid var(--g100);padding-top:14px;' : ''}">
      <div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:10px;">➕ Novo comentário</div>
      <div class="fg"><label class="lbl">Título</label>
        <input id="ftc_titulo" class="fc" type="text" placeholder="Título resumido (opcional)..."></div>
      <div class="form-row" style="grid-template-columns:1fr 1fr;">
        <div class="fg"><label class="lbl">Data</label>
          <input id="ftc_data" class="fc" type="date" value="${hoje}"></div>
        <div class="fg"><label class="lbl">Status</label>
          <select id="ftc_status" class="fc">${sOpts}</select></div>
      </div>
      <div class="fg"><label class="lbl">Comentário <span class="req">*</span></label>
        <textarea id="ftc_desc" class="fc" rows="5" placeholder="Descreva a observação ou ação..."
          style="resize:vertical;min-height:100px;font-family:inherit;line-height:1.55;"></textarea></div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-secondary" onclick="closeModal();renderProject(${pid})">Fechar</button>
    <button class="btn btn-primary" id="btnSvTCmt" onclick="saveTarefaComentario(${tarefaId},${pid})">➕ Adicionar</button>
  </div>`, '560px');

  setTimeout(() => document.getElementById('ftc_titulo')?.focus(), 100);
}

async function saveTarefaComentario(tarefaId, pid) {
  const titulo = document.getElementById('ftc_titulo')?.value.trim();
  const data   = document.getElementById('ftc_data')?.value.trim();
  const status = document.getElementById('ftc_status')?.value;
  const desc   = document.getElementById('ftc_desc')?.value.trim();

  if (!desc) { alert('O comentário é obrigatório.'); return; }

  const btn = document.getElementById('btnSvTCmt');
  btn.disabled = true; btn.textContent = 'Salvando...';

  try {
    await sbCreate('tarefa_comentarios', {
      tarefa_id: tarefaId,
      titulo:    titulo || null,
      data:      data   || null,
      descricao: desc,
      status
    });
    await reloadTable('tarefaComentarios');
    toast('Comentário adicionado!');
    closeModal();
    renderProject(pid);
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '➕ Adicionar';
  }
}

      const label = u.nome ? `${u.nome}${u.email?' ('+u.email+')':''}` : u.email;

    </div>
    <div class="fg"><label class="lbl">Empresa</label>
      <select id="f_remp" class="fc">
        <option value="">— Sem empresa vinculada —</option>
        ${empOpts}
      </select>
      ${!db.empresas.length?`<div style="font-size:11px;color:var(--g400);margin-top:4px;">Nenhuma empresa cadastrada. <a href="#" onclick="closeModal();openEmpresaModal();return false;" style="color:var(--primary)">Cadastrar empresa</a></div>`:''}

      <label class="lbl">🔗 Usuário do sistema vinculado</label>
      <select id="f_ruserid" class="fc">
        <option value="">— Sem vínculo —</option>
        ${userOpts}

      <div style="font-size:11px;color:var(--g400);margin-top:4px;">

      </div>

  </div>
